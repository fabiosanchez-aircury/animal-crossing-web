// ---- uiKey (full replacement) ----
function navList(len, code) {
  if (code === 'ArrowUp') { ui.sel = (ui.sel + len - 1) % Math.max(1, len); SFX.blip(); return true; }
  if (code === 'ArrowDown') { ui.sel = (ui.sel + 1) % Math.max(1, len); SFX.blip(); return true; }
  return false;
}
const OK_KEYS = ['Enter', 'Space', 'KeyE'];
function uiKey(code) {
  if (code === 'Escape') {
    if ((ui.mode === 'nook' || ui.mode === 'museum2') && ui.sub) { ui.sub = null; ui.sel = 0; SFX.blip(); return; }
    closeUI(); return;
  }
  if (ui.mode === 'inv') {
    if (code === 'KeyI' || code === 'KeyE') closeUI();
    return;
  }
  if (ui.mode === 'pause') {
    if (navList(3, code)) return;
    if (OK_KEYS.includes(code)) {
      if (ui.sel === 0) closeUI();
      else if (ui.sel === 1) { setLang(lang === 'en' ? 'es' : 'en'); SFX.blip(); }
      else { persist(); ui.mode = null; startFade(() => { state = 'slots'; slotsUI.delArm = -1; }); }
    }
    return;
  }
  if (ui.mode === 'cafe') {
    if (OK_KEYS.includes(code)) {
      if (player.bells < ITEMS.coffee.buy) { toast(T('no_bells')); SFX.error(); return; }
      player.bells -= ITEMS.coffee.buy;
      player.coffeeUntil = Date.now() + COFFEE_DUR * 1000;
      SFX.coffee(); toast(T('coffee_on')); persist();
      closeUI();
    }
    return;
  }
  if (ui.mode === 'travel') {
    const rows = travelDests();
    if (navList(rows.length, code)) return;
    if (OK_KEYS.includes(code) && rows[ui.sel]) doTravel(rows[ui.sel][0]);
    return;
  }
  if (ui.mode === 'clothes' || ui.mode === 'wardrobe') {
    const rows = ui.mode === 'wardrobe'
      ? OUTFITS.filter(o => o.price === 0 || (prog.owned || []).includes(o.id))
      : clothesCatalog();
    if (navList(rows.length, code)) return;
    if (OK_KEYS.includes(code) && rows[ui.sel]) clothesAction(rows[ui.sel]);
    return;
  }
  if (ui.mode === 'museum2') {
    if (!ui.sub) {
      if (navList(4, code)) return;
      if (OK_KEYS.includes(code)) {
        if (ui.sel === 0) identifyFossils();
        else if (ui.sel === 1) { ui.sub = 'fossils'; ui.sel = 0; SFX.blip(); }
        else if (ui.sel === 2) { ui.sub = 'fish'; ui.sel = 0; SFX.blip(); }
        else closeUI();
      }
      return;
    }
    const rows = ui.sub === 'fossils' ? FOSSIL_SPECIES : FISH_SPECIES_ALL;
    if (navList(rows.length, code)) return;
    if (OK_KEYS.includes(code)) donateSpecies(ui.sub, rows[ui.sel]);
    return;
  }
  if (ui.mode === 'bed') {
    closeUI();
    return;
  }
  if (ui.mode === 'nook' && ui.sub === 'build') { uiKeyBuild(code); return; }
  if (ui.mode === 'shop' || ui.mode === 'market_tools' || (ui.mode === 'nook' && (ui.sub === 'sell' || ui.sub === 'buy'))) {
    const selling = ui.mode === 'shop' ? ui.tab === 0 : ui.mode === 'market_tools' ? false : ui.sub === 'sell';
    const rows = selling ? sellRows() : buyRows();
    if (ui.mode === 'shop' && (code === 'ArrowLeft' || code === 'ArrowRight' || code === 'Tab')) {
      ui.tab = 1 - ui.tab; ui.sel = 0; SFX.blip(); return;
    }
    if (code === 'ArrowUp') { ui.sel = Math.max(0, ui.sel - 1); SFX.blip(); return; }
    if (code === 'ArrowDown') { ui.sel = Math.min(Math.max(0, rows.length - 1), ui.sel + 1); SFX.blip(); return; }
    if (OK_KEYS.includes(code) || code === 'KeyA') {
      const type = rows[ui.sel];
      if (!type) { SFX.error(); return; }
      if (selling) {
        doSell(type, code === 'KeyA');
        ui.sel = Math.min(ui.sel, Math.max(0, sellRows().length - 1));
      } else doBuy(type);
    }
    return;
  }
  if (ui.mode === 'nook') {
    const rows = ['sell', 'buy', 'build', 'chat', 'leave'];
    if (navList(rows.length, code)) return;
    if (OK_KEYS.includes(code)) {
      const r = rows[ui.sel];
      if (r === 'leave') { closeUI(); return; }
      if (r === 'chat') {
        ui.mode = null;
        startDialog('Tom Nook', '#3f7a4c', [pick(T('nook_chat'))], () => { openUI('nook'); });
        return;
      }
      ui.sub = r; ui.sel = 0; SFX.blip();
    }
    return;
  }
}

// ---- hotspot interactions inside interiors (bed, wardrobe, tv) ----
function interiorHotspot() {
  if (area.type !== 'interior') return null;
  const def = INTERIORS[area.key];
  if (!def || !def.hotspots) return null;
  const c = interiorCenter();
  for (const hs of def.hotspots) {
    if (dist(player.x, player.y, c.x + hs.x, c.y + hs.y) < 26) return hs;
  }
  return null;
}
function useHotspot(hs) {
  if (hs.act === 'bed') {
    const today = new Date().toISOString().slice(0, 10);
    if (prog.lastGift !== today) {
      prog.lastGift = today;
      player.bells += GIFT_BELLS;
      toast(T('gift', { b: GIFT_BELLS }));
      SFX.sell();
    } else {
      toast(T('bed_rest'));
      SFX.blip();
    }
    persist();
  } else if (hs.act === 'wardrobe') {
    openUI('wardrobe');
  } else if (hs.act === 'tv') {
    toast(T('tv_msg'));
    SFX.blip();
  }
}

// ---- save (replacements) ----
function freshProg(seed) {
  return { seed, createdAt: Date.now(), built: {}, tools: {}, donated: {}, lastGift: '', star: false,
    museum: { fossils: {}, fish: {} }, outfit: 'red', owned: ['red'] };
}
function persist() {
  if (currentSlot < 0 || !prog) return;
  const plantsToSave = (area.type === 'island' ? plants : (mainSnap ? mainSnap.plants : plants)) || [];
  try {
    localStorage.setItem(SLOT_KEY(currentSlot), JSON.stringify({
      name: player.name, bells: player.bells, inv: player.inv,
      seed: prog.seed, createdAt: prog.createdAt, built: prog.built, tools: prog.tools,
      donated: prog.donated, lastGift: prog.lastGift, star: prog.star,
      museum: prog.museum, outfit: prog.outfit, owned: prog.owned,
      plants: plantsToSave.map(p => ({ x: p.x, y: p.y, t0: p.t0 })),
    }));
  } catch (e) {}
}
function enterSlot(i) {
  const data = readSlot(i);
  currentSlot = i;
  area = { type: 'island', biome: null, key: null };
  mainSnap = null; palOverride = null;
  enemies = []; statics = []; action = null;
  if (data && data.name) {
    prog = {
      seed: data.seed, createdAt: data.createdAt, built: data.built || {}, tools: data.tools || {},
      donated: data.donated || {}, lastGift: data.lastGift || '', star: !!data.star,
      museum: data.museum && data.museum.fossils ? data.museum : { fossils: {}, fish: {} },
      outfit: data.outfit || 'red', owned: data.owned || ['red'],
    };
    player.name = data.name; player.bells = data.bells ?? 100; player.inv = data.inv || {};
    genWorld(prog.seed);
    plants = (data.plants || []).map(p => ({ x: p.x, y: p.y, t0: p.t0 }));
    bootIsland();
    startFade(() => { state = 'play'; toast(T('welcome_back', { n: player.name })); });
  } else {
    prog = freshProg(Math.floor(Math.random() * 1e9));
    player.name = ''; player.bells = 150; player.inv = {}; player.coffeeUntil = 0;
    genWorld(prog.seed);
    plants = [];
    bootIsland();
    startFade(() => { state = 'intro'; buildIntroScript(); });
  }
}
function bootIsland() {
  area = { type: 'island', biome: null, key: null };
  palOverride = null;
  statics = []; enemies = []; action = null; particles3 = [];
  player.hp = 6;
  refreshRects();
  groundItems.length = 0;
  fillSpawns(true);
  spawnNpcs();
  player.x = spawnPt.x; player.y = spawnPt.y;
  player.coffeeUntil = 0;
  if (playerMesh) { scene.remove(playerMesh); playerMesh = null; }
  cam.x = player.x; cam.y = player.y;
  ui.mode = null; dlg.open = false;
}

/* ===== EXPANSION part 7: rebuildWorld / sync3D / environment / HUD / menus ===== */

let rockRefs = [], staticRefs = new Map(), boatRef = null, enemyRefs = new Map();

function rebuildWorld() {
  if (!renderer) return;
  sceneDirty = false;
  if (worldGroup) scene.remove(worldGroup);
  trackItem.clear(); trackPlant.clear(); trackNpc.clear();
  staticRefs.clear(); enemyRefs.clear();
  windowMats.length = 0; signRefs.length = 0; treeRefs.length = 0; rockRefs = [];
  particles3 = []; aquariumFish = []; boatRef = null;
  worldGroup = new THREE.Group();
  if (!hfield) computeHeights();
  worldGroup.add(buildTerrainMesh());

  if (area.type === 'interior') {
    buildInteriorScene(worldGroup);
  } else {
    for (const tr of trees) {
      const tg = makeTreeMesh(tr);
      worldGroup.add(tg);
      treeRefs.push({ g: tg, ph: tr.sway });
    }
    for (const r of rocks) {
      const rm = makeRockMesh(r);
      worldGroup.add(rm);
      rockRefs.push({ r, m: rm, x: r.x, y: r.y });
    }
    if (wildflowers.length) {
      const m4f = new THREE.Matrix4(), colf = new THREE.Color();
      const heads = new THREE.InstancedMesh(new THREE.SphereGeometry(0.09, 8, 6),
        new THREE.MeshLambertMaterial({ color: 0xffffff }), wildflowers.length);
      const stems = new THREE.InstancedMesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3, 6), lam('#3f7a3f'), wildflowers.length);
      wildflowers.forEach((f, i) => {
        const hy = heightAt(f.x, f.y);
        m4f.makeTranslation(f.x * U, hy + 0.34, f.y * U);
        heads.setMatrixAt(i, m4f);
        colf.set(f.c1);
        heads.setColorAt(i, colf);
        m4f.makeTranslation(f.x * U, hy + 0.15, f.y * U);
        stems.setMatrixAt(i, m4f);
      });
      worldGroup.add(heads, stems);
    }
    // grass tufts
    const tufts = [];
    for (let y = 0; y < MH; y += 1) for (let x = 0; x < MW; x += 1) {
      if (map[y][x] === T_GRASS && hash2(x * 3.1, y * 1.7) < 0.09) tufts.push([x, y]);
    }
    if (tufts.length && area.biome !== 'volcano' && area.biome !== 'glacial') {
      const m4f = new THREE.Matrix4();
      const tuftMesh = new THREE.InstancedMesh(new THREE.ConeGeometry(0.06, 0.2, 5), lam('#3e8a37'), Math.min(tufts.length, 900));
      for (let i = 0; i < Math.min(tufts.length, 900); i++) {
        const [tx, ty] = tufts[i];
        const wx = tx * TILE + hash2(tx, ty) * TILE, wy = ty * TILE + hash2(ty, tx) * TILE;
        m4f.makeTranslation(wx * U, heightAt(wx, wy) + 0.08, wy * U);
        tuftMesh.setMatrixAt(i, m4f);
      }
      worldGroup.add(tuftMesh);
    }
    // shoreline foam
    if (foamEdges.length) {
      foamMat = new THREE.MeshBasicMaterial({ color: area.biome === 'volcano' ? 0xffaa55 : 0xffffff, transparent: true, opacity: 0.35 });
      const foam = new THREE.InstancedMesh(new THREE.BoxGeometry(0.8, 0.03, 0.14), foamMat, foamEdges.length);
      const q = new THREE.Quaternion(), eu = new THREE.Euler(), pv = new THREE.Vector3(), sv = new THREE.Vector3(1, 1, 1);
      const m4f = new THREE.Matrix4();
      foamEdges.forEach((e, i) => {
        let px = e.x + 0.5, pz = e.y + 0.5, rot = 0;
        if (e.side === 0) pz = e.y - 0.12;
        else if (e.side === 2) pz = e.y + 1.12;
        else if (e.side === 1) { px = e.x + 1.12; rot = Math.PI / 2; }
        else { px = e.x - 0.12; rot = Math.PI / 2; }
        eu.set(0, rot, 0); q.setFromEuler(eu);
        pv.set(px, -0.28, pz);
        m4f.compose(pv, q, sv);
        foam.setMatrixAt(i, m4f);
      });
      worldGroup.add(foam);
    }
    if (area.type === 'island') {
      for (const b of activeBuildings()) worldGroup.add(makeBuildingMesh(b.key));
      const nm = makeCharMesh('nook', { skin: '#8a6644', shirt: '#4d8f5c' });
      const nx = plots.tent.x + 28, ny = plots.tent.y + 8;
      nm.position.set(nx * U, heightAt(nx, ny), ny * U);
      worldGroup.add(nm);
      if (prog && prog.built.shop) {
        const lx = (plots.shop.x - 52) * U, lz = (plots.shop.y + 28) * U;
        const ly = heightAt(plots.shop.x - 52, plots.shop.y + 28);
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.6, 8), lam('#46535e'));
        pole.position.set(lx, ly + 0.8, lz);
        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.14, 8, 8),
          new THREE.MeshBasicMaterial({ color: '#ffe9a3' }));
        bulb.position.set(lx, ly + 1.65, lz);
        worldGroup.add(pole, bulb);
        lampLight.position.set(lx, ly + 1.7, lz);
      }
    } else if (area.type === 'biome') {
      worldGroup.add(makeDockMesh());
      if (area.biome === 'market') {
        for (const st of statics) {
          if (st.stall) {
            const stall = makeStallMesh();
            stall.position.set(st.x * U, heightAt(st.x, st.y), (st.y - 18) * U);
            worldGroup.add(stall);
          }
        }
      }
    }
  }
  // statics characters
  for (const st of statics) {
    const m = makeCharMesh(st.kind, { skin: st.color, shirt: st.kind === 'sheep' ? '#c46a9a' : '#4d6a8a' });
    m.position.set(st.x * U, heightAt(st.x, st.y), st.y * U);
    m.rotation.y = Math.PI;
    staticRefs.set(st, m);
    worldGroup.add(m);
  }
  scene.add(worldGroup);
}

function updateEnvironment() {
  const period = dayPeriod();
  const glow = period === 'night' || period === 'evening';
  if (area.type === 'interior') {
    sceneBgColor.set('#241a12');
    scene.fog.color.set('#241a12');
    sunLight.intensity = 0.25;
    sunLight.color.set('#ffe2b0');
    hemiLight.intensity = 0.55;
    if (stars) stars.visible = false;
    if (moon) moon.visible = false;
    for (const c of clouds3) c.g.visible = false;
    lampLight.intensity = 0;
    return;
  }
  if (stars) stars.visible = true;
  for (const c of clouds3) c.g.visible = true;
  const h = nowHour();
  const [top, bottom] = skyColors();
  sceneBgColor.set(top);
  scene.fog.color.set(bottom);
  if (area.biome === 'volcano') {
    waterMat.color.set('#ff6a2a');
    waterMat.emissive.set('#891e00');
  } else {
    waterMat.emissive.set('#000000');
    waterMat.color.set({ morning: '#3f9bd0', afternoon: '#3a96cc', evening: '#3f7fb8', night: '#16294d' }[period]);
  }
  const isDay = h >= 5.5 && h < 19.2;
  const dayT = clamp((h - 5.5) / 13.7, 0, 1);
  const elev = Math.sin(dayT * Math.PI);
  if (isDay) {
    sunLight.intensity = 0.45 + elev * 1.0;
    sunLight.color.set(mixHex('#ffb766', '#ffffff', clamp(elev * 1.6, 0, 1)));
    sunLight.position.set(
      sunLight.target.position.x - Math.cos(dayT * Math.PI) * 38,
      6 + elev * 42,
      sunLight.target.position.z + 16);
  } else {
    sunLight.intensity = 0.5;
    sunLight.color.set('#aebfe8');
    sunLight.position.set(sunLight.target.position.x + 10, 40, sunLight.target.position.z + 14);
  }
  hemiLight.intensity = isDay ? 0.55 + elev * 0.3 : 0.35;
  if (starMat) starMat.opacity = period === 'night' ? 0.9 : period === 'evening' ? 0.4 : 0;
  if (moon) moon.visible = !isDay;
  for (const wm of windowMats) wm.emissiveIntensity = glow ? 1.3 : 0;
  lampLight.intensity = glow && area.type === 'island' && prog && prog.built.shop ? 1.8 : 0;
}

function sync3D(dt, t) {
  if (!renderer) return;
  if (sceneDirty) rebuildWorld();
  if (signsDirty) {
    signsDirty = false;
    for (const sr of signRefs) { sr.mat.map = makeTextTexture(T('b_' + sr.key)); sr.mat.needsUpdate = true; }
  }
  updateEnvironment();
  if (!playerMesh) {
    playerMesh = makeCharMesh('player', { skin: '#f5cf9e', shirt: '#e2574c' });
    scene.add(playerMesh);
  }
  syncChar(playerMesh, player.x, player.y, player.vyaw || 0, player.moving, player.step, dt);
  // action poses (override arm swing)
  if (action && playerMesh.userData.a1) {
    const a1 = playerMesh.userData.a1, a2 = playerMesh.userData.a2;
    if (action.kind === 'fish') {
      a1.rotation.x = action.phase === 'cast' ? -2.2 + action.t * 3 : -0.9;
      a2.rotation.x = a1.rotation.x;
    } else if (action.kind === 'mine' || action.kind === 'dig') {
      const sw2 = Math.sin(action.t * 16) * 1.1;
      a1.rotation.x = -1.4 + sw2;
      a2.rotation.x = -1.4 + sw2;
    } else if (action.kind === 'swing') {
      a2.rotation.x = -2.4 + action.t * 8;
    }
  }
  // invulnerability blink
  playerMesh.visible = invulnT <= 0 || Math.floor(t * 12) % 2 === 0;
  for (const n of npcs) {
    let m = trackNpc.get(n);
    if (!m) {
      m = makeCharMesh(n.def.kind, { skin: n.def.body, shirt: n.def.shirt });
      worldGroup.add(m);
      trackNpc.set(n, m);
    }
    const moving = n.state === 'walk';
    if (moving) n.vyaw = Math.atan2(n.tx - n.x, n.ty - n.y);
    syncChar(m, n.x, n.y, n.vyaw || 0, moving, n.step, dt);
  }
  // statics idle bob
  for (const [st, m] of staticRefs) {
    m.position.y = heightAt(st.x, st.y) + Math.sin(t * 1.6 + st.x) * 0.02;
    const d = dist(player.x, player.y, st.x, st.y);
    if (d < 60) m.rotation.y = lerpAngle(m.rotation.y, Math.atan2(player.x - st.x, player.y - st.y), 0.1);
  }
  // enemies
  const liveE = new Set(enemies);
  for (const [e, m] of enemyRefs) {
    if (!liveE.has(e)) { worldGroup.remove(m); enemyRefs.delete(e); }
  }
  for (const e of enemies) {
    let m = enemyRefs.get(e);
    if (!m) { m = makeEnemyMesh(e); worldGroup.add(m); enemyRefs.set(e, m); }
    m.position.set(e.x * U, heightAt(e.x, e.y) + Math.abs(Math.sin(e.hop)) * 0.22, e.y * U);
    m.rotation.y = e.vyaw || 0;
    if (m.userData.blob) m.userData.blob.scale.y = 0.7 + Math.abs(Math.sin(e.hop)) * 0.25;
  }
  // ground items
  const live = new Set(groundItems);
  for (const [it, m] of trackItem) {
    if (!live.has(it)) { worldGroup.remove(m); trackItem.delete(it); }
  }
  for (const it of groundItems) {
    let m = trackItem.get(it);
    if (!m) { m = makeItemMesh(it); worldGroup.add(m); trackItem.set(it, m); }
    if (it.type === 'fish') {
      m.position.set(it.x * U, -0.30, it.y * U);
      const ring = m.userData.ring;
      if (ring) {
        const biting = action && action.kind === 'fish' && action.spot === it && action.phase === 'bite';
        const rp = (t * (biting ? 2.4 : 0.7) + it.ph) % 1;
        ring.scale.setScalar(0.6 + rp * 2.2);
        ring.material.opacity = (biting ? 0.8 : 0.4) * (1 - rp);
      }
    } else if (it.type === 'fossil') {
      m.position.set(it.x * U, heightAt(it.x, it.y) + 0.01, it.y * U);
    } else {
      m.position.set(it.x * U, heightAt(it.x, it.y) + 0.14 + Math.sin(t * 2.4 + it.ph) * 0.05, it.y * U);
    }
  }
  // plants
  const liveP = new Set(plants);
  for (const [p, m] of trackPlant) {
    if (!liveP.has(p) || m.userData.stage !== plantStage(p)) { worldGroup.remove(m); trackPlant.delete(p); }
  }
  for (const p of plants) {
    if (!trackPlant.get(p)) {
      const m = makePlantMesh(plantStage(p));
      m.position.set(p.x * U, heightAt(p.x, p.y), p.y * U);
      worldGroup.add(m);
      trackPlant.set(p, m);
    }
  }
  // rocks: shake & hide broken
  for (const rr of rockRefs) {
    rr.m.visible = !rr.r.broken;
    const sh = rr.r.shakeT || 0;
    rr.m.position.x = rr.x * U + (sh > 0 ? Math.sin(t * 60) * 0.04 * sh : 0);
  }
  // aquarium fish swim
  for (const f of aquariumFish) {
    f.position.z = f.userData.swim.z0 + Math.sin(t * 0.8 + f.userData.swim.ph) * 0.3;
    f.rotation.y = Math.sin(t * 0.8 + f.userData.swim.ph) > 0 ? 0 : Math.PI;
  }
  // boat bob
  if (boatRef) boatRef.position.y = -0.25 + Math.sin(t * 1.4) * 0.05;
  updateParticles3(dt);
  // water, foam, trees, clouds
  if (waterTex) { waterTex.offset.x = t * 0.008; waterTex.offset.y = t * 0.005; }
  if (foamMat) foamMat.opacity = 0.3 + 0.18 * Math.sin(t * 1.8);
  for (const tr3 of treeRefs) tr3.g.rotation.z = Math.sin(t * 1.2 + tr3.ph) * 0.02;
  for (const c of clouds3) {
    c.g.position.x += c.v * dt;
    if (c.g.position.x > MW + 30) c.g.position.x = -30;
  }
  const fx = cam.x * U, fz = cam.y * U;
  const camH = area.type === 'interior' ? Math.min(camDist, 9) : camDist;
  cam3.position.set(
    fx + Math.sin(camYaw) * camH * 0.85,
    heightAt(cam.x, cam.y) + 1.2 + camH * 0.68,
    fz + Math.cos(camYaw) * camH * 0.85);
  cam3.lookAt(fx, heightAt(cam.x, cam.y) + 0.7, fz);
  sunLight.target.position.set(player.x * U, 0, player.y * U);
}

// ---- icons for new item types ----
function drawIconEx(type) {
  const st = GROUND_STYLE[type];
  const fishCol = { carpa: '#b0986a', lubina: '#5a7a8a', pez_dorado: '#ffd95e', pez_tropical: '#4a90d8', pez_loro: '#8fd45a', pez_globo: '#f0c040', salmon: '#f2a78a', pez_artico: '#9fc8e8', pez_cristal: '#cfe8f6', pez_lava: '#ff5a26' }[type];
  if (fishCol) {
    ctx.fillStyle = fishCol;
    ctx.beginPath(); ctx.ellipse(-0.5, 0, 4.6, 2.8, 0, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3.4, 0); ctx.lineTo(6.4, -2.6); ctx.lineTo(6.4, 2.6); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#173b4f';
    ctx.beginPath(); ctx.arc(-2.6, -0.6, 0.8, 0, TAU); ctx.fill();
    return true;
  }
  if (FOSSIL_SPECIES.includes(type) || type === 'fosil_bruto') {
    ctx.strokeStyle = type === 'fosil_bruto' ? '#8a8a8a' : '#9a7d5a';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    for (let a = 0; a < TAU * 2.1; a += 0.3) {
      const r = 0.9 + a * 0.75;
      const px = Math.cos(a) * r, py = Math.sin(a) * r;
      a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
    if (type === 'fosil_bruto') {
      ctx.fillStyle = '#8a8a8a';
      ctx.font = '900 8px Nunito, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('?', 0, -6);
    }
    return true;
  }
  if (st && st.shape === 'gem') {
    ctx.fillStyle = st.c;
    ctx.beginPath();
    ctx.moveTo(0, -5); ctx.lineTo(4.4, 0); ctx.lineTo(0, 5); ctx.lineTo(-4.4, 0);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(-2, -1); ctx.lineTo(0, -5); ctx.lineTo(2, -1); ctx.stroke();
    return true;
  }
  if (st) {
    ctx.fillStyle = st.c;
    ctx.beginPath(); ctx.arc(0, 0, 4.4, 0, TAU); ctx.fill();
    if (type === 'pina') {
      ctx.fillStyle = '#4d8f3c';
      ctx.beginPath(); ctx.moveTo(-2, -3.5); ctx.lineTo(0, -7); ctx.lineTo(2, -3.5); ctx.closePath(); ctx.fill();
    }
    return true;
  }
  if (type === 'espada') {
    ctx.strokeStyle = '#9aa3ad'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-3, 3); ctx.lineTo(3.5, -3.5); ctx.stroke();
    ctx.strokeStyle = '#8a6644'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(-4.5, 4.5); ctx.lineTo(-2.4, 2.4); ctx.moveTo(-4.6, 1.6); ctx.lineTo(-1.6, 4.6); ctx.stroke();
    return true;
  }
  if (type === 'cana_dorada' || type === 'pala_dorada') {
    ctx.strokeStyle = '#e0a83a'; ctx.lineWidth = 1.6;
    if (type === 'cana_dorada') {
      ctx.beginPath(); ctx.moveTo(-4.5, 4.5); ctx.lineTo(4, -4); ctx.stroke();
      ctx.beginPath(); ctx.arc(3.5, 0, 2, -1, 1.8); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(0, 1.5); ctx.stroke();
      ctx.fillStyle = '#e0a83a';
      ctx.beginPath(); ctx.moveTo(-2.6, 1.5); ctx.lineTo(2.6, 1.5); ctx.lineTo(1.8, 5.5); ctx.lineTo(-1.8, 5.5); ctx.closePath(); ctx.fill();
    }
    return true;
  }
  return false;
}

function renderLoading() {

  g.addColorStop(0, top); g.addColorStop(0.55, bottom); g.addColorStop(0.55, '#2f7cb0'); g.addColorStop(1, '#1d5a8a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, view.w, view.h);
  const t = gameTime();
  // waves
  for (let i = 0; i < 3; i++) {
    ctx.strokeStyle = `rgba(255,255,255,${0.25 - i * 0.06})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let xx = -20; xx <= view.w + 20; xx += 26) {
      const yy = view.h * 0.62 + i * 30 + Math.sin(xx * 0.025 + t * 2 + i) * 6;

  ctx.rotate(Math.sin(t * 1.8) * 0.06);
  ctx.fillStyle = '#8a5a36';
  ctx.beginPath(); ctx.moveTo(-46, 0); ctx.quadraticCurveTo(0, 26, 46, 0); ctx.lineTo(36, -12); ctx.lineTo(-36, -12); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#7c5a36'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(0, -64); ctx.stroke();
  ctx.fillStyle = '#fff6dd';
  ctx.beginPath(); ctx.moveTo(2, -62); ctx.quadraticCurveTo(40 + Math.sin(t * 3) * 5, -40, 2, -16); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e2574c';
  ctx.fillRect(-2, -64, 14, 8);
  ctx.restore();
  ctx.textAlign = 'center';
  ctx.font = '900 28px Nunito, sans-serif';
  ctx.lineWidth = 7; ctx.lineJoin = 'round'; ctx.strokeStyle = '#7a5230';
  const dots = '.'.repeat(1 + Math.floor(t * 2.5) % 3);
  ctx.strokeText(loadingLabel + dots, view.w / 2, view.h * 0.3);

  // fishing bite alert
  if (action && action.kind === 'fish' && action.phase === 'bite') {
    ctx.font = '900 34px Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 7; ctx.strokeStyle = '#7a2020';
    const bob = Math.sin(gameTime() * 14) * 4;
    ctx.strokeText(T('fish_bite'), view.w / 2, view.h * 0.32 + bob);
    ctx.fillStyle = '#ffd95e';
    ctx.fillText(T('fish_bite'), view.w / 2, view.h * 0.32 + bob);
  }
}

/* ===== EXPANSION part 9: interact bubble (area-aware) ===== */
function renderInteractBubble() {
  if (!renderer || dlg.open || ui.mode || state !== 'play' || action) return;
  const hs = interiorHotspot();
  let bx, by, bh = 1.4;
  if (hs) {
    const c = interiorCenter();
    bx = c.x + hs.x; by = c.y + hs.y;
  } else {
    const tgt = nearestInteract();
    if (!tgt) return;
    if (tgt.obj) { bx = tgt.obj.x; by = tgt.obj.y; bh = (tgt.kind === 'npc' || tgt.kind === 'static') ? 1.95 : 0.85; }
    else if (tgt.kind === 'nook') { bx = plots.tent.x + 28; by = plots.tent.y + 8; bh = 1.95; }
    else if (tgt.kind === 'boat') { const bp = boatPoint(); if (!bp) return; bx = bp.x; by = bp.y; bh = 1.8; }
    else if (tgt.kind === 'door') { bx = plots[tgt.key].x; by = plots[tgt.key].y; bh = (B3[tgt.key] ? B3[tgt.key].h : 2) + 1.3; }
    else { bx = player.x; by = player.y; bh = 2.2; }
  }
  const v = new THREE.Vector3(bx * U, heightAt(bx, by) + bh, by * U).project(cam3);
  if (v.z > 1) return;
  const sx = (v.x * 0.5 + 0.5) * view.w, sy = (-v.y * 0.5 + 0.5) * view.h;
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  const bob = Math.sin(gameTime() * 4) * 2;
  ctx.fillStyle = 'rgba(255,251,233,0.95)';
  roundRect(ctx, sx - 11, sy - 11 + bob, 22, 22, 7);
  ctx.fill();
  ctx.fillStyle = '#7a5230';
  ctx.font = '900 14px Nunito, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('E', sx, sy + 5 + bob);
}


// ---------------- main loop ----------------
function frame(now) {
  const dt = clamp((now - lastT) / 1000, 0, 0.05);
  lastT = now;
  update(dt);

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, hudCv.width, hudCv.height);

  if (state === 'title') {
    renderTitle();
    renderParticles();
    renderLightAndVignette();
  } else if (state === 'slots') {
    renderSlots();
    renderParticles();
    renderLightAndVignette();
  } else if (state === 'loading') {
    renderLoading();
  } else if (state === 'intro') {
    renderIntro();
    renderParticles();
    if (vignetteCv) { ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0); ctx.drawImage(vignetteCv, 0, 0, view.w, view.h); }
  } else {
    sync3D(dt, gameTime());
    if (renderer) renderer.render(scene, cam3);
    renderInteractBubble();
    renderParticles();
    renderLightAndVignette();
    renderHUD();
  }

  if (fade > 0) {
    ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
    ctx.fillStyle = `rgba(12,10,24,${fade})`;
    ctx.fillRect(0, 0, view.w, view.h);
  }
  requestAnimationFrame(frame);
}

// ---------------- boot ----------------
resize();
initThree();
resize();
genWorld(20260612); // placeholder island (real one loads with the slot)
prog = freshProg(20260612);
refreshRects();
spawnNpcs();
requestAnimationFrame(frame);
</script>

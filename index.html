function mulberry32(seed) {
  return function () {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);

}
function roundRect(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);

  c.moveTo(x + r, y);

}

function mixHex(a, b, t) {
  const A = hexToRgb(a), B = hexToRgb(b);

// ---------------- world (procedural per seed) ----------------
const TILE = 16, MW = 110, MH = 88;
const WORLD_W = MW * TILE, WORLD_H = MH * TILE;
const T_WATER = 0, T_SAND = 1, T_GRASS = 2;
let map = [], trees = [], rocks = [], wildflowers = [], foamEdges = [];
let plots = {}; // key -> {x, y} (base/door center, world px)
let terrainCv = null;
let spawnPt = { x: 0, y: 0 };

const tileAt = (px, py) => {
  const tx = Math.floor(px / TILE), ty = Math.floor(py / TILE);
  if (tx < 0 || ty < 0 || tx >= MW || ty >= MH) return T_WATER;
  return map[ty][tx];
};
const isLand = (px, py) => tileAt(px, py) !== T_WATER;

function genWorld(seed) {
  for (let attempt = 0; attempt < 12; attempt++) {
    if (tryGenWorld(seed + attempt * 7919)) return;
  }
  tryGenWorld(1337); // bulletproof fallback
}
function tryGenWorld(seed) {
  const rng = mulberry32(seed);
  const cx = MW / 2, cy = MH / 2;
  const p1 = rng() * TAU, p2 = rng() * TAU, p3 = rng() * TAU;
  const f1 = 0.20 + rng() * 0.16, f2 = 0.18 + rng() * 0.14, f3 = 0.12 + rng() * 0.10;
  const a1 = 0.06 + rng() * 0.06, a2 = 0.05 + rng() * 0.05, a3 = 0.04 + rng() * 0.04;
  const rx = MW * (0.38 + rng() * 0.06), ry = MH * (0.36 + rng() * 0.06);
  map = [];
  let grassCount = 0;
  for (let y = 0; y < MH; y++) {
    map[y] = [];
    for (let x = 0; x < MW; x++) {
      const nx = (x - cx) / rx, ny = (y - cy) / ry;
      let d = Math.sqrt(nx * nx + ny * ny);
      d += a1 * Math.sin(x * f1 + p1) + a2 * Math.cos(y * f2 + p2) + a3 * Math.sin((x + y) * f3 + p3);
      let t = d < 0.72 ? T_GRASS : d < 0.93 ? T_SAND : T_WATER;
      if (x < 2 || y < 2 || x >= MW - 2 || y >= MH - 2) t = T_WATER;
      map[y][x] = t;

      }

  }
}
const SFX = {
  pickup() { if (!AC) return; const t = AC.currentTime;

// ---------------- dialogue (typewriter) ----------------
const dlg = { open: false, lines: [], li: 0, shown: 0, speaker: '', color: '#7a5230', cb: null };
function startDialog(speaker, color, lines, cb) {
  dlg.open = true; dlg.speaker = speaker; dlg.color = color;
  dlg.lines = lines.map(l => l.split('{name}').join(player.name || '...'));
  dlg.li = 0; dlg.shown = 0; dlg.cb = cb || null;
}
function advanceDialog() {
  const line = dlg.lines[dlg.li];
  if (dlg.shown < line.length) { dlg.shown = line.length; return; }
  dlg.li++; dlg.shown = 0;
  if (dlg.li >= dlg.lines.length) {
    dlg.open = false;
    if (dlg.cb) { const cb = dlg.cb; dlg.cb = null; cb(); }

// ---------------- intro ----------------
const intro = { active: false, idx: 0, shown: 0, waitingInput: false, script: [] };
function buildIntroScript() {
  intro.script = T('intro_lines');
  intro.idx = 0; intro.shown = 0; intro.waitingInput = false; intro.active = true;
}
function confirmName() {
  const v = nameInput.value.trim();
  if (!v) return;
  player.name = v.slice(0, 12);
  nameInput.style.display = 'none';
  nameInput.blur();
  intro.waitingInput = false;
  intro.idx++; intro.shown = 0;
  persist();

}
function advanceIntro() {
  const item = intro.script[intro.idx];
  if (item === undefined) return;
  if (item === '@INPUT') return;
  const text = item.split('{name}').join(player.name);
  if (intro.shown < text.length) { intro.shown = text.length; return; }
  intro.idx++; intro.shown = 0;
  const next = intro.script[intro.idx];
  if (next === undefined) {
    intro.active = false;
    startFade(() => { state = 'play'; toast(T('welcome')); persist(); });
  } else if (next === '@INPUT') {
    intro.waitingInput = true;
    nameInput.style.display = 'block';
    nameInput.value = '';
    setTimeout(() => { try { nameInput.focus(); } catch (e) {} }, 50);
  }
}

// ---------------- slot management ----------------
function slotSummary(i) {
  const d = readSlot(i);
  if (!d || !d.name) return null;
  const days = Math.floor((Date.now() - (d.createdAt || Date.now())) / 86400e3) + 1;
  const builtCount = PROJECTS.filter(p => d.built && d.built[p.key]).length;
  return { name: d.name, bells: d.bells ?? 0, days, builtCount, star: !!d.star };
}

// ---------------- key handling ----------------
function handlePress(code) {
  if (fadeDir !== 0 || state === 'loading') return;

  if (code === 'KeyL' && state !== 'intro') {
    setLang(lang === 'en' ? 'es' : 'en');
    if (state === 'play') toast(lang === 'es' ? 'Idioma: Español' : 'Language: English');
    return;
  }

  if (state === 'title') {
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') { state = 'slots'; SFX.pickup(); }
    return;
  }

  if (state === 'slots') {
    if (code === 'Escape') { state = 'title'; return; }
    if (code === 'ArrowUp') { slotsUI.sel = (slotsUI.sel + 2) % 3; slotsUI.delArm = -1; SFX.blip(); return; }
    if (code === 'ArrowDown') { slotsUI.sel = (slotsUI.sel + 1) % 3; slotsUI.delArm = -1; SFX.blip(); return; }
    if (code === 'Digit1' || code === 'Digit2' || code === 'Digit3') {
      slotsUI.sel = Number(code.slice(-1)) - 1; slotsUI.delArm = -1; SFX.blip(); return;
    }
    if (code === 'KeyX') {
      if (!readSlot(slotsUI.sel)) return;
      if (slotsUI.delArm === slotsUI.sel) {
        try { localStorage.removeItem(SLOT_KEY(slotsUI.sel)); } catch (e) {}
        slotsUI.delArm = -1; SFX.dig();
      } else { slotsUI.delArm = slotsUI.sel; slotsUI.delT = 3; SFX.error(); }
      return;
    }
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') { SFX.pickup(); enterSlot(slotsUI.sel); }
    return;
  }

  if (state === 'intro') {
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') advanceIntro();
    return;
  }

  // ---- play ----
  if (code === 'KeyM') {
    audio.muted = !audio.muted;
    if (audio.master) audio.master.gain.value = audio.muted ? 0 : 0.6;
    toast(audio.muted ? T('sound_off') : T('sound_on'));
    return;
  }
  if (dlg.open) {
    if (code === 'KeyE' || code === 'Enter' || code === 'Space') advanceDialog();
    return;
  }
  if (ui.mode) { uiKey(code); return; }

  if (code === 'KeyI') { openUI('inv'); return; }
  if (code === 'Escape') { openUI('pause'); return; }
  if (code === 'Tab') { minimapOn = !minimapOn; SFX.blip(); return; }
  if (action) {
    if ((code === 'KeyE' || code === 'Enter' || code === 'Space') && action.kind === 'fish') fishingKey();
    return;
  }
  if (code === 'Space' || code === 'KeyF') {
    if (prog.tools.espada) startSwing();
    return;
  }
  if (code === 'KeyE' || code === 'Enter') {
    const hs = interiorHotspot();
    if (hs) useHotspot(hs); else doInteract();
  }
  if (code === 'KeyP') doPlant();
}
function openUI(mode) {
  ui.mode = mode; ui.sel = 0; ui.tab = 0; ui.sub = null;
  SFX.blip();
}
function closeUI() { ui.mode = null; SFX.blip(); persist(); }

// ---------------- menus logic ----------------
function sellFactor() { return ui.mode === 'shop' ? 1 : 0.8; }
function doSell(type, all) {
  const n = all ? (player.inv[type] || 0) : 1;
  if (n <= 0) { SFX.error(); return; }
  const price = Math.round(ITEMS[type].sell * sellFactor());
  player.inv[type] -= n;
  player.bells += price * n;
  SFX.sell();
  toast(T('sold', { b: price * n, n, i: T('i_' + type) }));
  persist();
}
function doBuild(idx) {
  const p = PROJECTS[idx];
  if (prog.built[p.key]) { toast(T('already_built')); SFX.error(); return; }
  if (idx > 0 && !prog.built[PROJECTS[idx - 1].key]) {
    toast(T('locked_prev', { b: T('b_' + PROJECTS[idx - 1].key) })); SFX.error(); return;
  }
  if (player.bells < p.cost) { toast(T('no_bells')); SFX.error(); return; }
  player.bells -= p.cost;
  prog.built[p.key] = true;
  refreshRects();
  const plot = plots[p.key];
  const dx = plot.x - player.x, dy = plot.y - player.y;
  const dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? T('east') : T('west')) : (dy > 0 ? T('south') : T('north'));
  toast(T('built_done', { b: T('b_' + p.key), d: dir }));
  SFX.build();
  const def = NPC_DEFS.find(d => d.homeKey === p.key);
  if (def) { addNpc(def); toast(T('new_neighbor', { n: def.name })); }
  persist();
}

// nook build submenu handled here (separate because rows differ)
function uiKeyBuild(code) {
  const rows = PROJECTS;
  if (code === 'ArrowUp') { ui.sel = (ui.sel + rows.length - 1) % rows.length; SFX.blip(); return; }
  if (code === 'ArrowDown') { ui.sel = (ui.sel + 1) % rows.length; SFX.blip(); return; }
  if (code === 'Enter' || code === 'Space' || code === 'KeyE') doBuild(ui.sel);
}

// ---------------- clouds & particles ----------------
const clouds = [];
for (let i = 0; i < 8; i++) clouds.push({ x: rnd(2400), y: rnd(0.12, 0.85), s: rnd(0.5, 1.2), v: rnd(3, 8) });
const particles = [];
function spawnParticle(w, h) {
  if (SEASON === 'winter') particles.push({ x: rnd(w), y: -10, vx: rnd(-8, 8), vy: rnd(18, 40), ph: rnd(TAU), kind: 'snow', life: 30 });
  else if (SEASON === 'autumn') particles.push({ x: rnd(w), y: -10, vx: rnd(-15, 5), vy: rnd(22, 42), ph: rnd(TAU), kind: 'leaf', life: 30, c: pick(['#d8842f', '#c4622d', '#e0a83a']) });
  else if (SEASON === 'spring') particles.push({ x: rnd(w), y: -10, vx: rnd(-12, 12), vy: rnd(14, 30), ph: rnd(TAU), kind: 'petal', life: 30 });
  else particles.push({ x: rnd(w), y: rnd(h), vx: rnd(-6, 6), vy: rnd(-4, 4), ph: rnd(TAU), kind: 'spark', life: rnd(3, 6) });
}

// ---------------- update ----------------
let lastT = performance.now();
let persistT = 0;

function update(dt) {
  musicTick();
  ambientTick(dt);
  if (state === 'loading') { updateLoading(dt); return; }

  if (fadeDir === 1) {
    fade = Math.min(1, fade + dt * 2.2);
    if (fade >= 1) { fadeDir = -1; if (fadeCb) { const cb = fadeCb; fadeCb = null; cb(); } }
  } else if (fadeDir === -1) {
    fade = Math.max(0, fade - dt * 1.5);
    if (fade <= 0) fadeDir = 0;
  }

  const targetN = SEASON === 'summer' ? 14 : 36;
  if (particles.length < targetN && Math.random() < 0.3) spawnParticle(view.w, view.h);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.ph += dt * 2;
    p.x += (p.vx + Math.sin(p.ph) * 12) * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.y > view.h + 12 || p.life <= 0) particles.splice(i, 1);
  }
  clouds.forEach(c => { c.x += c.v * dt; });
  if (slotsUI.delArm >= 0) { slotsUI.delT -= dt; if (slotsUI.delT <= 0) slotsUI.delArm = -1; }

  if (state === 'intro' && !intro.waitingInput) {
    const item = intro.script[intro.idx];
    if (item && item !== '@INPUT') {
      const len = item.length, prev = intro.shown;
      intro.shown = Math.min(len, intro.shown + dt * 32);
      if (Math.floor(intro.shown / 2) !== Math.floor(prev / 2) && intro.shown < len) SFX.blip();
    }
  }
  if (state !== 'play') return;

  // movement (relative to camera yaw)
  const locked = dlg.open || ui.mode || action;
  let fwd = 0, side = 0;
  if (!locked) {
    if (keys.KeyW || keys.ArrowUp) fwd += 1;
    if (keys.KeyS || keys.ArrowDown) fwd -= 1;
    if (keys.KeyD || keys.ArrowRight) side += 1;
    if (keys.KeyA || keys.ArrowLeft) side -= 1;
  }
  player.moving = fwd !== 0 || side !== 0;
  if (player.moving) {
    const fX = -Math.sin(camYaw), fY = -Math.cos(camYaw);
    let wx2 = fX * fwd - fY * side, wy2 = fY * fwd + fX * side;
    const len = Math.hypot(wx2, wy2) || 1;
    const coffee = Date.now() < player.coffeeUntil ? 1.35 : 1;
    const sp = (keys.ShiftLeft || keys.ShiftRight ? 150 : 105) * coffee * dt;
    tryMove(player, wx2 / len * sp, wy2 / len * sp);
    player.vyaw = Math.atan2(wx2, wy2);
    player.step += dt * 11;
  }

  // auto-pickup
  for (let i = groundItems.length - 1; i >= 0; i--) {
    const it = groundItems[i];
    if ((it.type === 'shell' || it.type === 'fruit') && dist(player.x, player.y, it.x, it.y) < 13) {
      groundItems.splice(i, 1);
      addItem(it.type); SFX.pickup();
      toast(T('got', { i: T('i_' + it.type) }));
    }
  }
  spawnTimer -= dt;
  if (spawnTimer <= 0) { spawnTimer = 5; fillSpawns(false); }

  for (const it of groundItems) {
    if (it.type !== 'fish') continue;
    it.ph += dt;
    const nx = it.x + Math.cos(it.ph * 0.6) * 6 * dt, ny = it.y + Math.sin(it.ph * 0.4) * 6 * dt;
    if (tileAt(nx, ny) === T_WATER) { it.x = nx; it.y = ny; }
  }

  for (const n of npcs) {
    n.t -= dt;
    if (n.state === 'idle') {
      if (n.t <= 0) {
        for (let k = 0; k < 12; k++) {
          const a = rnd(TAU), d = rnd(24, 70);
          const tx = n.x + Math.cos(a) * d, ty = n.y + Math.sin(a) * d;
          if (tileAt(tx, ty) === T_GRASS && !insideBuilding(tx, ty)) { n.tx = tx; n.ty = ty; n.state = 'walk'; break; }
        }
        n.t = rnd(2, 5);
      }
    } else {
      const dx = n.tx - n.x, dy = n.ty - n.y, d = Math.hypot(dx, dy);
      if (d < 3 || n.t < -6) { n.state = 'idle'; n.t = rnd(1.5, 4.5); }
      else {
        const sp = 26 * dt;
        tryMove(n, dx / d * sp, dy / d * sp);
        n.facing = Math.abs(dx) > Math.abs(dy) ? (dx < 0 ? 'left' : 'right') : (dy < 0 ? 'up' : 'down');
        n.step += dt * 8;
      }
    }
  }

  updateExpansion(dt);

  if (dlg.open) {
    const line = dlg.lines[dlg.li], prev = dlg.shown;
    dlg.shown = Math.min(line.length, dlg.shown + dt * 34);
    if (Math.floor(dlg.shown / 2) !== Math.floor(prev / 2) && dlg.shown < line.length) SFX.blip();
  }
  for (let i = toasts.length - 1; i >= 0; i--) {
    toasts[i].t += dt;
    if (toasts[i].t > 2.8) toasts.splice(i, 1);
  }

  // camera follow with lag
  const k = 1 - Math.pow(0.002, dt);
  cam.x = lerp(cam.x, player.x, k);
  cam.y = lerp(cam.y, player.y, k);

  persistT += dt;
  if (persistT > 12) { persistT = 0; persist(); }
}

function tryMove(ent, dx, dy) {
  const passable = (x, y) =>
    isLand(x, y) && !insideBuilding(x, y) &&
    trees.every(t => dist(x, y, t.x, t.y) > 9) &&
    rocks.every(r => r.broken || dist(x, y, r.x, r.y) > 10);
  if (passable(ent.x + dx, ent.y)) ent.x += dx;
  if (passable(ent.x, ent.y + dy)) ent.y += dy;
  ent.x = clamp(ent.x, 8, WORLD_W - 8);
  ent.y = clamp(ent.y, 8, WORLD_H - 8);
}

let vignetteCv = null;
function makeVignette() {
  vignetteCv = document.createElement('canvas');
  vignetteCv.width = Math.max(2, Math.floor(view.w / 2));
  vignetteCv.height = Math.max(2, Math.floor(view.h / 2));
  const g = vignetteCv.getContext('2d');
  const grad = g.createRadialGradient(
    vignetteCv.width / 2, vignetteCv.height / 2, Math.min(vignetteCv.width, vignetteCv.height) * 0.42,
    vignetteCv.width / 2, vignetteCv.height / 2, Math.max(vignetteCv.width, vignetteCv.height) * 0.72);
  grad.addColorStop(0, 'rgba(20,15,40,0)');
  grad.addColorStop(1, 'rgba(20,15,40,0.38)');
  g.fillStyle = grad;
  g.fillRect(0, 0, vignetteCv.width, vignetteCv.height);
}

// (2D character/world sprites replaced by the 3D engine below)
function drawNook(c, x, y, s, talking) {
  const t = gameTime();

  c.fillStyle = '#8a6644';

  c.fillStyle = '#bfe3a8';
  c.beginPath(); c.arc(0, 20, 4, 0, TAU); c.fill();
  c.fillStyle = '#6e4f33';
  c.beginPath(); c.arc(-12, -16, 5.5, 0, TAU); c.arc(12, -16, 5.5, 0, TAU); c.fill();
  c.fillStyle = '#8a6644';
  c.beginPath(); c.arc(0, -8, 16, 0, TAU); c.fill();
  c.fillStyle = '#54402c';
  c.beginPath(); c.ellipse(-6.5, -10, 6, 4.6, -0.25, 0, TAU); c.fill();
  c.beginPath(); c.ellipse(6.5, -10, 6, 4.6, 0.25, 0, TAU); c.fill();
  c.fillStyle = '#e8d6b8';
  c.beginPath(); c.ellipse(0, -2.5, 8.5, 6.5, 0, 0, TAU); c.fill();
  const blink = Math.sin(t * 0.9) > 0.97;
  if (!blink) {
    c.fillStyle = '#fff';
    c.beginPath(); c.arc(-6.5, -10, 2.6, 0, TAU); c.arc(6.5, -10, 2.6, 0, TAU); c.fill();
    c.fillStyle = '#1d160f';
    c.beginPath(); c.arc(-6, -9.7, 1.4, 0, TAU); c.arc(7, -9.7, 1.4, 0, TAU); c.fill();
  } else {
    c.strokeStyle = '#1d160f'; c.lineWidth = 1.2;
    c.beginPath(); c.moveTo(-9, -10); c.lineTo(-4, -10); c.moveTo(4, -10); c.lineTo(9, -10); c.stroke();
  }
  c.fillStyle = '#3a2c1d';
  c.beginPath(); c.ellipse(0, -4.5, 2.6, 1.9, 0, 0, TAU); c.fill();
  c.strokeStyle = '#3a2c1d'; c.lineWidth = 1.1;
  const open = talking ? (Math.sin(t * 14) * 0.5 + 0.5) * 2.5 : 0;
  c.beginPath(); c.arc(0, -1 + open * 0.3, 3.5 + open * 0.2, 0.25, Math.PI - 0.25); c.stroke();
  c.restore();
}

// ----- icons -----
function drawIcon(type, x, y, s) {
  ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
  if (drawIconEx(type)) { ctx.restore(); return; }
  if (type === 'shell') {
    ctx.fillStyle = '#f1b8c4';
    ctx.beginPath(); ctx.moveTo(0, 4); ctx.arc(0, 0, 5, Math.PI * 0.15, Math.PI * 0.85, true); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#d98da0'; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, 4); ctx.lineTo(-3, -3); ctx.moveTo(0, 4); ctx.lineTo(0, -4.6); ctx.moveTo(0, 4); ctx.lineTo(3, -3);
    ctx.stroke();
  } else if (type === 'fruit') {
    ctx.fillStyle = '#ffab66';
    ctx.beginPath(); ctx.arc(0, 0.5, 4.6, 0, TAU); ctx.fill();
    ctx.fillStyle = '#ff8a4d';
    ctx.beginPath(); ctx.arc(1.4, 1.4, 3, 0, TAU); ctx.fill();
    ctx.fillStyle = '#4d8f3c';
    ctx.beginPath(); ctx.ellipse(1.4, -4.4, 2.4, 1.2, 0.6, 0, TAU); ctx.fill();
  } else if (type === 'fish') {
    ctx.fillStyle = '#6db3d8';
    ctx.beginPath(); ctx.ellipse(-0.5, 0, 4.6, 2.8, 0, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3.4, 0); ctx.lineTo(6.4, -2.6); ctx.lineTo(6.4, 2.6); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#173b4f';
    ctx.beginPath(); ctx.arc(-2.6, -0.6, 0.8, 0, TAU); ctx.fill();
  } else if (type === 'fossil') {
    ctx.strokeStyle = '#9a7d5a'; ctx.lineWidth = 1.6;
    ctx.beginPath();
    for (let a = 0; a < TAU * 2.1; a += 0.3) {
      const r = 0.9 + a * 0.75;
      const px = Math.cos(a) * r, py = Math.sin(a) * r;
      a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
  } else if (type === 'flower') {
    ctx.fillStyle = '#ff6f87';
    for (let i = 0; i < 5; i++) {
      const a = i / 5 * TAU;
      ctx.beginPath(); ctx.arc(Math.cos(a) * 3, Math.sin(a) * 3, 2.4, 0, TAU); ctx.fill();
    }
    ctx.fillStyle = '#ffe27a';
    ctx.beginPath(); ctx.arc(0, 0, 2, 0, TAU); ctx.fill();
  } else if (type === 'seeds') {
    ctx.fillStyle = '#d8b27a';
    roundRect(ctx, -4, -3, 8, 8, 2); ctx.fill();
    ctx.fillStyle = '#b58e58';
    ctx.fillRect(-4, -3, 8, 2.4);
    ctx.fillStyle = '#6b4f2f';
    ctx.beginPath(); ctx.arc(-1.4, 1.6, 0.9, 0, TAU); ctx.arc(1.6, 2.6, 0.9, 0, TAU); ctx.arc(0.6, 0, 0.9, 0, TAU); ctx.fill();
  } else if (type === 'rod') {
    ctx.strokeStyle = '#8a6644'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(-4.5, 4.5); ctx.lineTo(4, -4); ctx.stroke();
    ctx.strokeStyle = '#9db4c0'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(4, -4); ctx.quadraticCurveTo(5.5, 0, 3.5, 2.5); ctx.stroke();
    ctx.fillStyle = '#e2574c';
    ctx.beginPath(); ctx.arc(3.5, 3, 1.4, 0, TAU); ctx.fill();
  } else if (type === 'shovel') {
    ctx.strokeStyle = '#8a6644'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(0, 1.5); ctx.stroke();
    ctx.strokeStyle = '#8a6644'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(-2, -5); ctx.lineTo(2, -5); ctx.stroke();
    ctx.fillStyle = '#9aa3ad';
    ctx.beginPath(); ctx.moveTo(-2.6, 1.5); ctx.lineTo(2.6, 1.5); ctx.lineTo(1.8, 5.5); ctx.lineTo(-1.8, 5.5); ctx.closePath(); ctx.fill();
  } else if (type === 'coffee') {
    ctx.fillStyle = '#fff';
    roundRect(ctx, -3.5, -2, 7, 6, 2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(4, 0.5, 1.8, -1, 1.6); ctx.stroke();
    ctx.fillStyle = '#6b4a2a';
    ctx.beginPath(); ctx.ellipse(0, -1.6, 3, 1, 0, 0, TAU); ctx.fill();
    ctx.strokeStyle = 'rgba(160,160,160,0.9)'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(-1, -3.5); ctx.quadraticCurveTo(-2, -5, -1, -6.5); ctx.moveTo(1.4, -3.5); ctx.quadraticCurveTo(0.4, -5, 1.4, -6.5); ctx.stroke();
  } else if (type === 'bell') {
    ctx.fillStyle = '#ffd95e';
    ctx.beginPath(); ctx.arc(0, 0, 4.6, 0, TAU); ctx.fill();
    ctx.strokeStyle = '#c79a2a'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, 4.6, 0, TAU); ctx.stroke();
    ctx.fillStyle = '#c79a2a';
    ctx.font = '800 6px Nunito, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('★', 0, 2.2);
  }
  ctx.restore();
}

function renderParticles() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  for (const p of particles) {
    if (p.kind === 'snow') {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.6 + Math.sin(p.ph) * 0.5, 0, TAU); ctx.fill();
    } else if (p.kind === 'leaf') {
      ctx.fillStyle = p.c;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.sin(p.ph) * 1.2);
      ctx.beginPath(); ctx.ellipse(0, 0, 3.4, 1.8, 0, 0, TAU); ctx.fill();
      ctx.restore();
    } else if (p.kind === 'petal') {
      ctx.fillStyle = 'rgba(255,190,210,0.9)';
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.sin(p.ph) * 0.9);
      ctx.beginPath(); ctx.ellipse(0, 0, 2.6, 1.5, 0, 0, TAU); ctx.fill();
      ctx.restore();
    } else {
      const a = 0.25 + 0.25 * Math.sin(p.ph * 2);
      ctx.fillStyle = dayPeriod() === 'night' ? `rgba(255,250,170,${a})` : `rgba(255,255,255,${a * 0.7})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.3, 0, TAU); ctx.fill();
    }
  }
}
function renderLightAndVignette() {

function panel(x, y, w, h, alpha = 0.93) {
  ctx.save();
  ctx.shadowColor = 'rgba(60,40,10,0.25)';
  ctx.shadowBlur = 8; ctx.shadowOffsetY = 3;
  ctx.fillStyle = `rgba(255,250,231,${alpha})`;
  roundRect(ctx, x, y, w, h, 14); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = 'rgba(185,141,82,0.8)'; ctx.lineWidth = 2;
  roundRect(ctx, x, y, w, h, 14); ctx.stroke();
}
function fmtTime(d = new Date()) {
  let h = d.getHours();
  const ap = h < 12 ? 'AM' : 'PM';
  h = (h + 11) % 12 + 1;
  return `${h}:${String(d.getMinutes()).padStart(2, '0')} ${ap}`;
}
const DAYS_EN = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const DAYS_ES = ['dom', 'lun', 'mar', 'mié', 'jue', 'vie', 'sáb'];
const MON_EN = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const MON_ES = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
function fmtDate(d = new Date()) {
  return lang === 'es'
    ? `${DAYS_ES[d.getDay()]}, ${d.getDate()} ${MON_ES[d.getMonth()]}`
    : `${DAYS_EN[d.getDay()]}, ${MON_EN[d.getMonth()]} ${d.getDate()}`;
}
function wrapText(text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line = '', yy = y;
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, yy); line = word; yy += lh;
    } else line = test;
  }
  ctx.fillText(line, x, yy);
}

// ----- title / slots / intro scenes -----
function renderBeachScene() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  const [top, bottom] = skyColors();
  const g = ctx.createLinearGradient(0, 0, 0, view.h);
  g.addColorStop(0, top); g.addColorStop(0.62, bottom);
  g.addColorStop(0.62, '#3f9bd0'); g.addColorStop(1, '#2f7cb0');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, view.w, view.h);
  const t = gameTime();
  const h = nowHour();
  const isDay = h >= 6 && h < 19;
  const progT = isDay ? (h - 6) / 13 : ((h >= 19 ? h - 19 : h + 5) / 11);
  const ax = lerp(view.w * 0.12, view.w * 0.88, progT);
  const ay = view.h * 0.5 - Math.sin(progT * Math.PI) * view.h * 0.34;
  if (isDay) {
    ctx.fillStyle = '#fff3b8';
    ctx.beginPath(); ctx.arc(ax, ay, 34, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(255,243,184,0.25)';
    ctx.beginPath(); ctx.arc(ax, ay, 52, 0, TAU); ctx.fill();
  } else {
    ctx.fillStyle = '#f2f4e9';
    ctx.beginPath(); ctx.arc(ax, ay, 26, 0, TAU); ctx.fill();
    ctx.fillStyle = top;
    ctx.beginPath(); ctx.arc(ax - 10, ay - 6, 22, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for (let i = 0; i < 40; i++) {
      const sx = hash2(i, 7) * view.w, sy = hash2(i, 13) * view.h * 0.55;
      ctx.globalAlpha = 0.3 + (Math.sin(t * 2 + i) * 0.5 + 0.5) * 0.5;
      ctx.fillRect(sx, sy, 2, 2);
    }
    ctx.globalAlpha = 1;
  }
  for (const c of clouds) {
    const sx = ((c.x * 3) % (view.w + 480)) - 240;
    const sy = c.y * view.h * 0.5;
    ctx.fillStyle = dayPeriod() === 'night' ? 'rgba(190,200,235,0.10)' : 'rgba(255,255,255,0.34)';
    ctx.beginPath();
    ctx.ellipse(sx, sy, 56 * c.s, 16 * c.s, 0, 0, TAU);
    ctx.ellipse(sx + 34 * c.s, sy + 6 * c.s, 38 * c.s, 13 * c.s, 0, 0, TAU);
    ctx.ellipse(sx - 36 * c.s, sy + 7 * c.s, 34 * c.s, 12 * c.s, 0, 0, TAU);
    ctx.fill();
  }
  for (let i = 0; i < 3; i++) {
    const wy = view.h * 0.62 + 18 + i * 26 + Math.sin(t * 1.1 + i * 2) * 4;
    ctx.strokeStyle = `rgba(255,255,255,${0.22 - i * 0.05})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let xx = -20; xx <= view.w + 20; xx += 30) {
      const yy = wy + Math.sin(xx * 0.02 + t * 1.6 + i) * 5;
      xx === -20 ? ctx.moveTo(xx, yy) : ctx.lineTo(xx, yy);
    }
    ctx.stroke();
  }
  ctx.fillStyle = SEASON === 'winter' ? '#ded7c4' : '#ecd9a2';
  ctx.beginPath();
  ctx.moveTo(0, view.h);
  ctx.quadraticCurveTo(view.w * 0.5, view.h * 0.78, view.w, view.h);
  ctx.closePath(); ctx.fill();
}
function renderTitle() {
  renderBeachScene();
  const t = gameTime();
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  const lx = view.w / 2, ly = view.h * 0.3 + Math.sin(t * 1.3) * 5;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.font = `900 ${Math.min(76, view.w / 9)}px Nunito, sans-serif`;
  ctx.lineWidth = 10; ctx.lineJoin = 'round';
  ctx.strokeStyle = '#7a5230';
  ctx.strokeText('Animal Isle', lx, ly);
  ctx.fillStyle = '#fff6dd';
  ctx.fillText('Animal Isle', lx, ly);
  ctx.fillStyle = '#4d8f5c';
  ctx.save();
  ctx.translate(lx + Math.min(76, view.w / 9) * 2.6, ly - 44);

function makeNoiseTexture(base, spots, n, sz) {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const g = c.getContext('2d');
  g.fillStyle = base; g.fillRect(0, 0, 64, 64);
  for (let i = 0; i < n; i++) {
    g.fillStyle = spots[i % spots.length];
    g.fillRect(Math.floor(Math.random() * 64), Math.floor(Math.random() * 64), sz, sz);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.magFilter = THREE.NearestFilter;
  return tex;
}

function makePlantMesh(stage) {
  const g = new THREE.Group();
  const stemMat = lam('#3f8a3f');
  if (stage === 0) {
    const mound = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 6), lam('#8a6644'));
    mound.scale.y = 0.4; mound.position.y = 0.03;
    const spr = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.18, 0.05), stemMat);
    spr.position.y = 0.16;
    g.add(mound, spr);
  } else if (stage === 1) {
    const stem = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.3, 0.05), stemMat);
    stem.position.y = 0.15;
    const le1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.04, 0.1), lam('#5dbb4e'));
    le1.position.set(-0.12, 0.25, 0);
    const le2 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.04, 0.1), lam('#5dbb4e'));
    le2.position.set(0.12, 0.25, 0);
    g.add(stem, le1, le2);
  } else if (stage === 2) {
    const stem = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.5, 0.05), stemMat);
    stem.position.y = 0.25;
    const bud = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 6), lam('#88c860'));
    bud.position.y = 0.55;
    g.add(stem, bud);
  } else {
    const stem = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.55, 0.05), stemMat);
    stem.position.y = 0.27;
    const center = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 6), lam('#ffe27a'));
    center.position.y = 0.6;
    g.add(stem, center);
    for (let i = 0; i < 5; i++) {
      const pet = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.05, 0.13), lam('#ff6f87'));
      pet.position.set(Math.cos(i / 5 * TAU) * 0.14, 0.6, Math.sin(i / 5 * TAU) * 0.14);
      g.add(pet);
    }
  }
  g.userData.stage = stage;
  return g;
}


function lerpAngle(a, b, t) {
  let d = (b - a) % TAU;
  if (d > Math.PI) d -= TAU;
  if (d < -Math.PI) d += TAU;
  return a + d * t;
}
function syncChar(m, wx, wy, yaw, moving, step, dt) {
  m.position.set(wx * U, groundY(wx, wy), wy * U);
  m.userData.yaw = lerpAngle(m.userData.yaw || 0, yaw, 1 - Math.pow(0.0001, dt));
  m.rotation.y = m.userData.yaw;
  const sw = moving ? Math.sin(step) * 0.7 : 0;
  if (m.userData.l1) { m.userData.l1.rotation.x = sw; m.userData.l2.rotation.x = -sw; }
  if (m.userData.a1) { m.userData.a1.rotation.x = -sw * 0.8; m.userData.a2.rotation.x = sw * 0.8; }
  const bob = moving ? Math.abs(Math.sin(step)) * 0.05 : 0;
  if (m.userData.body) m.userData.body.position.y = 0.58 + bob;
  if (m.userData.head) m.userData.head.position.y = 1.12 + bob;
}

// ---- smooth terrain heights ----
let hfield = null;
function computeHeights() {
  const lv = (x, y) => {
    if (x < 0 || y < 0 || x >= MW || y >= MH) return 0;
    return map[y][x] === T_GRASS ? 1 : map[y][x] === T_SAND ? 0.55 : 0;
  };
  hfield = [];
  for (let vy = 0; vy <= MH; vy++) {
    hfield[vy] = [];
    for (let vx = 0; vx <= MW; vx++) {
      let s = 0, n = 0;
      for (let dy = -2; dy <= 1; dy++) for (let dx = -2; dx <= 1; dx++) { s += lv(vx + dx, vy + dy); n++; }
      hfield[vy][vx] = (s / n) * 1.15 - 0.72;
    }
  }
}
function heightAt(wx, wy) {
  if (!hfield) return 0;
  const fx = clamp(wx / TILE, 0, MW - 0.001), fy = clamp(wy / TILE, 0, MH - 0.001);
  const x0 = Math.floor(fx), y0 = Math.floor(fy);
  const tx = fx - x0, ty = fy - y0;
  return lerp(lerp(hfield[y0][x0], hfield[y0][x0 + 1], tx), lerp(hfield[y0 + 1][x0], hfield[y0 + 1][x0 + 1], tx), ty);
}

function findDockSpot(cx, cy) {
  for (let a = 0.4; a < 0.4 + TAU; a += 0.13) {
    let lx = 0, ly = 0, found = false;
    for (let r = 5; r < 52; r++) {
      const tx = Math.floor(cx + Math.cos(a) * r), ty = Math.floor(cy + Math.sin(a) * r * 0.8);
      if (tx < 2 || ty < 2 || tx >= MW - 2 || ty >= MH - 2) break;
      if (map[ty][tx] === T_WATER) {
        if (found) return { x: lx * TILE + 8, y: ly * TILE + 8, dx: Math.cos(a), dy: Math.sin(a) };
        break;
      }
      if (map[ty][tx] === T_SAND) { lx = tx; ly = ty; found = true; }
      else found = false;
    }
  }
  return null;
}
function boatPoint() {
  if (!dockSpot) return null;
  return { x: dockSpot.x + dockSpot.dx * 44, y: dockSpot.y + dockSpot.dy * 44 };
}

// ---- biome island generation ----
function genBiomeWorld(b) {
  const rng = mulberry32(((prog ? prog.seed : 7) + b.length * 7919) >>> 0);
  const cx = MW / 2, cy = MH / 2;
  const p1 = rng() * TAU, p2 = rng() * TAU;
  const rx = MW * (b === 'market' ? 0.16 : 0.26), ry = MH * (b === 'market' ? 0.16 : 0.24);
  map = [];
  for (let y = 0; y < MH; y++) {
    map[y] = [];
    for (let x = 0; x < MW; x++) {
      const nx = (x - cx) / rx, ny = (y - cy) / ry;
      let d = Math.sqrt(nx * nx + ny * ny);
      d += 0.09 * Math.sin(x * 0.3 + p1) + 0.07 * Math.cos(y * 0.27 + p2);
      let t = d < 0.7 ? T_GRASS : d < 0.95 ? T_SAND : T_WATER;
      if (x < 2 || y < 2 || x >= MW - 2 || y >= MH - 2) t = T_WATER;
      map[y][x] = t;
    }
  }
  if (b === 'volcano') { // lava pools
    for (let p = 0; p < 3; p++) {
      const px = cx + (rng() * 2 - 1) * rx * 0.5, py = cy + (rng() * 2 - 1) * ry * 0.5;
      for (let y = 0; y < MH; y++) for (let x = 0; x < MW; x++) {
        if (Math.hypot(x - px, y - py) < 2 + rng() && map[y][x] === T_GRASS) map[y][x] = T_WATER;
      }
    }
  }
  plots = {};
  wildflowers = []; plants = []; npcs = []; statics = [];
  trees = []; rocks = [];
  const treeKind = b === 'tropical' ? 'palm' : b === 'glacial' ? 'ice' : b === 'volcano' ? 'dead' : 'palm';
  const nTrees = b === 'market' ? 6 : 26;
  let tries = 0;
  while (trees.length < nTrees && tries++ < 3000) {
    const x = rng() * WORLD_W, y = rng() * WORLD_H;
    if (tileAt(x, y) !== T_GRASS) continue;
    if (!trees.every(t => dist(x, y, t.x, t.y) > 46)) continue;
    trees.push({ x, y, sway: rng() * TAU, kind: treeKind });
  }
  const ore = b === 'tropical' ? null : b === 'glacial' ? 'cristal_hielo' : b === 'volcano' ? 'obsidiana' : null;
  tries = 0;
  const nRocks = b === 'market' ? 0 : 9;
  while (rocks.length < nRocks && tries++ < 2000) {
    const x = rng() * WORLD_W, y = rng() * WORLD_H;
    if (tileAt(x, y) !== T_GRASS) continue;
    if (!rocks.every(r => dist(x, y, r.x, r.y) > 60) || !trees.every(t => dist(x, y, t.x, t.y) > 26)) continue;
    rocks.push({ x, y, s: 0.8 + rng() * 0.6, ore: ore && rng() < 0.7 ? ore : null, hits: 0, broken: false, respawn: 0 });
  }
  foamEdges = [];
  const dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];
  for (let y = 1; y < MH - 1; y++) for (let x = 1; x < MW - 1; x++) {
    if (map[y][x] === T_WATER) continue;
    dirs.forEach(([dx, dy], side) => {
      if (map[y + dy][x + dx] === T_WATER) foamEdges.push({ x, y, side, ph: hash2(x, y) * TAU });
    });
  }
  palOverride = BIOME_PAL[b] || null;
  renderTerrain(prog ? prog.seed : 7);
  computeHeights();
  dockSpot = findDockSpot(cx, cy) || { x: cx * TILE, y: (cy + 8) * TILE, dx: 0, dy: 1 };
  spawnPt = { x: dockSpot.x - dockSpot.dx * 24, y: dockSpot.y - dockSpot.dy * 24 };
  groundItems.length = 0;
  // market stalls & vendors
  if (b === 'market') {
    const mx = cx * TILE, my = cy * TILE;
    statics = [
      { x: mx - 40, y: my - 30, kind: 'turtle', name: T('st_remo'), color: '#7ecb5f', act: 'dlg', lines: 'dlg_remo' },
      { x: mx + 44, y: my - 30, kind: 'owl', name: T('st_rusty'), color: '#b98d52', act: 'market_tools', stall: true },
      { x: mx, y: my + 44, kind: 'sheep', name: T('st_tilda'), color: '#f2f2ec', act: 'clothes', stall: true },
    ];
  }
}

const AREA_SPAWN = {
  island: { shell: 12, fruit: 9, fossil: 5, fish: 6 },
  tropical: { coco: 8, concha_tropical: 8, pina: 5, fish: 7 },
  glacial: { cristal_hielo: 4, fossil: 4, fish: 6 },
  volcano: { fossil: 4, fish: 3 },
  market: {},
};
function spawnItem(type) {
  let p = null;
  if (type === 'shell' || type === 'concha_tropical') p = randTileOfType(T_SAND);
  else if (type === 'fossil' || type === 'cristal_hielo' || type === 'pina') {
    p = randTileOfType(T_GRASS, (x, y) => trees.every(t => dist(x, y, t.x, t.y) > 20));
  } else if (type === 'fish') {
    p = randTileOfType(T_WATER, (x, y, tx, ty) => nearLand(tx, ty));
  } else if (type === 'fruit' || type === 'coco') {
    const t = pick(trees);
    if (t) p = { x: t.x + rnd(-18, 18), y: t.y + rnd(6, 18) };
    if (p && (tileAt(p.x, p.y) !== T_GRASS || insideBuilding(p.x, p.y))) p = null;
  }
  if (p && groundItems.every(it => dist(it.x, it.y, p.x, p.y) > 20)) {
    groundItems.push({ type, x: p.x, y: p.y, ph: rnd(TAU) });
  }
}
function fillSpawns(initial) {
  if (area.type === 'interior') return;
  const table = AREA_SPAWN[areaKind()] || {};
  for (const type in table) {
    const want = table[type];
    const have = groundItems.filter(i => i.type === type).length;
    const n = initial ? want - have : (have < want && Math.random() < 0.5 ? 1 : 0);
    for (let i = 0; i < n; i++) spawnItem(type);
  }
}

/* ===== EXPANSION part 3: smooth 3D models (terrain, chars, trees, rocks, items) ===== */

function buildTerrainMesh() {
  const pal = palOverride || {
    spring: { grass: ['#62b84e', '#5bb046'], sand: ['#ecd9a2', '#e5d199'] },
    summer: { grass: ['#54ad47', '#4da540'], sand: ['#ecd9a2', '#e5d199'] },
    autumn: { grass: ['#a3a953', '#99a04c'], sand: ['#e6d3a0', '#dfcb96'] },
    winter: { grass: ['#e9eef3', '#e1e8ef'], sand: ['#ded7c4', '#d6cfba'] },
  }[SEASON];
  const cGrass = hexToRgb(pal.grass[0].startsWith('#') ? pal.grass[0] : '#54ad47');
  const cSand = hexToRgb(pal.sand[0].startsWith('#') ? pal.sand[0] : '#ecd9a2');
  const cDeep = area.biome === 'volcano' ? [40, 26, 26] : area.type === 'interior' ? [30, 24, 20] : [52, 110, 150];
  const W1 = MW + 1, H1 = MH + 1;
  const pos = new Float32Array(W1 * H1 * 3);
  const col = new Float32Array(W1 * H1 * 3);
  const uv = new Float32Array(W1 * H1 * 2);
  for (let vy = 0; vy < H1; vy++) for (let vx = 0; vx < W1; vx++) {
    const i = vy * W1 + vx;
    const h = hfield[vy][vx];
    pos[i * 3] = vx; pos[i * 3 + 1] = h; pos[i * 3 + 2] = vy;
    uv[i * 2] = vx * 0.5; uv[i * 2 + 1] = vy * 0.5;
    const t1 = clamp((h + 0.5) / 0.35, 0, 1);   // deep -> sand
    const t2 = clamp((h - 0.02) / 0.3, 0, 1);   // sand -> grass
    const j = 0.94 + hash2(vx, vy) * 0.1;       // per-vertex variation
    for (let k = 0; k < 3; k++) {
      const c = lerp(lerp(cDeep[k], cSand[k], t1), cGrass[k], t2) * j;
      col[i * 3 + k] = clamp(c / 255, 0, 1);
    }
  }
  const idx = [];
  for (let y = 0; y < MH; y++) for (let x = 0; x < MW; x++) {
    const a = y * W1 + x, b = a + 1, c = a + W1, d = c + 1;
    idx.push(a, c, b, b, c, d);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ vertexColors: true, map: tileTex }));
  mesh.receiveShadow = true;
  return mesh;
}

// ---- outfit material ----
function currentOutfit() {
  const id = prog && prog.outfit ? prog.outfit : 'red';
  return OUTFITS.find(o => o.id === id) || OUTFITS[0];
}
function outfitMaterial(o) {
  if (!o.pat) return lam(o.c);
  const c = document.createElement('canvas');
  c.width = c.height = 32;
  const g = c.getContext('2d');
  g.fillStyle = o.c; g.fillRect(0, 0, 32, 32);
  g.fillStyle = o.c2;
  if (o.pat === 'stripes') { for (let y = 0; y < 32; y += 8) g.fillRect(0, y, 32, 4); }
  else if (o.pat === 'dots') { for (let y = 4; y < 32; y += 10) for (let x = 4; x < 32; x += 10) { g.beginPath(); g.arc(x, y, 2.6, 0, TAU); g.fill(); } }
  else if (o.pat === 'star') {
    g.font = '900 18px sans-serif'; g.textAlign = 'center'; g.fillText('★', 16, 23);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2, 2);
  return new THREE.MeshLambertMaterial({ map: tex });
}

// ---- trees: smooth oaks, palms, ice spikes, dead trees ----

  const g = new THREE.Group();

    let px = 0, py = 0;
    for (let i = 0; i < 3; i++) {
      const seg = new THREE.Mesh(new THREE.CylinderGeometry(0.08 - i * 0.012, 0.1 - i * 0.012, 0.65, 8), lam('#9a7a4f'));
      px += i * 0.09;
      seg.position.set(px, py + 0.32, 0);
      seg.rotation.z = -0.14 * i;
      seg.castShadow = true;
      g.add(seg);
      py += 0.6;
    }
    for (let i = 0; i < 6; i++) {
      const a = i / 6 * TAU;
      const frond = new THREE.Mesh(new THREE.SphereGeometry(0.55, 8, 6), lam(i % 2 ? '#4da64d' : '#3f9440'));
      frond.position.set(px + Math.cos(a) * 0.55, py + 0.42, Math.sin(a) * 0.55);
      frond.scale.set(1, 0.18, 0.34);
      frond.rotation.y = -a;
      frond.rotation.z = 0.35;
      frond.castShadow = true;
      g.add(frond);
    }
    for (let i = 0; i < 2; i++) {
      const coco = new THREE.Mesh(new THREE.SphereGeometry(0.11, 10, 8), lam('#7c5a36'));
      coco.position.set(px + (i ? 0.14 : -0.1), py + 0.28, i ? 0.08 : -0.1);
      g.add(coco);
    }
  } else if (kind === 'ice') {
    const iceMat = new THREE.MeshPhongMaterial({ color: '#bfe8ff', transparent: true, opacity: 0.85, shininess: 120 });
    const c1 = new THREE.Mesh(new THREE.ConeGeometry(0.42, 2.3, 7), iceMat); c1.position.y = 1.15; c1.castShadow = true;
    const c2 = new THREE.Mesh(new THREE.ConeGeometry(0.22, 1.1, 6), iceMat); c2.position.set(0.4, 0.55, 0.1); c2.rotation.z = -0.25;
    const c3 = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.85, 6), iceMat); c3.position.set(-0.34, 0.42, -0.12); c3.rotation.z = 0.3;
    g.add(c1, c2, c3);
  } else if (kind === 'dead') {
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.14, 1.5, 8), lam('#4a3a34'));
    trunk.position.y = 0.75; trunk.castShadow = true;
    const b1 = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.06, 0.8, 6), lam('#4a3a34'));
    b1.position.set(0.3, 1.4, 0); b1.rotation.z = -0.8;
    const b2 = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.05, 0.6, 6), lam('#4a3a34'));
    b2.position.set(-0.25, 1.2, 0.1); b2.rotation.z = 0.9;
    g.add(trunk, b1, b2);
  } else {
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, 1.25, 10), lam('#7c5a36'));
    trunk.position.y = 0.62; trunk.castShadow = true;
    g.add(trunk);
    if (SEASON === 'winter') {
      const snow = new THREE.Mesh(new THREE.SphereGeometry(0.62, 12, 10), lam('#f4f8fc'));
      snow.position.y = 1.55; snow.scale.y = 0.6; snow.castShadow = true;
      g.add(snow);
    } else {
      const cols = SEASON === 'autumn' ? ['#c87c30', '#b96a26'] : SEASON === 'spring' ? ['#54b04a', '#479e3e'] : ['#3f9440', '#358536'];
      const blobs = [[0, 1.65, 0, 0.72], [0.42, 1.45, 0.18, 0.46], [-0.4, 1.4, -0.15, 0.44], [0.05, 2.1, -0.05, 0.45]];
      blobs.forEach((b, i) => {
        const lv = new THREE.Mesh(new THREE.IcosahedronGeometry(b[3], 1), lam(i % 2 ? cols[1] : cols[0]));
        lv.position.set(b[0], b[1], b[2]);
        lv.castShadow = true;
        g.add(lv);
      });
      const dotCol = SEASON === 'spring' ? '#ffc2d4' : '#ff9c4a';
      for (let i = 0; i < 3; i++) {
        const fr = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 8), lam(dotCol));

        g.add(fr);
      }
    }
  }
  g.position.set(tr.x * U, heightAt(tr.x, tr.y), tr.y * U);
  return g;
}

    for (let i = 0; i < 3; i++) {

}

function makeDockMesh() {
  const g = new THREE.Group();
  if (!dockSpot) return g;
  const dir = Math.atan2(dockSpot.dx, dockSpot.dy);
  const planks = new THREE.Group();
  for (let i = 0; i < 6; i++) {
    const p = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.1, 0.55), lam(i % 2 ? '#a87c4f' : '#9a7146'));
    p.position.set(0, 0, 0.3 + i * 0.55);
    p.castShadow = true; p.receiveShadow = true;
    planks.add(p);
    if (i % 2 === 0) {
      for (const sx of [-0.5, 0.5]) {
        const post = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.9, 8), lam('#7c5a36'));
        post.position.set(sx, -0.35, 0.3 + i * 0.55);
        planks.add(post);
      }
    }
  }
  planks.rotation.y = dir;
  g.add(planks);
  const boat = makeBoatMesh();
  const bp = boatPoint();
  boat.position.set((bp.x - dockSpot.x) * U, -0.25, (bp.y - dockSpot.y) * U);
  boat.rotation.y = dir + Math.PI / 2;
  g.userData.boat = boat;
  g.add(boat);
  g.position.set(dockSpot.x * U, heightAt(dockSpot.x, dockSpot.y) + 0.05, dockSpot.y * U);
  return g;
}

function makeBuildingMesh(key) {
  if (key === 'dock') return makeDockMesh();
  const plot = plots[key];
  const g = new THREE.Group();
  const w = BD[key].w * U, d = (BD[key].h - 2) * U, h = B3[key].h;
  if (key === 'tent') {
    const tent = new THREE.Mesh(new THREE.ConeGeometry(w * 0.88, h, 14), lam('#4d8f5c'));
    tent.position.y = h / 2; tent.castShadow = true;
    const opening = new THREE.Mesh(new THREE.ConeGeometry(0.4, h * 0.5, 12), lam('#2e5638'));
    opening.position.set(0, h * 0.25, w * 0.5);
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.6, 8), lam('#8a6644'));
    pole.position.y = h + 0.25;
    const flag = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.22), new THREE.MeshLambertMaterial({ color: '#ffd95e', side: THREE.DoubleSide }));
    flag.position.set(0.2, h + 0.4, 0);
    g.add(tent, opening, pole, flag);
    const signMat = new THREE.MeshBasicMaterial({ map: makeTextTexture(T('b_tent')), transparent: true });
    signRefs.push({ key, mat: signMat });
    const sign = new THREE.Mesh(new THREE.PlaneGeometry(1.9, 0.48), signMat);
    sign.position.set(0, h + 0.85, 0.2);
    g.add(sign);
  } else {
    const wallCol = { house: '#f0d8a8', shop: '#e8c98c', museum: '#e3d6bd', cafe: '#dcb88f', boutique: '#f4dce8', home1: '#cfe3f0', home2: '#e7d6ef' }[key];
    const roofCol = { house: '#d96f4e', shop: '#4d8f5c', museum: '#7a6a52', cafe: '#a0563c', boutique: '#c46a9a', home1: '#5f8fc0', home2: '#9a6fc0' }[key];
    const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), lam(wallCol));
    body.position.y = h / 2; body.castShadow = true; body.receiveShadow = true;
    const rr = (w / 2 + 0.25) * 1.414;

function buildInteriorScene(group) {
  const def = INTERIORS[area.key] || INTERIORS.house;

  const floorY = heightAt(c.x, c.y);
  const wallMat = lam(def.wall || '#e8d2ae');
  const wallH = 2.4;
  const mkWall = (wx, wz, ww, wd) => {
    const wmesh = new THREE.Mesh(new THREE.BoxGeometry(ww, wallH, wd), wallMat);
    wmesh.position.set(wx, floorY + wallH / 2, wz);
    wmesh.receiveShadow = true;
    group.add(wmesh);
  };
  mkWall(cxu, czu - ch / 2 - 0.15, cw + 0.6, 0.3);                       // north
  mkWall(cxu - cw / 2 - 0.15, czu, 0.3, ch + 0.6);                       // west
  mkWall(cxu + cw / 2 + 0.15, czu, 0.3, ch + 0.6);                       // east

  mat.rotation.x = -Math.PI / 2;

  mat.position.set(ex.x * U, floorY + 0.03, ex.y * U);

  lampI.position.set(cxu, floorY + 2.1, czu);
  group.add(lampI);
}

/* ===== EXPANSION part 5: enemies, actions (fish/mine/dig/swing), interact ===== */

function spawnEnemies() {
  enemies = [];
  for (let i = 0; i < 7; i++) {
    const p = randTileOfType(T_GRASS, (x, y) => dist(x, y, player.x, player.y) > 100);
    if (p) enemies.push({ x: p.x, y: p.y, hp: 3, kind: 'magma', t: rnd(2), vyaw: 0, kbx: 0, kby: 0, hop: rnd(TAU) });
  }
}
function damagePlayer(fromX, fromY) {
  if (invulnT > 0) return;
  player.hp--;
  invulnT = 1.2;
  SFX.hurt();
  const d = Math.max(1, dist(fromX, fromY, player.x, player.y));
  tryMove(player, (player.x - fromX) / d * 18, (player.y - fromY) / d * 18);
  if (player.hp <= 0) {
    startLoading('loading_sail', () => {
      if (area.type !== 'island') goHome();
      player.hp = 6;
      toast(T('fainted'));
    });
  }
}
function updateEnemies(dt) {
  invulnT = Math.max(0, invulnT - dt);
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.t -= dt;
    e.hop += dt * 6;
    const d = dist(e.x, e.y, player.x, player.y);
    let dx = 0, dy = 0;
    if (e.kbx || e.kby) {
      dx = e.kbx * dt * 6; dy = e.kby * dt * 6;
      e.kbx *= Math.pow(0.01, dt); e.kby *= Math.pow(0.01, dt);
      if (Math.abs(e.kbx) < 1) { e.kbx = 0; e.kby = 0; }
    } else if (d < 130 && d > 4) {
      dx = (player.x - e.x) / d * 34 * dt;
      dy = (player.y - e.y) / d * 34 * dt;
    } else if (e.t <= 0) {
      e.t = rnd(1, 3);
      e.wx = rnd(-1, 1); e.wy = rnd(-1, 1);
    } else if (e.wx !== undefined) {
      dx = e.wx * 20 * dt; dy = e.wy * 20 * dt;
    }
    if (dx || dy) {
      tryMove(e, dx, dy);
      e.vyaw = Math.atan2(dx, dy);
    }
    if (d < 15 && !action) damagePlayer(e.x, e.y);
  }
}
function startSwing() {
  if (action || dlg.open || ui.mode) return;
  action = { kind: 'swing', t: 0 };
  SFX.swing();
  const fx = Math.sin(player.vyaw || 0), fy = Math.cos(player.vyaw || 0);
  let hitSomething = false;
  for (const e of enemies) {
    const dx = e.x - player.x, dy = e.y - player.y;
    const d = Math.hypot(dx, dy);
    if (d < 30 && (dx * fx + dy * fy) / Math.max(1, d) > -0.2) {
      e.hp--;
      e.kbx = dx / d * 30; e.kby = dy / d * 30;
      hitSomething = true;
      if (e.hp <= 0) {
        groundItems.push({ type: pick(['ember', 'ember', 'goo']), x: e.x, y: e.y, ph: rnd(TAU) });
        poof(e.x, e.y, '#ff7a3c');
        enemies.splice(enemies.indexOf(e), 1);
        toast(T('enemy_down'));
      }
    }
  }
  if (hitSomething) SFX.hit();
}

// ---- 3D particles ----
function poof(wx, wy, color, n = 10) {
  if (!renderer || !worldGroup) return;
  for (let i = 0; i < n; i++) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.09, 0.09), lam(color));
    m.position.set(wx * U + rnd(-0.2, 0.2), heightAt(wx, wy) + 0.3 + rnd(0.3), wy * U + rnd(-0.2, 0.2));
    worldGroup.add(m);
    particles3.push({ m, vx: rnd(-1.4, 1.4), vy: rnd(1.5, 3.2), vz: rnd(-1.4, 1.4), t: rnd(0.5, 0.85) });
  }
}
function updateParticles3(dt) {
  for (let i = particles3.length - 1; i >= 0; i--) {
    const p = particles3[i];
    p.t -= dt;
    p.vy -= 8 * dt;
    p.m.position.x += p.vx * dt;
    p.m.position.y += p.vy * dt;
    p.m.position.z += p.vz * dt;
    p.m.rotation.x += dt * 6;
    if (p.t <= 0) {
      if (worldGroup) worldGroup.remove(p.m);
      particles3.splice(i, 1);
    }
  }
}

// ---- fishing minigame ----
function rollFish() {
  const table = FISH_TABLE[areaKind()] || FISH_TABLE.island;
  let total = 0;
  for (const [, w] of table) total += w + (prog.tools.cana_dorada ? 0.5 : 0);
  let r = Math.random() * total;
  for (const [sp, w] of table) {
    r -= w + (prog.tools.cana_dorada ? 0.5 : 0);
    if (r <= 0) return sp;
  }
  return table[0][0];
}
function startFishing(spot) {
  action = {
    kind: 'fish', phase: 'cast', t: 0, spot,
    wait: (prog.tools.cana_dorada ? rnd(0.6, 1.8) : rnd(1.2, 3.2)),
  };
  player.vyaw = Math.atan2(spot.x - player.x, spot.y - player.y);
  SFX.plant();
}
function updateFishing(dt) {
  const a = action;
  a.t += dt;
  if (a.phase === 'cast' && a.t > 0.5) { a.phase = 'wait'; a.t = 0; }
  else if (a.phase === 'wait' && a.t > a.wait) {
    a.phase = 'bite'; a.t = 0;
    SFX.bite();
  } else if (a.phase === 'bite' && a.t > 0.75) {
    // missed
    const idx = groundItems.indexOf(a.spot);
    if (idx >= 0) groundItems.splice(idx, 1);
    action = null;
    toast(T('fish_escape'));
  }
  if (!groundItems.includes(a.spot) && a.phase !== 'done') {
    if (action === a && a.phase === 'wait') action = null;
  }
}
function fishingKey() {
  const a = action;
  if (a.phase === 'bite') {
    const sp = rollFish();
    const idx = groundItems.indexOf(a.spot);
    if (idx >= 0) groundItems.splice(idx, 1);
    addItem(sp);
    SFX.splash();
    poof(a.spot.x, a.spot.y, '#9fd8f0', 8);
    toast(T('caught_sp', { i: T('i_' + sp) }));
    action = null;
    persist();
  } else if (a.phase === 'wait' || a.phase === 'cast') {
    action = null; // reel in early
  }
}

// ---- mining ----
function rockHitsNeeded() { return prog.tools.pala_dorada ? 1 : prog.tools.espada ? 2 : 3; }
function startMine(rock) {
  action = { kind: 'mine', t: 0, rock };
  player.vyaw = Math.atan2(rock.x - player.x, rock.y - player.y);
  SFX.swing();
}
function updateMine(dt) {
  const a = action;
  a.t += dt;
  if (a.t > 0.38) {
    const r = a.rock;
    r.hits++;
    r.shakeT = 0.25;
    SFX.dig();
    poof(r.x, r.y, '#8d8d96', 5);
    if (r.hits >= rockHitsNeeded()) {
      r.broken = true;
      r.respawn = Date.now() + 120e3;
      r.hits = 0;
      SFX.crack();
      poof(r.x, r.y, '#8d8d96', 14);
      groundItems.push({ type: 'piedra', x: r.x + rnd(-10, 10), y: r.y + rnd(8, 16), ph: rnd(TAU) });
      const oreDrop = r.ore || (Math.random() < 0.15 ? 'amatista' : null);
      if (oreDrop) groundItems.push({ type: oreDrop, x: r.x + rnd(-12, 12), y: r.y + rnd(6, 14), ph: rnd(TAU) });
      toast(T('rock_break'));
    }
    action = null;
  }
}

// ---- digging fossils ----
function startDig(item) {
  action = { kind: 'dig', t: 0, item };
  player.vyaw = Math.atan2(item.x - player.x, item.y - player.y);
}
function updateDig(dt) {
  const a = action;
  a.t += dt;
  if (a.t > 0.25 && !a.p1) { a.p1 = true; SFX.dig(); poof(a.item.x, a.item.y, '#8a6644', 6); }
  if (a.t > (prog.tools.pala_dorada ? 0.5 : 0.85)) {
    const idx = groundItems.indexOf(a.item);
    if (idx >= 0) groundItems.splice(idx, 1);
    addItem('fosil_bruto');
    SFX.pickup();
    poof(a.item.x, a.item.y, '#e8dcc4', 8);
    toast(T('dug'));
    action = null;
    persist();
  }
}

function updateAction(dt) {
  if (!action) return;
  if (action.kind === 'fish') updateFishing(dt);
  else if (action.kind === 'mine') updateMine(dt);
  else if (action.kind === 'dig') updateDig(dt);
  else if (action.kind === 'swing') { action.t += dt; if (action.t > 0.3) action = null; }
}

// ---- per-frame expansion update (called from update() in play) ----
function updateExpansion(dt) {
  updateAction(dt);
  if (enemies.length) updateEnemies(dt);
  // broken rock respawns
  for (const r of rocks) {
    if (r.broken && Date.now() > r.respawn) { r.broken = false; r.hits = 0; }
    if (r.shakeT) r.shakeT = Math.max(0, r.shakeT - dt);
  }
  // interior: walking onto the doormat exits
  if (area.type === 'interior') {
    const ex = interiorExitPoint();
    if (dist(player.x, player.y, ex.x, ex.y) < 10) {
      startLoading('loading_door', exitInterior);
    }
  }
}

// ---- interaction (replaces v3 versions) ----
function nearestInteract() {
  for (const st of statics) {
    if (dist(player.x, player.y, st.x, st.y) < 30) return { kind: 'static', obj: st };
  }
  for (const n of npcs) if (dist(player.x, player.y, n.x, n.y) < 26) return { kind: 'npc', obj: n };
  if (area.type === 'island') {
    if (dist(player.x, player.y, plots.tent.x + 28, plots.tent.y + 8) < 30) return { kind: 'nook' };
    const bp = prog.built.dock ? boatPoint() : null;
    if (bp && dist(player.x, player.y, bp.x, bp.y) < 42) return { kind: 'boat' };
    for (const b of activeBuildings()) {
      if (b.key === 'tent' || b.key === 'dock') continue;
      if (dist(player.x, player.y, b.x, b.y + 10) < 32) return { kind: 'door', key: b.key };
    }
  } else if (area.type === 'biome') {
    const bp = boatPoint();
    if (bp && dist(player.x, player.y, bp.x, bp.y) < 42) return { kind: 'boat' };
  }
  for (const r of rocks) {
    if (!r.broken && dist(player.x, player.y, r.x, r.y) < 24) return { kind: 'rock', obj: r };
  }
  let best = null, bd = 1e9;
  for (const it of groundItems) {
    const d = dist(player.x, player.y, it.x, it.y);
    const reach = it.type === 'fish' ? 40 : 22;
    if ((it.type === 'fish' || it.type === 'fossil') && d < reach && d < bd) { best = { kind: it.type, obj: it }; bd = d; }
  }
  if (best) return best;
  for (const p of plants) {
    if (plantStage(p) === 3 && dist(player.x, player.y, p.x, p.y) < 20) return { kind: 'harvest', obj: p };
  }
  return null;
}

function doInteract() {
  if (action) return;
  const tgt = nearestInteract();
  if (!tgt) return;
  if (tgt.kind === 'static') {
    const st = tgt.obj;
    if (st.act === 'dlg' || (st.lines && st.act !== 'cafe' && st.act !== 'shop' && st.act !== 'museum2' && st.act !== 'clothes' && st.act !== 'market_tools')) {
      const lines = T(st.lines);
      startDialog(st.name, '#7a8a9a', Array.isArray(lines) ? lines : [String(lines)]);
    } else {
      openUI(st.act);
    }
  } else if (tgt.kind === 'npc') {
    const n = tgt.obj;
    n.state = 'idle'; n.t = rnd(3, 5);
    const sets = n.def.lines[lang] || n.def.lines.en;
    startDialog(n.def.name, n.def.shirt, pick(sets[dayPeriod()]));
  } else if (tgt.kind === 'nook') {
    openUI('nook');
  } else if (tgt.kind === 'boat') {
    openUI('travel');
  } else if (tgt.kind === 'door') {
    const key = tgt.key;
    startLoading('loading_door', () => goInterior(key));
  } else if (tgt.kind === 'rock') {
    if (!prog.tools.shovel && !prog.tools.espada && !prog.tools.pala_dorada) { toast(T('need_tool_rock')); SFX.error(); return; }
    startMine(tgt.obj);
  } else if (tgt.kind === 'fish') {
    if (!prog.tools.rod) { toast(T('need_rod')); SFX.error(); return; }
    startFishing(tgt.obj);
  } else if (tgt.kind === 'fossil') {
    if (!prog.tools.shovel) { toast(T('need_shovel')); SFX.error(); return; }
    startDig(tgt.obj);
  } else if (tgt.kind === 'harvest') {
    plants.splice(plants.indexOf(tgt.obj), 1);
    addItem('flower'); SFX.pickup(); toast(T('harvest')); persist();
  }
}

function doPlant() {
  if (area.type !== 'island') { toast(T('need_grass')); SFX.error(); return; }
  if (!(player.inv.seeds > 0)) { toast(T('no_seeds')); SFX.error(); return; }
  const px = player.x, py = player.y + 6;
  if (tileAt(px, py) !== T_GRASS || insideBuilding(px, py)) { toast(T('need_grass')); SFX.error(); return; }
  if (plants.some(p => dist(p.x, p.y, px, py) < 18) || trees.some(t => dist(t.x, t.y, px, py) < 22)) {
    toast(T('crowded')); SFX.error(); return;
  }
  player.inv.seeds--;
  plants.push({ x: px, y: py, t0: Date.now() });
  SFX.plant(); toast(T('planted')); persist();
}

/* ===== EXPANSION part 6: museum 2.0, shops, menus, uiKey, save ===== */

function museumCounts() {
  const f = FOSSIL_SPECIES.filter(s => prog.museum.fossils[s]).length;
  const p = FISH_SPECIES_ALL.filter(s => prog.museum.fish[s]).length;
  return { f, p, total: f + p, max: FOSSIL_SPECIES.length + FISH_SPECIES_ALL.length };
}
function identifyFossils() {
  const n = player.inv.fosil_bruto || 0;
  if (!n) { toast(T('no_brutos')); SFX.error(); return; }
  player.inv.fosil_bruto = 0;
  for (let i = 0; i < n; i++) {
    const sp = pick(FOSSIL_SPECIES);
    addItem(sp);
    toast(T('ident_result', { i: T('i_' + sp) }));
  }
  SFX.reveal();
  persist();
}
function donateSpecies(catKey, sp) {
  const setObj = prog.museum[catKey];
  if (setObj[sp]) { toast(T('donate_has')); SFX.error(); return; }
  if (!(player.inv[sp] > 0)) { toast(T('donate_none')); SFX.error(); return; }
  player.inv[sp]--;
  setObj[sp] = true;
  player.bells += DONATE_GRANT;
  toast(T('donate_done', { b: DONATE_GRANT }));
  SFX.sell();
  sceneDirty = true; // refresh exhibits
  const mc = museumCounts();
  if (mc.total >= mc.max && !prog.star) {
    prog.star = true;
    player.bells += COMPLETE_BONUS;
    toast(T('museum_complete', { b: COMPLETE_BONUS }));
    SFX.build();
  }
  persist();
}

// ---- shop stocks ----
function sellRows() {
  const legacy = INV_ORDER.filter(t => (player.inv[t] || 0) > 0);
  const extra = Object.keys(player.inv)
    .filter(t => (player.inv[t] || 0) > 0 && ITEMS[t] && ITEMS[t].sell && !INV_ORDER.includes(t))
    .sort();
  return legacy.concat(extra);
}
function buyRows() {
  if (ui.mode === 'market_tools') {
    const r = [];
    if (!prog.tools.espada) r.push('espada');
    if (!prog.tools.cana_dorada) r.push('cana_dorada');
    if (!prog.tools.pala_dorada) r.push('pala_dorada');
    r.push('seeds');
    return r;
  }
  if (ui.mode === 'shop') return ['seeds'];
  const r = ['seeds'];
  if (!prog.tools.rod) r.unshift('rod');
  if (!prog.tools.shovel) r.splice(prog.tools.rod ? 0 : 1, 0, 'shovel');
  return r;
}
function doBuy(type) {
  const cost = ITEMS[type].buy;
  const toolIds = ['rod', 'shovel', 'espada', 'cana_dorada', 'pala_dorada'];
  if (toolIds.includes(type) && prog.tools[type]) { toast(T('own')); SFX.error(); return; }
  if (player.bells < cost) { toast(T('no_bells')); SFX.error(); return; }
  player.bells -= cost;
  if (toolIds.includes(type)) prog.tools[type] = true;
  else addItem(type);
  SFX.sell(); toast(T('bought', { i: T('i_' + type) })); persist();
}

// ---- outfits ----
function clothesCatalog() {
  const market = ui.mode === 'clothes' && area.biome === 'market';
  return OUTFITS.filter(o => !o.market || market || (prog.owned || []).includes(o.id));
}
function clothesAction(o) {
  const owned = (prog.owned || []).includes(o.id) || o.price === 0;
  if (ui.mode === 'wardrobe' || owned) {
    if (!owned) { SFX.error(); return; }

  if (player.bells < o.price) { toast(T('no_bells')); SFX.error(); return; }
  player.bells -= o.price;
  prog.owned = prog.owned || [];
  prog.owned.push(o.id);
  prog.outfit = o.id;
  if (playerMesh) { scene.remove(playerMesh); playerMesh = null; }
  SFX.sell(); toast(T('cl_buy_ok', { i: T('o_' + o.id) }));
  persist();
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Isle — a cozy fan demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#1a2238; }
  #game { display:block; width:100vw; height:100vh; image-rendering:pixelated; image-rendering:crisp-edges; }
  #nameInput {
    position:fixed; left:50%; top:58%; transform:translate(-50%,-50%);
    width:min(320px, 70vw); padding:14px 20px; font:800 22px 'Nunito', sans-serif;
    text-align:center; color:#5b4326; background:#fffbe9; border:4px solid #b98d52;
    border-radius:999px; outline:none; box-shadow:0 6px 0 rgba(0,0,0,.18);
    display:none; z-index:10;
  }
  #nameInput::placeholder { color:#c9b48e; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<input id="nameInput" maxlength="12" placeholder="Your name..." autocomplete="off" spellcheck="false">
<script>
'use strict';
/* ============================================================
   ANIMAL ISLE — a tiny Animal Crossing-style fan demo
   Everything procedural: graphics on Canvas, audio via WebAudio
   ============================================================ */

// ---------- Canvas / view ----------
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const nameInput = document.getElementById('nameInput');
const view = { w: 0, h: 0, dpr: 1, zoom: 3 };

function resize() {
  view.dpr = Math.min(window.devicePixelRatio || 1, 2);
  view.w = window.innerWidth;
  view.h = window.innerHeight;
  cv.width = Math.floor(view.w * view.dpr);
  cv.height = Math.floor(view.h * view.dpr);
  view.zoom = Math.max(2, Math.min(4, Math.round(Math.min(view.w, view.h) / 300)));
  ctx.imageSmoothingEnabled = false;
  makeVignette();
}
window.addEventListener('resize', resize);

// ---------- Utils ----------
const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);
const rnd = (a = 1, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const hash2 = (x, y) => { const s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453; return s - Math.floor(s); };

// Seeded RNG so the island layout is the same every visit
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function roundRect(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

// ---------- Real time, day periods, season ----------
function nowHour() { const d = new Date(); return d.getHours() + d.getMinutes() / 60 + d.getSeconds() / 3600; }
function dayPeriod(h = nowHour()) {
  if (h >= 6 && h < 12) return 'morning';
  if (h >= 12 && h < 18) return 'afternoon';
  if (h >= 18 && h < 21) return 'evening';
  return 'night';
}
function season() {
  const m = new Date().getMonth() + 1;
  if (m >= 3 && m <= 5) return 'spring';
  if (m >= 6 && m <= 8) return 'summer';
  if (m >= 9 && m <= 11) return 'autumn';
  return 'winter';
}
const SEASON = season();

// Sky gradient keyframes (hour → [top, bottom] colors)
const SKY_KEYS = [
  [0,   ['#0b1030', '#1c2b52']],
  [5,   ['#0b1030', '#1c2b52']],
  [6.5, ['#e6986f', '#f7d9a0']],
  [9,   ['#69b7e8', '#bfe6f7']],
  [15,  ['#5fb0e6', '#bce4f6']],
  [18.5,['#f08a4f', '#fcd28a']],
  [20,  ['#5a4a8c', '#9b6e9e']],
  [21.5,['#0b1030', '#1c2b52']],
  [24,  ['#0b1030', '#1c2b52']],
];
function hexToRgb(h) { return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }
function mixHex(a, b, t) {
  const A = hexToRgb(a), B = hexToRgb(b);
  return `rgb(${Math.round(lerp(A[0], B[0], t))},${Math.round(lerp(A[1], B[1], t))},${Math.round(lerp(A[2], B[2], t))})`;
}
function skyColors(h = nowHour()) {
  for (let i = 0; i < SKY_KEYS.length - 1; i++) {
    const [h0, c0] = SKY_KEYS[i], [h1, c1] = SKY_KEYS[i + 1];
    if (h >= h0 && h <= h1) {
      const t = h1 === h0 ? 0 : (h - h0) / (h1 - h0);
      return [mixHex(c0[0], c1[0], t), mixHex(c0[1], c1[1], t)];
    }
  }
  return ['#69b7e8', '#bfe6f7'];
}
// Lighting overlay keyframes (hour → [r,g,b,alpha])
const LIGHT_KEYS = [
  [0, [18, 28, 70, 0.46]], [5, [18, 28, 70, 0.46]],
  [6.5, [255, 160, 90, 0.16]], [8.5, [0, 0, 0, 0]],
  [16.5, [0, 0, 0, 0]], [18.5, [255, 120, 60, 0.20]],
  [20, [95, 60, 130, 0.30]], [21.5, [18, 28, 70, 0.46]],
  [24, [18, 28, 70, 0.46]],
];
function lightTint(h = nowHour()) {
  for (let i = 0; i < LIGHT_KEYS.length - 1; i++) {
    const [h0, c0] = LIGHT_KEYS[i], [h1, c1] = LIGHT_KEYS[i + 1];
    if (h >= h0 && h <= h1) {
      const t = h1 === h0 ? 0 : (h - h0) / (h1 - h0);
      return [lerp(c0[0], c1[0], t), lerp(c0[1], c1[1], t), lerp(c0[2], c1[2], t), lerp(c0[3], c1[3], t)];
    }
  }
  return [0, 0, 0, 0];
}

// ---------- Save / load ----------
const SAVE_KEY = 'animal-isle-save';
function saveGame() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({ name: player.name, bells: player.bells, inv: player.inv }));
  } catch (e) { /* private mode etc. */ }
}
function loadGame() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)); } catch (e) { return null; }
}
window.addEventListener('beforeunload', () => { if (state === 'play') saveGame(); });

// ---------- World generation ----------
const TILE = 16, MW = 80, MH = 60;            // map in tiles
const WORLD_W = MW * TILE, WORLD_H = MH * TILE;
const T_WATER = 0, T_SAND = 1, T_GRASS = 2;
const map = [];
const srand = mulberry32(1337);

const shop = { x: 49 * TILE, y: 25 * TILE, w: 76, h: 58 }; // door at (x, y+4)
const POND = { tx: 27, ty: 35, r: 2.7 };

(function genMap() {
  const cx = MW / 2, cy = MH / 2;
  for (let y = 0; y < MH; y++) {
    map[y] = [];
    for (let x = 0; x < MW; x++) {
      const nx = (x - cx) / (MW * 0.42), ny = (y - cy) / (MH * 0.40);
      let d = Math.sqrt(nx * nx + ny * ny);
      d += 0.10 * Math.sin(x * 0.31 + 1.7) + 0.08 * Math.cos(y * 0.27 + 4.2) + 0.05 * Math.sin((x + y) * 0.21);
      map[y][x] = d < 0.74 ? T_GRASS : d < 0.95 ? T_SAND : T_WATER;
    }
  }
  // pond
  for (let y = 0; y < MH; y++) for (let x = 0; x < MW; x++) {
    const d = Math.hypot(x - POND.tx, y - POND.ty);
    if (d < POND.r && map[y][x] === T_GRASS) map[y][x] = T_WATER;
    else if (d < POND.r + 1.1 && map[y][x] === T_GRASS) map[y][x] = T_SAND;
  }
  // guarantee flat ground under the shop & spawn
  for (let y = 21; y <= 28; y++) for (let x = 45; x <= 54; x++) map[y][x] = T_GRASS;
  for (let y = 28; y <= 33; y++) for (let x = 37; x <= 43; x++) map[y][x] = T_GRASS;
})();

const tileAt = (px, py) => {
  const tx = Math.floor(px / TILE), ty = Math.floor(py / TILE);
  if (tx < 0 || ty < 0 || tx >= MW || ty >= MH) return T_WATER;
  return map[ty][tx];
};
const isLand = (px, py) => tileAt(px, py) !== T_WATER;

// Trees, rocks, decorative flowers
const trees = [], rocks = [], wildflowers = [];
(function genStuff() {
  const farFrom = (x, y, list, d) => list.every(o => dist(x, y, o.x, o.y) > d);
  let tries = 0;
  while (trees.length < 38 && tries++ < 4000) {
    const x = srand() * WORLD_W, y = srand() * WORLD_H;
    if (tileAt(x, y) !== T_GRASS) continue;
    if (dist(x, y, shop.x, shop.y) < 90) continue;
    if (dist(x, y, 40 * TILE, 31 * TILE) < 56) continue;
    if (dist(x, y, POND.tx * TILE, POND.ty * TILE) < 70) continue;
    if (!farFrom(x, y, trees, 46)) continue;
    trees.push({ x, y, sway: srand() * TAU });
  }
  tries = 0;
  while (rocks.length < 9 && tries++ < 2000) {
    const x = srand() * WORLD_W, y = srand() * WORLD_H;
    if (tileAt(x, y) !== T_GRASS) continue;
    if (dist(x, y, shop.x, shop.y) < 80 || !farFrom(x, y, trees, 26) || !farFrom(x, y, rocks, 60)) continue;
    rocks.push({ x, y, s: 0.8 + srand() * 0.6 });
  }
  // flower clusters
  for (let c = 0; c < 13; c++) {
    let fx, fy, ok = false, t2 = 0;
    while (!ok && t2++ < 200) {
      fx = srand() * WORLD_W; fy = srand() * WORLD_H;
      ok = tileAt(fx, fy) === T_GRASS && dist(fx, fy, shop.x, shop.y) > 70;
    }
    if (!ok) continue;
    const n = 5 + Math.floor(srand() * 5);
    const hue = pick([['#ff6f87','#ffd2da'], ['#ffd14f','#fff0b8'], ['#ff9a4d','#ffe0c2'], ['#c98bff','#ecd9ff'], ['#ff5c5c','#ffc9c9']]);
    for (let i = 0; i < n; i++) {
      const x = fx + (srand() - 0.5) * 60, y = fy + (srand() - 0.5) * 44;
      if (tileAt(x, y) === T_GRASS) wildflowers.push({ x, y, c1: hue[0], c2: hue[1], ph: srand() * TAU });
    }
  }
})();

// shoreline foam edges: land tile edges that face water
const foamEdges = [];
(function genFoam() {
  const dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];
  for (let y = 1; y < MH - 1; y++) for (let x = 1; x < MW - 1; x++) {
    if (map[y][x] === T_WATER) continue;
    dirs.forEach(([dx, dy], side) => {
      if (map[y + dy][x + dx] === T_WATER) foamEdges.push({ x, y, side, ph: hash2(x, y) * TAU });
    });
  }
})();

// ---------- Pre-rendered terrain (land only; water drawn live) ----------
const terrainCv = document.createElement('canvas');
terrainCv.width = WORLD_W; terrainCv.height = WORLD_H;
(function renderTerrain() {
  const g = terrainCv.getContext('2d');
  const pal = {
    spring: { grass: ['#62b84e', '#5bb046'], sand: ['#ecd9a2', '#e5d199'] },
    summer: { grass: ['#54ad47', '#4da540'], sand: ['#ecd9a2', '#e5d199'] },
    autumn: { grass: ['#a3a953', '#99a04c'], sand: ['#e6d3a0', '#dfcb96'] },
    winter: { grass: ['#e9eef3', '#e1e8ef'], sand: ['#ded7c4', '#d6cfba'] },
  }[SEASON];
  const r2 = mulberry32(99);
  for (let y = 0; y < MH; y++) for (let x = 0; x < MW; x++) {
    const t = map[y][x];
    if (t === T_WATER) continue;
    const set = t === T_GRASS ? pal.grass : pal.sand;
    g.fillStyle = set[(x + y) % 2];
    g.fillRect(x * TILE, y * TILE, TILE, TILE);
    // speckles
    for (let i = 0; i < 2; i++) {
      const sx = x * TILE + r2() * TILE, sy = y * TILE + r2() * TILE;
      if (t === T_GRASS) {
        g.fillStyle = SEASON === 'winter' ? 'rgba(255,255,255,.7)' : 'rgba(0,70,0,.13)';
        g.fillRect(sx, sy, 2, r2() < 0.5 ? 3 : 2);
      } else {
        g.fillStyle = 'rgba(120,90,40,.16)';
        g.fillRect(sx, sy, 2, 2);
      }
    }
    // grass→sand soft border
    if (t === T_SAND && y > 0 && map[y - 1][x] === T_GRASS) {
      g.fillStyle = 'rgba(80,140,60,.35)';
      g.fillRect(x * TILE, y * TILE, TILE, 3);
    }
  }
})();

// ---------- Items, plants, economy ----------
const ITEMS = {
  shell:  { name: 'Shell',        sell: 60 },
  fruit:  { name: 'Peach',        sell: 100 },
  fish:   { name: 'Fish',         sell: 300 },
  fossil: { name: 'Fossil',       sell: 1200 },
  flower: { name: 'Flower',       sell: 240 },
  seeds:  { name: 'Flower Seeds', sell: 30, buy: 120 },
};
const INV_ORDER = ['shell', 'fruit', 'fish', 'fossil', 'flower', 'seeds'];
const groundItems = [];   // {type,x,y,ph}
const plants = [];        // {x,y,t0}  grown with real time
const SPAWN_TARGET = { shell: 10, fruit: 8, fossil: 4, fish: 5 };
let spawnTimer = 0;

function randTileOfType(type, cond) {
  for (let i = 0; i < 300; i++) {
    const tx = Math.floor(rnd(MW)), ty = Math.floor(rnd(MH));
    if (map[ty][tx] !== type) continue;
    const x = tx * TILE + 8, y = ty * TILE + 8;
    if (cond && !cond(x, y, tx, ty)) continue;
    return { x, y };
  }
  return null;
}
const nearLand = (tx, ty) => {
  for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
    const X = tx + dx, Y = ty + dy;
    if (X >= 0 && Y >= 0 && X < MW && Y < MH && map[Y][X] !== T_WATER) return true;
  }
  return false;
};
function spawnItem(type) {
  let p = null;
  if (type === 'shell') p = randTileOfType(T_SAND);
  else if (type === 'fossil') p = randTileOfType(T_GRASS, (x, y) => dist(x, y, shop.x, shop.y) > 70 && trees.every(t => dist(x, y, t.x, t.y) > 20));
  else if (type === 'fish') p = randTileOfType(T_WATER, (x, y, tx, ty) => nearLand(tx, ty));
  else if (type === 'fruit') {
    const t = pick(trees);
    if (t) p = { x: t.x + rnd(-18, 18), y: t.y + rnd(6, 18) };
    if (p && tileAt(p.x, p.y) !== T_GRASS) p = null;
  }
  if (p && groundItems.every(it => dist(it.x, it.y, p.x, p.y) > 20)) {
    groundItems.push({ type, x: p.x, y: p.y, ph: rnd(TAU) });
  }
}
function fillSpawns(initial) {
  for (const type in SPAWN_TARGET) {
    const want = SPAWN_TARGET[type];
    let have = groundItems.filter(i => i.type === type).length;
    const n = initial ? want - have : (have < want && Math.random() < 0.5 ? 1 : 0);
    for (let i = 0; i < n; i++) spawnItem(type);
  }
}

// plant growth stages by real elapsed time (ms)
const GROW = [0, 60e3, 150e3, 240e3]; // seedling, sprout, bud, flower
function plantStage(p) {
  const e = Date.now() - p.t0;
  if (e < GROW[1]) return 0;
  if (e < GROW[2]) return 1;
  if (e < GROW[3]) return 2;
  return 3;
}

// ---------- Player & NPCs ----------
const player = {
  name: '', bells: 100, inv: {},
  x: 40 * TILE, y: 31 * TILE, vx: 0, vy: 0,
  facing: 'down', step: 0, moving: false,
};
function addItem(type, n = 1) {
  player.inv[type] = (player.inv[type] || 0) + n;
  saveGame();
}

const npcs = [
  {
    name: 'Mochi', kind: 'cat', x: 44 * TILE, y: 34 * TILE,
    body: '#cfd6e6', accent: '#8d98b5', shirt: '#f2a7c3',
    state: 'idle', t: rnd(2, 4), tx: 0, ty: 0, facing: 'down', step: 0,
    lines: {
      morning: [
        ["*yawwwn*... oh, morning, {name}.", "I was up all night watching the moths. Riveting stuff, meow."],
        ["The morning birds are SO loud.", "I respect their dedication though, meow."],
      ],
      afternoon: [
        ["This is prime napping sun right here.", "You're standing in my sunbeam, {name}... just so you know, meow."],
        ["I heard the shells on the beach respawn.", "How? Don't think about it too hard, meow."],
      ],
      evening: [
        ["The sunset makes the ocean look like peach jam.", "...Now I'm hungry, meow."],
        ["Evenings are for slow walks and big thoughts.", "Mostly about snacks, meow."],
      ],
      night: [
        ["Shh... hear the crickets? That's my favorite song.", "Don't tell the radio, meow."],
        ["You're up late, {name}!", "Night fishing is the best fishing. Trust me, meow."],
      ],
    },
  },
  {
    name: 'Hopkins', kind: 'frog', x: 33 * TILE, y: 36 * TILE,
    body: '#7ecb5f', accent: '#5da944', shirt: '#ffd95e',
    state: 'idle', t: rnd(2, 4), tx: 0, ty: 0, facing: 'down', step: 0,
    lines: {
      morning: [
        ["Morning dew! Best drink on the island, ribbit!", "Don't knock it 'til you've tried it, {name}."],
        ["I did 100 hops before sunrise today.", "Tomorrow: 101. Dream big, ribbit!"],
      ],
      afternoon: [
        ["Tom Nook pays GOOD bells for fossils!", "I'd dig them myself but... dirt. Ribbit."],
        ["If you plant seeds, they grow in a few real minutes!", "Patience is a muscle, {name}. Ribbit!"],
      ],
      evening: [
        ["Almost cricket o'clock! They take requests, you know.", "They only know one song. Ribbit..."],
        ["The pond gets all glittery at dusk.", "That's where I keep my best thoughts, ribbit."],
      ],
      night: [
        ["The stars are out! I named that one Gerald.", "He's my favorite, ribbit."],
        ["*hushed* The ocean sounds bigger at night.", "Kinda spooky. Kinda great. Ribbit."],
      ],
    },
  },
];

// ---------- Camera ----------
const cam = { x: 0, y: 0 };
function camTarget() {
  const vw = view.w / view.zoom, vh = view.h / view.zoom;
  return [clamp(player.x - vw / 2, 0, Math.max(0, WORLD_W - vw)),
          clamp(player.y - vh / 2, 0, Math.max(0, WORLD_H - vh))];
}

// ---------- Audio (all procedural) ----------
let AC = null;
const audio = {
  master: null, music: null, amb: null, sfx: null, muted: false,
  nextNote: 0, eighth: 0, chord: 0, mel: 4,
  birdT: 1, cricketT: 1, noiseBuf: null,
};
const MUSIC_SET = {
  morning:   { bpm: 100, wave: 'triangle', density: 0.62, base: 72, padVol: 0.045,
               prog: [[60,64,67],[57,60,65],[59,62,67],[60,64,67]] },
  afternoon: { bpm: 106, wave: 'triangle', density: 0.55, base: 72, padVol: 0.04,
               prog: [[60,64,67],[57,60,64],[53,57,60],[59,62,67]] },
  evening:   { bpm: 82,  wave: 'sine',     density: 0.45, base: 72, padVol: 0.05,
               prog: [[57,60,64],[53,57,60],[60,64,67],[59,62,67]] },
  night:     { bpm: 58,  wave: 'sine',     density: 0.26, base: 67, padVol: 0.04,
               prog: [[57,60,64],[55,59,64],[53,57,60],[55,59,64]] },
};
const PENTA = [0, 2, 4, 7, 9];
const mtof = m => 440 * Math.pow(2, (m - 69) / 12);

function initAudio() {
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  AC = new (window.AudioContext || window.webkitAudioContext)();
  audio.master = AC.createGain(); audio.master.gain.value = 0.6; audio.master.connect(AC.destination);
  audio.music = AC.createGain(); audio.music.gain.value = 0.16; audio.music.connect(audio.master);
  audio.amb = AC.createGain(); audio.amb.gain.value = 0.6; audio.amb.connect(audio.master);
  audio.sfx = AC.createGain(); audio.sfx.gain.value = 0.5; audio.sfx.connect(audio.master);

  // shared noise buffer
  const len = AC.sampleRate * 2;
  audio.noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
  const data = audio.noiseBuf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;

  function noiseLayer(filterType, freq, q, baseGain, lfoHz, lfoDepth) {
    const src = AC.createBufferSource(); src.buffer = audio.noiseBuf; src.loop = true;
    const f = AC.createBiquadFilter(); f.type = filterType; f.frequency.value = freq; f.Q.value = q;
    const g = AC.createGain(); g.gain.value = baseGain;
    const lfo = AC.createOscillator(); lfo.frequency.value = lfoHz;
    const lg = AC.createGain(); lg.gain.value = lfoDepth;
    lfo.connect(lg); lg.connect(g.gain);
    src.connect(f); f.connect(g); g.connect(audio.amb);
    src.start(); lfo.start();
    return g;
  }
  noiseLayer('bandpass', 500, 0.4, 0.045, 0.07, 0.03);   // wind
  noiseLayer('lowpass', 420, 0.7, 0.06, 0.13, 0.05);     // ocean waves

  audio.nextNote = AC.currentTime + 0.1;
}

function tone({ f, t, dur, type = 'triangle', vol = 0.15, dest = audio.music, slide = 0 }) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f, t);
  if (slide) o.frequency.exponentialRampToValueAtTime(slide, t + dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(dest);
  o.start(t); o.stop(t + dur + 0.05);
}
function noiseBurst(t, dur, freq, vol) {
  const src = AC.createBufferSource(); src.buffer = audio.noiseBuf;
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = freq;
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.connect(f); f.connect(g); g.connect(audio.sfx);
  src.start(t); src.stop(t + dur + 0.05);
}

function musicTick() {
  if (!AC) return;
  // if the tab was backgrounded, skip ahead instead of burst-playing the backlog
  if (audio.nextNote < AC.currentTime - 0.2) audio.nextNote = AC.currentTime + 0.1;
  const set = MUSIC_SET[dayPeriod()];
  const eighthLen = 60 / set.bpm / 2;
  while (audio.nextNote < AC.currentTime + 0.4) {
    const t = audio.nextNote, pos = audio.eighth % 8;
    const chord = set.prog[audio.chord % set.prog.length];
    if (pos === 0) {
      // pad + bass once per bar
      chord.forEach(m => tone({ f: mtof(m), t, dur: eighthLen * 7.6, type: 'sine', vol: set.padVol }));
      tone({ f: mtof(chord[0] - 24), t, dur: eighthLen * 3.5, type: 'triangle', vol: 0.10 });
    }
    if (pos === 4) tone({ f: mtof(chord[0] - 12), t, dur: eighthLen * 3, type: 'triangle', vol: 0.07 });
    // melody random walk on pentatonic
    if (Math.random() < set.density && pos !== 0) {
      audio.mel = clamp(audio.mel + Math.floor(rnd(-2, 3)), 0, 9);
      const m = set.base + PENTA[audio.mel % 5] + 12 * Math.floor(audio.mel / 5);
      tone({ f: mtof(m), t, dur: eighthLen * rnd(1.1, 2.2), type: set.wave, vol: 0.085 });
    }
    audio.eighth++;
    if (audio.eighth % 8 === 0) audio.chord++;
    audio.nextNote += eighthLen;
  }
}

function ambientTick(dt) {
  if (!AC) return;
  const p = dayPeriod(), t = AC.currentTime;
  // birds: morning frequent, afternoon occasional
  if (p === 'morning' || p === 'afternoon') {
    audio.birdT -= dt;
    if (audio.birdT <= 0) {
      audio.birdT = p === 'morning' ? rnd(0.8, 3.5) : rnd(4, 10);
      const n = 2 + Math.floor(rnd(3)), f0 = rnd(2300, 3300);
      for (let i = 0; i < n; i++) {
        tone({ f: f0 * rnd(0.92, 1.1), t: t + i * rnd(0.09, 0.15), dur: 0.09,
               type: 'sine', vol: 0.04, dest: audio.amb, slide: f0 * rnd(1.15, 1.4) });
      }
    }
  }
  // crickets at night & evening
  if (p === 'night' || p === 'evening') {
    audio.cricketT -= dt;
    if (audio.cricketT <= 0) {
      audio.cricketT = rnd(0.5, 1.6);
      for (let i = 0; i < 3; i++) {
        tone({ f: 4200 + rnd(-200, 200), t: t + i * 0.07, dur: 0.045, type: 'sine', vol: 0.022, dest: audio.amb });
      }
    }
  }
}

const SFX = {
  pickup() { if (!AC) return; const t = AC.currentTime;
    tone({ f: 880, t, dur: 0.09, type: 'square', vol: 0.05, dest: audio.sfx });
    tone({ f: 1318, t: t + 0.08, dur: 0.14, type: 'square', vol: 0.05, dest: audio.sfx }); },
  sell() { if (!AC) return; const t = AC.currentTime;
    [987, 1318, 1975].forEach((f, i) => tone({ f, t: t + i * 0.07, dur: 0.18, type: 'triangle', vol: 0.08, dest: audio.sfx })); },
  error() { if (!AC) return; tone({ f: 196, t: AC.currentTime, dur: 0.2, type: 'square', vol: 0.06, dest: audio.sfx }); },
  blip() { if (!AC) return; tone({ f: rnd(480, 760), t: AC.currentTime, dur: 0.04, type: 'square', vol: 0.025, dest: audio.sfx }); },
  dig() { if (!AC) return; noiseBurst(AC.currentTime, 0.18, 600, 0.2); },
  splash() { if (!AC) return; noiseBurst(AC.currentTime, 0.3, 1400, 0.22);
    tone({ f: 520, t: AC.currentTime, dur: 0.2, type: 'sine', vol: 0.06, dest: audio.sfx, slide: 180 }); },
  plant() { if (!AC) return; noiseBurst(AC.currentTime, 0.12, 500, 0.14);
    tone({ f: 660, t: AC.currentTime + 0.1, dur: 0.12, type: 'sine', vol: 0.05, dest: audio.sfx }); },
};

// ---------- Input ----------
const keys = {};
let state = 'title';   // title | intro | play
let fade = 0;          // screen fade 0..1
let fadeDir = 0, fadeCb = null;

window.addEventListener('keydown', e => {
  if (document.activeElement === nameInput) {
    if (e.key === 'Enter') confirmName();
    return;
  }
  initAudio();
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Tab'].includes(e.key)) e.preventDefault();
  keys[e.code] = true;
  handlePress(e.code);
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
cv.addEventListener('pointerdown', () => {
  initAudio();
  if (state === 'title') handlePress('Enter');
  else if (dlg.open || intro.active) handlePress('KeyE');
});

function startFade(cb) { fadeDir = 1; fadeCb = cb; }

// ---------- Dialogue (typewriter) ----------
const dlg = { open: false, lines: [], li: 0, shown: 0, speaker: '', color: '#7a5230', cb: null, blipAt: 0 };
function startDialog(speaker, color, lines, cb) {
  dlg.open = true; dlg.speaker = speaker; dlg.color = color;
  dlg.lines = lines.map(l => l.replace(/\{name\}/g, player.name || 'friend'));
  dlg.li = 0; dlg.shown = 0; dlg.cb = cb || null;
}
function advanceDialog() {
  const line = dlg.lines[dlg.li];
  if (dlg.shown < line.length) { dlg.shown = line.length; return; }
  dlg.li++;
  dlg.shown = 0;
  if (dlg.li >= dlg.lines.length) {
    dlg.open = false;
    if (dlg.cb) { const cb = dlg.cb; dlg.cb = null; cb(); }
  }
}

// ---------- Intro / title ----------
const intro = { active: false, idx: 0, shown: 0, waitingInput: false, script: [] };
function buildIntroScript() {
  intro.script = [
    { t: 'line', s: "Yes, yes! Welcome, welcome! You made it at last, hm?" },
    { t: 'line', s: "I'm Tom Nook. This little island getaway is my latest venture... and you are its very first resident!" },
    { t: 'input' },
    { t: 'line', s: "{name}! A fine name, yes, yes. Rolls right off the tongue!" },
    { t: 'line', s: "Now then — island life is simple. Stroll about, gather shells and fruit, fish a little, dig a little..." },
    { t: 'line', s: "...then bring everything to Nook's Cranny and I'll pay you in Bells! Buy seeds, plant flowers — they grow in real time, hm!" },
    { t: 'line', s: "A couple of neighbors live here too. Walk up and press E to chat. They're... characters." },
    { t: 'line', s: "Well then! The sun, the sea, and a bit of honest commerce await. Your island life begins... now! Yes, yes!" },
  ];
  intro.idx = 0; intro.shown = 0; intro.waitingInput = false; intro.active = true;
}
function confirmName() {
  const v = nameInput.value.trim();
  if (!v) return;
  player.name = v.slice(0, 12);
  nameInput.style.display = 'none';
  nameInput.blur();
  intro.waitingInput = false;
  intro.idx++; intro.shown = 0;
  saveGame();
  SFX.pickup();
}
function advanceIntro() {
  const item = intro.script[intro.idx];
  if (!item) return;
  if (item.t === 'input') return; // waiting for the input box
  const text = item.s.replace(/\{name\}/g, player.name);
  if (intro.shown < text.length) { intro.shown = text.length; return; }
  intro.idx++;
  intro.shown = 0;
  const next = intro.script[intro.idx];
  if (!next) {
    intro.active = false;
    startFade(() => { state = 'play'; toasts.push({ text: 'Welcome to Animal Isle!', t: 0 }); });
  } else if (next.t === 'input') {
    intro.waitingInput = true;
    nameInput.style.display = 'block';
    nameInput.value = '';
    setTimeout(() => nameInput.focus(), 50);
  }
}

// ---------- UI state ----------
let invOpen = false;
const shopUI = { open: false, tab: 0, sel: 0 }; // tab 0 = sell, 1 = buy
const toasts = []; // {text, t}
function toast(text) { toasts.push({ text, t: 0 }); }

// ---------- Key actions ----------
function handlePress(code) {
  if (fadeDir !== 0) return;

  if (state === 'title') {
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') {
      const save = loadGame();
      if (save && save.name) {
        player.name = save.name;
        player.bells = save.bells ?? 100;
        player.inv = save.inv || {};
        startFade(() => { state = 'play'; toast(`Welcome back, ${player.name}!`); });
      } else {
        startFade(() => { state = 'intro'; buildIntroScript(); });
      }
      SFX.pickup();
    } else if (code === 'KeyN') {
      localStorage.removeItem(SAVE_KEY);
      player.name = ''; player.bells = 100; player.inv = {};
      startFade(() => { state = 'intro'; buildIntroScript(); });
      SFX.pickup();
    }
    return;
  }

  if (state === 'intro') {
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') advanceIntro();
    return;
  }

  // ----- play state -----
  if (code === 'KeyM') {
    audio.muted = !audio.muted;
    if (audio.master) audio.master.gain.value = audio.muted ? 0 : 0.6;
    toast(audio.muted ? 'Sound off' : 'Sound on');
    return;
  }

  if (dlg.open) {
    if (code === 'KeyE' || code === 'Enter' || code === 'Space') advanceDialog();
    return;
  }

  if (shopUI.open) { shopKey(code); return; }

  if (code === 'KeyI') { invOpen = !invOpen; SFX.blip(); return; }
  if (code === 'Escape') { invOpen = false; return; }
  if (invOpen) return;

  if (code === 'KeyE' || code === 'Enter') doInteract();
  if (code === 'KeyP') doPlant();
}

// ---------- Interactions ----------
function nearestInteract() {
  for (const n of npcs) if (dist(player.x, player.y, n.x, n.y) < 26) return { kind: 'npc', obj: n };
  let best = null, bd = 1e9;
  for (const it of groundItems) {
    const d = dist(player.x, player.y, it.x, it.y);
    const reach = it.type === 'fish' ? 34 : 22;
    if ((it.type === 'fish' || it.type === 'fossil') && d < reach && d < bd) { best = { kind: it.type, obj: it }; bd = d; }
  }
  if (best) return best;
  for (const p of plants) {
    if (plantStage(p) === 3 && dist(player.x, player.y, p.x, p.y) < 20) return { kind: 'harvest', obj: p };
  }
  if (dist(player.x, player.y, shop.x, shop.y + 10) < 34) return { kind: 'shop' };
  return null;
}
function doInteract() {
  const tgt = nearestInteract();
  if (!tgt) return;
  if (tgt.kind === 'npc') {
    const n = tgt.obj;
    n.state = 'idle'; n.t = rnd(3, 5);
    n.facing = player.x < n.x ? 'left' : 'right';
    startDialog(n.name, n.shirt, pick(n.lines[dayPeriod()]));
  } else if (tgt.kind === 'fish') {
    groundItems.splice(groundItems.indexOf(tgt.obj), 1);
    addItem('fish'); SFX.splash();
    toast(`You caught a fish! What a catch!`);
  } else if (tgt.kind === 'fossil') {
    groundItems.splice(groundItems.indexOf(tgt.obj), 1);
    addItem('fossil'); SFX.dig();
    toast('You dug up a fossil! Whoa!');
  } else if (tgt.kind === 'harvest') {
    plants.splice(plants.indexOf(tgt.obj), 1);
    addItem('flower'); SFX.pickup();
    toast('+1 Flower (grown with love)');
  } else if (tgt.kind === 'shop') {
    shopUI.open = true; shopUI.tab = 0; shopUI.sel = 0;
    SFX.blip();
  }
}
function doPlant() {
  if (!(player.inv.seeds > 0)) { toast('No seeds! Buy some at Nook’s Cranny.'); SFX.error(); return; }
  const px = player.x, py = player.y + 6;
  if (tileAt(px, py) !== T_GRASS) { toast('Seeds need grass to grow!'); SFX.error(); return; }
  if (plants.some(p => dist(p.x, p.y, px, py) < 18) || trees.some(t => dist(t.x, t.y, px, py) < 22)) {
    toast('Too crowded to plant here.'); SFX.error(); return;
  }
  player.inv.seeds--;
  plants.push({ x: px, y: py, t0: Date.now() });
  SFX.plant(); saveGame();
  toast('Planted! Come back in a few minutes.');
}

// ---------- Shop ----------
function shopRows() {
  if (shopUI.tab === 0) return INV_ORDER.filter(t => (player.inv[t] || 0) > 0);
  return ['seeds'];
}
function shopKey(code) {
  const rows = shopRows();
  if (code === 'Escape' || code === 'KeyE') { shopUI.open = false; SFX.blip(); return; }
  if (code === 'ArrowLeft' || code === 'ArrowRight' || code === 'Tab') {
    shopUI.tab = 1 - shopUI.tab; shopUI.sel = 0; SFX.blip(); return;
  }
  if (code === 'ArrowUp') { shopUI.sel = Math.max(0, shopUI.sel - 1); SFX.blip(); return; }
  if (code === 'ArrowDown') { shopUI.sel = Math.min(Math.max(0, rows.length - 1), shopUI.sel + 1); SFX.blip(); return; }
  if (code === 'Enter' || code === 'Space' || code === 'KeyA') {
    const type = rows[shopUI.sel];
    if (!type) { SFX.error(); return; }
    if (shopUI.tab === 0) {
      const n = code === 'KeyA' ? player.inv[type] : 1;
      player.inv[type] -= n;
      player.bells += ITEMS[type].sell * n;
      SFX.sell(); toast(`Sold ${n} ${ITEMS[type].name}${n > 1 ? 's' : ''} for ${ITEMS[type].sell * n} Bells!`);
      if (shopUI.sel >= shopRows().length) shopUI.sel = Math.max(0, shopRows().length - 1);
    } else {
      if (player.bells < ITEMS.seeds.buy) { SFX.error(); toast('Not enough Bells, hm?'); return; }
      player.bells -= ITEMS.seeds.buy;
      addItem('seeds');
      SFX.sell(); toast('Bought Flower Seeds! Press P on grass to plant.');
    }
    saveGame();
  }
}

// ---------- Clouds & particles ----------
const clouds = [];
for (let i = 0; i < 9; i++) {
  clouds.push({ x: rnd(2400), y: rnd(0.05, 0.5), s: rnd(0.7, 1.6), v: rnd(3, 8) });
}
const particles = [];
function spawnParticle(w, h) {
  if (SEASON === 'winter') particles.push({ x: rnd(w), y: -10, vx: rnd(-8, 8), vy: rnd(18, 40), ph: rnd(TAU), kind: 'snow', life: 30 });
  else if (SEASON === 'autumn') particles.push({ x: rnd(w), y: -10, vx: rnd(-15, 5), vy: rnd(22, 42), ph: rnd(TAU), kind: 'leaf', life: 30, c: pick(['#d8842f', '#c4622d', '#e0a83a']) });
  else if (SEASON === 'spring') particles.push({ x: rnd(w), y: -10, vx: rnd(-12, 12), vy: rnd(14, 30), ph: rnd(TAU), kind: 'petal', life: 30 });
  else particles.push({ x: rnd(w), y: rnd(h), vx: rnd(-6, 6), vy: rnd(-4, 4), ph: rnd(TAU), kind: 'spark', life: rnd(3, 6) });
}

// ---------- Update ----------
let lastT = performance.now();
let walkBob = 0;

function update(dt) {
  musicTick();
  ambientTick(dt);

  // fade
  if (fadeDir === 1) {
    fade = Math.min(1, fade + dt * 2);
    if (fade >= 1) { fadeDir = -1; if (fadeCb) { fadeCb(); fadeCb = null; } }
  } else if (fadeDir === -1) {
    fade = Math.max(0, fade - dt * 1.4);
    if (fade <= 0) fadeDir = 0;
  }

  // particles (all states, drawn over everything)
  const target = SEASON === 'summer' ? 14 : 36;
  if (particles.length < target && Math.random() < 0.3) spawnParticle(view.w, view.h);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.ph += dt * 2;
    p.x += (p.vx + Math.sin(p.ph) * 12) * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.y > view.h + 12 || p.life <= 0) particles.splice(i, 1);
  }
  clouds.forEach(c => { c.x += c.v * dt; });

  if (state !== 'play') {
    if (state === 'intro' && !intro.waitingInput) {
      const item = intro.script[intro.idx];
      if (item && item.t === 'line') {
        const len = item.s.length;
        const prev = intro.shown;
        intro.shown = Math.min(len, intro.shown + dt * 32);
        if (Math.floor(intro.shown / 2) !== Math.floor(prev / 2) && intro.shown < len) SFX.blip();
      }
    }
    return;
  }

  // ----- play -----
  const locked = dlg.open || shopUI.open || invOpen;
  let mx = 0, my = 0;
  if (!locked) {
    if (keys.KeyA || keys.ArrowLeft) mx -= 1;
    if (keys.KeyD || keys.ArrowRight) mx += 1;
    if (keys.KeyW || keys.ArrowUp) my -= 1;
    if (keys.KeyS || keys.ArrowDown) my += 1;
  }
  player.moving = mx !== 0 || my !== 0;
  if (player.moving) {
    const sp = (keys.ShiftLeft || keys.ShiftRight ? 150 : 105) * dt;
    const inv = mx !== 0 && my !== 0 ? 0.7071 : 1;
    tryMove(player, mx * sp * inv, my * sp * inv);
    player.facing = Math.abs(mx) > Math.abs(my) ? (mx < 0 ? 'left' : 'right') : (my < 0 ? 'up' : 'down');
    player.step += dt * 11;
    walkBob = Math.sin(player.step) * 1.2;
  } else walkBob = 0;

  // auto-pickup shells & fruit
  for (let i = groundItems.length - 1; i >= 0; i--) {
    const it = groundItems[i];
    if ((it.type === 'shell' || it.type === 'fruit') && dist(player.x, player.y, it.x, it.y) < 13) {
      groundItems.splice(i, 1);
      addItem(it.type); SFX.pickup();
      toast(`+1 ${ITEMS[it.type].name}`);
    }
  }

  // respawns
  spawnTimer -= dt;
  if (spawnTimer <= 0) { spawnTimer = 5; fillSpawns(false); }

  // fish spots drift
  for (const it of groundItems) {
    if (it.type !== 'fish') continue;
    it.ph += dt;
    const nx = it.x + Math.cos(it.ph * 0.6) * 6 * dt, ny = it.y + Math.sin(it.ph * 0.4) * 6 * dt;
    if (tileAt(nx, ny) === T_WATER) { it.x = nx; it.y = ny; }
  }

  // NPC wandering
  for (const n of npcs) {
    n.t -= dt;
    if (n.state === 'idle') {
      if (n.t <= 0) {
        for (let k = 0; k < 12; k++) {
          const a = rnd(TAU), d = rnd(24, 70);
          const tx = n.x + Math.cos(a) * d, ty = n.y + Math.sin(a) * d;
          if (tileAt(tx, ty) === T_GRASS && dist(tx, ty, shop.x, shop.y) > 60) { n.tx = tx; n.ty = ty; n.state = 'walk'; break; }
        }
        n.t = rnd(2, 5);
      }
    } else {
      const dx = n.tx - n.x, dy = n.ty - n.y, d = Math.hypot(dx, dy);
      if (d < 3 || n.t < -6) { n.state = 'idle'; n.t = rnd(1.5, 4.5); }
      else {
        const sp = 26 * dt;
        tryMove(n, dx / d * sp, dy / d * sp);
        n.facing = Math.abs(dx) > Math.abs(dy) ? (dx < 0 ? 'left' : 'right') : (dy < 0 ? 'up' : 'down');
        n.step += dt * 8;
      }
    }
  }

  // dialogue typewriter
  if (dlg.open) {
    const line = dlg.lines[dlg.li];
    const prev = dlg.shown;
    dlg.shown = Math.min(line.length, dlg.shown + dt * 34);
    if (Math.floor(dlg.shown / 2) !== Math.floor(prev / 2) && dlg.shown < line.length) SFX.blip();
  }

  // toasts
  for (let i = toasts.length - 1; i >= 0; i--) {
    toasts[i].t += dt;
    if (toasts[i].t > 2.6) toasts.splice(i, 1);
  }

  // camera with lag
  const [cxT, cyT] = camTarget();
  cam.x = lerp(cam.x, cxT, 1 - Math.pow(0.0015, dt));
  cam.y = lerp(cam.y, cyT, 1 - Math.pow(0.0015, dt));
}

function tryMove(ent, dx, dy) {
  const passable = (x, y) =>
    isLand(x, y) &&
    !(x > shop.x - shop.w / 2 - 4 && x < shop.x + shop.w / 2 + 4 && y > shop.y - shop.h + 6 && y < shop.y + 6) &&
    trees.every(t => dist(x, y, t.x, t.y) > 9) &&
    rocks.every(r => dist(x, y, r.x, r.y) > 10);
  if (passable(ent.x + dx, ent.y)) ent.x += dx;
  if (passable(ent.x, ent.y + dy)) ent.y += dy;
  ent.x = clamp(ent.x, 8, WORLD_W - 8);
  ent.y = clamp(ent.y, 8, WORLD_H - 8);
}

// ============================================================
//  RENDERING
// ============================================================
let vignetteCv = null;
function makeVignette() {
  vignetteCv = document.createElement('canvas');
  vignetteCv.width = Math.max(2, Math.floor(view.w / 2));
  vignetteCv.height = Math.max(2, Math.floor(view.h / 2));
  const g = vignetteCv.getContext('2d');
  const grad = g.createRadialGradient(
    vignetteCv.width / 2, vignetteCv.height / 2, Math.min(vignetteCv.width, vignetteCv.height) * 0.42,
    vignetteCv.width / 2, vignetteCv.height / 2, Math.max(vignetteCv.width, vignetteCv.height) * 0.72);
  grad.addColorStop(0, 'rgba(20,15,40,0)');
  grad.addColorStop(1, 'rgba(20,15,40,0.38)');
  g.fillStyle = grad;
  g.fillRect(0, 0, vignetteCv.width, vignetteCv.height);
}

const gameTime = () => performance.now() / 1000;

// ----- character drawing -----
function drawShadow(x, y, w) {
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(x, y + 1, w, w * 0.4, 0, 0, TAU); ctx.fill();
}
function faceOffset(facing) {
  return facing === 'left' ? [-2, 0] : facing === 'right' ? [2, 0] : facing === 'up' ? [0, -1.5] : [0, 0.5];
}
function drawEyes(x, y, facing, blink) {
  if (facing === 'up') return;
  const [ox, oy] = faceOffset(facing);
  ctx.fillStyle = '#2b2018';
  if (blink) {
    ctx.fillRect(x - 3 + ox, y + oy, 2.4, 0.8);
    ctx.fillRect(x + 1 + ox, y + oy, 2.4, 0.8);
  } else {
    ctx.fillRect(x - 3 + ox, y - 1 + oy, 2, 2.6);
    ctx.fillRect(x + 1.4 + ox, y - 1 + oy, 2, 2.6);
  }
}
function drawVillagerBody(x, y, facing, step, moving, shirt) {
  const lift = moving ? Math.abs(Math.sin(step)) * 1.4 : 0;
  // legs
  ctx.fillStyle = '#9a6b3f';
  const l1 = moving ? Math.sin(step) * 2 : 0, l2 = -l1;
  ctx.fillRect(x - 3.5, y - 4 + Math.max(0, l1), 3, 4 - Math.max(0, l1));
  ctx.fillRect(x + 0.5, y - 4 + Math.max(0, l2), 3, 4 - Math.max(0, l2));
  // body
  ctx.fillStyle = shirt;
  roundRect(ctx, x - 5.5, y - 11 - lift * 0.4, 11, 8, 3); ctx.fill();
  return lift;
}
function drawPlayer(x, y) {
  x = Math.round(x); y = Math.round(y);
  drawShadow(x, y, 6);
  const lift = drawVillagerBody(x, y, player.facing, player.step, player.moving, '#e2574c');
  const hy = y - 16 - lift;
  // head
  ctx.fillStyle = '#f5cf9e';
  ctx.beginPath(); ctx.arc(x, hy, 6.4, 0, TAU); ctx.fill();
  // hair
  ctx.fillStyle = '#5d4030';
  ctx.beginPath(); ctx.arc(x, hy - 1.4, 6.4, Math.PI, TAU); ctx.fill();
  ctx.fillRect(x - 6.4, hy - 2.5, 12.8, 2.2);

}
function drawNPC(n) {
  const x = Math.round(n.x), y = Math.round(n.y);
  const moving = n.state === 'walk';
  drawShadow(x, y, 6);
  const lift = drawVillagerBody(x, y, n.facing, n.step, moving, n.shirt);
  const hy = y - 16 - lift;
  ctx.fillStyle = n.body;
  ctx.beginPath(); ctx.arc(x, hy, 6.6, 0, TAU); ctx.fill();
  if (n.kind === 'cat') {
    // ears
    ctx.beginPath();
    ctx.moveTo(x - 6, hy - 3); ctx.lineTo(x - 5.4, hy - 9.5); ctx.lineTo(x - 1.4, hy - 5.6); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + 6, hy - 3); ctx.lineTo(x + 5.4, hy - 9.5); ctx.lineTo(x + 1.4, hy - 5.6); ctx.fill();
    ctx.fillStyle = n.accent;
    ctx.beginPath(); ctx.arc(x, hy + 2.8, 2.6, 0, Math.PI); ctx.fill(); // muzzle shading
    // whiskers
    ctx.strokeStyle = n.accent; ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(x - 6, hy + 1.5); ctx.lineTo(x - 9.5, hy + 1);
    ctx.moveTo(x - 6, hy + 3); ctx.lineTo(x - 9.5, hy + 3.5);
    ctx.moveTo(x + 6, hy + 1.5); ctx.lineTo(x + 9.5, hy + 1);
    ctx.moveTo(x + 6, hy + 3); ctx.lineTo(x + 9.5, hy + 3.5);
    ctx.stroke();
  } else { // frog: bulgy eyes on top
    ctx.fillStyle = n.body;
    ctx.beginPath(); ctx.arc(x - 3.6, hy - 5.4, 2.8, 0, TAU); ctx.arc(x + 3.6, hy - 5.4, 2.8, 0, TAU); ctx.fill();
    ctx.fillStyle = '#2b2018';
    if (n.facing !== 'up') {
      const [ox] = faceOffset(n.facing);
      ctx.fillRect(x - 4.4 + ox, hy - 6.2, 1.8, 2.2);
      ctx.fillRect(x + 2.6 + ox, hy - 6.2, 1.8, 2.2);
    }
    ctx.strokeStyle = n.accent; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(x, hy + 2.4, 2.4, 0.2, Math.PI - 0.2); ctx.stroke(); // smile
    return;
  }
  const blink = Math.sin(gameTime() * 0.8 + n.x) > 0.98;
  drawEyes(x, hy + 0.5, n.facing, blink);
}

// big Tom Nook portrait for the intro / title

// ----- world object drawing -----
function drawTree(tr) {
  const t = gameTime();

  drawShadow(x, y, 11);

  ctx.fillRect(x - 2.5, y - 14, 5, 14);

    ctx.strokeStyle = '#7c5a36'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y - 12); ctx.lineTo(x - 8 + sway, y - 24);
    ctx.moveTo(x, y - 14); ctx.lineTo(x + 7 + sway, y - 26);
    ctx.moveTo(x, y - 10); ctx.lineTo(x + 3 + sway, y - 30);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.ellipse(x + sway, y - 26, 9, 4, 0, 0, TAU); ctx.fill();

  const canopy = SEASON === 'autumn' ? ['#c87c30', '#b96a26'] : SEASON === 'spring' ? ['#54b04a', '#479e3e'] : ['#3f9440', '#358536'];

  ctx.fillStyle = canopy[0];
  ctx.beginPath();
  ctx.arc(x - 6 + sway, y - 19, 8, 0, TAU);
  ctx.arc(x + 6 + sway, y - 19, 8, 0, TAU);
  ctx.arc(x + sway, y - 27, 8.5, 0, TAU);

  } else {
    ctx.fillStyle = '#ff9c4a';

}

function drawLamp(x, y) {

function drawFlowerSprite(x, y, c1, c2, ph) {

  }

    ctx.beginPath(); ctx.ellipse(x - 2.4, y - 5, 2.6, 1.4, -0.5, 0, TAU); ctx.ellipse(x + 2.4, y - 5, 2.6, 1.4, 0.5, 0, TAU); ctx.fill();

    drawFlowerSprite(x, y, '#ff6f87', '#ffe27a', p.t0 % 7);

// ----- item icons (shared between world & UI) -----
function drawIcon(type, x, y, s) {
  ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
  if (type === 'shell') {
    ctx.fillStyle = '#f1b8c4';
    ctx.beginPath(); ctx.moveTo(0, 4); ctx.arc(0, 0, 5, Math.PI * 0.15, Math.PI * 0.85, true); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#d98da0'; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, 4); ctx.lineTo(-3, -3); ctx.moveTo(0, 4); ctx.lineTo(0, -4.6); ctx.moveTo(0, 4); ctx.lineTo(3, -3);
    ctx.stroke();
  } else if (type === 'fruit') {
    ctx.fillStyle = '#ffab66';
    ctx.beginPath(); ctx.arc(0, 0.5, 4.6, 0, TAU); ctx.fill();
    ctx.fillStyle = '#ff8a4d';
    ctx.beginPath(); ctx.arc(1.4, 1.4, 3, 0, TAU); ctx.fill();
    ctx.fillStyle = '#4d8f3c';
    ctx.beginPath(); ctx.ellipse(1.4, -4.4, 2.4, 1.2, 0.6, 0, TAU); ctx.fill();
  } else if (type === 'fish') {
    ctx.fillStyle = '#6db3d8';
    ctx.beginPath(); ctx.ellipse(-0.5, 0, 4.6, 2.8, 0, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3.4, 0); ctx.lineTo(6.4, -2.6); ctx.lineTo(6.4, 2.6); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#173b4f';
    ctx.beginPath(); ctx.arc(-2.6, -0.6, 0.8, 0, TAU); ctx.fill();
  } else if (type === 'fossil') {
    ctx.strokeStyle = '#9a7d5a'; ctx.lineWidth = 1.6;
    ctx.beginPath();
    for (let a = 0; a < TAU * 2.1; a += 0.3) {
      const r = 0.9 + a * 0.75;
      const px = Math.cos(a) * r, py = Math.sin(a) * r;
      a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
  } else if (type === 'flower') {
    ctx.fillStyle = '#ff6f87';
    for (let i = 0; i < 5; i++) {
      const a = i / 5 * TAU;
      ctx.beginPath(); ctx.arc(Math.cos(a) * 3, Math.sin(a) * 3, 2.4, 0, TAU); ctx.fill();
    }
    ctx.fillStyle = '#ffe27a';
    ctx.beginPath(); ctx.arc(0, 0, 2, 0, TAU); ctx.fill();
  } else if (type === 'seeds') {
    ctx.fillStyle = '#d8b27a';
    roundRect(ctx, -4, -3, 8, 8, 2); ctx.fill();
    ctx.fillStyle = '#b58e58';
    ctx.fillRect(-4, -3, 8, 2.4);
    ctx.fillStyle = '#6b4f2f';
    ctx.beginPath(); ctx.arc(-1.4, 1.6, 0.9, 0, TAU); ctx.arc(1.6, 2.6, 0.9, 0, TAU); ctx.arc(0.6, 0, 0.9, 0, TAU); ctx.fill();
  } else if (type === 'bell') {
    ctx.fillStyle = '#ffd95e';
    ctx.beginPath(); ctx.arc(0, 0, 4.6, 0, TAU); ctx.fill();
    ctx.strokeStyle = '#c79a2a'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, 4.6, 0, TAU); ctx.stroke();
    ctx.fillStyle = '#c79a2a';
    ctx.font = '800 6px Nunito, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('★', 0, 2.2);
  }
  ctx.restore();
}
function drawGroundItem(it) {
  const t = gameTime();
  if (it.type === 'fish') {
    // fish shadow in water
    ctx.fillStyle = 'rgba(10,40,60,0.35)';
    const wob = Math.sin(t * 3 + it.ph) * 1.4;
    ctx.beginPath(); ctx.ellipse(it.x, it.y, 6 + wob * 0.4, 3.4, Math.sin(it.ph + t * 0.5) * 0.4, 0, TAU); ctx.fill();
    const rip = (t * 0.7 + it.ph) % 1;
    ctx.strokeStyle = `rgba(255,255,255,${0.35 * (1 - rip)})`;
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(it.x, it.y, 5 + rip * 9, 0, TAU); ctx.stroke();
    return;
  }
  if (it.type === 'fossil') {
    // buried star crack
    ctx.strokeStyle = 'rgba(110,80,40,0.8)'; ctx.lineWidth = 1.4;
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      const a = i / 4 * TAU + 0.6;
      ctx.moveTo(it.x, it.y);
      ctx.lineTo(it.x + Math.cos(a) * 5, it.y + Math.sin(a) * 5);
    }
    ctx.stroke();
    ctx.fillStyle = 'rgba(110,80,40,0.45)';
    ctx.beginPath(); ctx.arc(it.x, it.y, 2.2, 0, TAU); ctx.fill();
    return;
  }
  const bob = Math.sin(t * 2.4 + it.ph) * 1.2;
  ctx.fillStyle = 'rgba(0,0,0,0.13)';
  ctx.beginPath(); ctx.ellipse(it.x, it.y + 3, 4, 1.6, 0, 0, TAU); ctx.fill();
  drawIcon(it.type, it.x, it.y - 2 - bob, 0.9);
}

// ----- main world render -----
function renderWorld() {
  const z = view.zoom * view.dpr;
  const camX = Math.round(cam.x * z) / z, camY = Math.round(cam.y * z) / z;
  ctx.setTransform(z, 0, 0, z, -camX * z, -camY * z);
  const t = gameTime();
  const vw = view.w / view.zoom, vh = view.h / view.zoom;

  // water base (sky-tinted)
  const period = dayPeriod();
  const waterCol = { morning: '#4aa6d8', afternoon: '#3f9bd0', evening: '#3f7fb8', night: '#1d3a66' }[period];
  ctx.fillStyle = waterCol;
  ctx.fillRect(camX, camY, vw, vh);

  // water sparkles on visible water tiles
  const tx0 = Math.max(0, Math.floor(camX / TILE)), ty0 = Math.max(0, Math.floor(camY / TILE));
  const tx1 = Math.min(MW - 1, Math.ceil((camX + vw) / TILE)), ty1 = Math.min(MH - 1, Math.ceil((camY + vh) / TILE));
  ctx.fillStyle = period === 'night' ? 'rgba(190,210,255,0.25)' : 'rgba(255,255,255,0.35)';
  for (let y = ty0; y <= ty1; y++) for (let x = tx0; x <= tx1; x++) {
    if (map[y][x] !== T_WATER) continue;
    const h = hash2(x, y);
    if (h < 0.10) {
      const ph = Math.sin(t * 1.5 + h * 60);
      if (ph > 0.2) ctx.fillRect(x * TILE + h * 700 % 12, y * TILE + h * 300 % 12, 3.5 * ph, 1);
    }
  }

  // land
  ctx.drawImage(terrainCv, 0, 0);

  // shoreline foam
  ctx.lineCap = 'round';
  for (const e of foamEdges) {
    const ex = e.x * TILE, ey = e.y * TILE;
    if (ex < camX - 20 || ex > camX + vw + 20 || ey < camY - 20 || ey > camY + vh + 20) continue;
    const pulse = Math.sin(t * 1.7 + e.ph);
    const off = 2 + pulse * 1.6;
    ctx.strokeStyle = `rgba(255,255,255,${0.3 + pulse * 0.2})`;
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    if (e.side === 0) { ctx.moveTo(ex + 2, ey - off); ctx.lineTo(ex + TILE - 2, ey - off); }
    else if (e.side === 1) { ctx.moveTo(ex + TILE + off, ey + 2); ctx.lineTo(ex + TILE + off, ey + TILE - 2); }
    else if (e.side === 2) { ctx.moveTo(ex + 2, ey + TILE + off); ctx.lineTo(ex + TILE - 2, ey + TILE + off); }
    else { ctx.moveTo(ex - off, ey + 2); ctx.lineTo(ex - off, ey + TILE - 2); }
    ctx.stroke();
  }

  // ground layer: wildflowers, items, plants
  for (const f of wildflowers) {
    if (f.x < camX - 16 || f.x > camX + vw + 16 || f.y < camY - 16 || f.y > camY + vh + 16) continue;
    drawFlowerSprite(f.x, f.y, f.c1, f.c2, f.ph);
  }
  for (const it of groundItems) drawGroundItem(it);
  for (const p of plants) drawPlant(p);

  // depth-sorted layer
  const drawables = [];
  drawables.push({ y: shop.y + 4, fn: drawShop });
  drawables.push({ y: shop.y + 32, fn: () => drawLamp(shop.x - 52, shop.y + 30) });
  for (const tr of trees) drawables.push({ y: tr.y, fn: () => drawTree(tr) });
  for (const r of rocks) drawables.push({ y: r.y, fn: () => drawRock(r) });
  for (const n of npcs) drawables.push({ y: n.y, fn: () => drawNPC(n) });
  drawables.push({ y: player.y, fn: () => drawPlayer(player.x, player.y) });
  drawables.sort((a, b) => a.y - b.y);
  for (const d of drawables) d.fn();

  // interact bubble over target
  const tgt = !dlg.open && !shopUI.open && !invOpen ? nearestInteract() : null;
  if (tgt) {
    let bx = player.x, by = player.y - 34;
    if (tgt.obj) { bx = tgt.obj.x; by = tgt.obj.y - (tgt.kind === 'npc' ? 32 : 18); }
    else if (tgt.kind === 'shop') { bx = shop.x; by = shop.y - shop.h - 14; }
    const bob = Math.sin(t * 4) * 1.5;
    ctx.fillStyle = 'rgba(255,251,233,0.95)';
    roundRect(ctx, bx - 6, by - 6 + bob, 12, 12, 4); ctx.fill();
    ctx.fillStyle = '#7a5230';
    ctx.font = '900 8px Nunito, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('E', bx, by + 3 + bob);
  }
}

// ----- screen-space scenery (clouds, particles, light) -----
function renderClouds() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  const night = dayPeriod() === 'night';
  for (const c of clouds) {
    const sx = ((c.x - cam.x * 0.35) % (view.w + 480)) - 240;
    const sy = c.y * view.h * 0.9;
    ctx.fillStyle = night ? 'rgba(190,200,235,0.10)' : 'rgba(255,255,255,0.34)';
    ctx.beginPath();
    ctx.ellipse(sx, sy, 56 * c.s, 16 * c.s, 0, 0, TAU);
    ctx.ellipse(sx + 34 * c.s, sy + 6 * c.s, 38 * c.s, 13 * c.s, 0, 0, TAU);
    ctx.ellipse(sx - 36 * c.s, sy + 7 * c.s, 34 * c.s, 12 * c.s, 0, 0, TAU);
    ctx.fill();
  }
}
function renderParticles() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  for (const p of particles) {
    if (p.kind === 'snow') {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.6 + Math.sin(p.ph) * 0.5, 0, TAU); ctx.fill();
    } else if (p.kind === 'leaf') {
      ctx.fillStyle = p.c;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.sin(p.ph) * 1.2);
      ctx.beginPath(); ctx.ellipse(0, 0, 3.4, 1.8, 0, 0, TAU); ctx.fill();
      ctx.restore();
    } else if (p.kind === 'petal') {
      ctx.fillStyle = 'rgba(255,190,210,0.9)';
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.sin(p.ph) * 0.9);
      ctx.beginPath(); ctx.ellipse(0, 0, 2.6, 1.5, 0, 0, TAU); ctx.fill();
      ctx.restore();
    } else {
      const a = 0.25 + 0.25 * Math.sin(p.ph * 2);
      ctx.fillStyle = dayPeriod() === 'night' ? `rgba(255,250,170,${a})` : `rgba(255,255,255,${a * 0.7})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.3, 0, TAU); ctx.fill();
    }
  }
}
function renderLightAndVignette() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  const [r, g, b, a] = lightTint();
  if (a > 0.004) {
    ctx.fillStyle = `rgba(${r | 0},${g | 0},${b | 0},${a})`;
    ctx.fillRect(0, 0, view.w, view.h);
  }
  if (vignetteCv) ctx.drawImage(vignetteCv, 0, 0, view.w, view.h);
}

// ----- UI -----
function panel(x, y, w, h, alpha = 0.93) {
  ctx.save();
  ctx.shadowColor = 'rgba(60,40,10,0.25)';
  ctx.shadowBlur = 8; ctx.shadowOffsetY = 3;
  ctx.fillStyle = `rgba(255,250,231,${alpha})`;
  roundRect(ctx, x, y, w, h, 14); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = 'rgba(185,141,82,0.8)'; ctx.lineWidth = 2;
  roundRect(ctx, x, y, w, h, 14); ctx.stroke();
}
function fmtTime(d = new Date()) {
  let h = d.getHours();
  const ap = h < 12 ? 'AM' : 'PM';
  h = (h + 11) % 12 + 1;
  return `${h}:${String(d.getMinutes()).padStart(2, '0')} ${ap}`;
}
const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

function renderHUD() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  ctx.textBaseline = 'alphabetic';
  const d = new Date();

  // clock panel
  panel(14, 14, 158, 54);
  ctx.fillStyle = '#7a5230';
  ctx.font = '900 22px Nunito, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(fmtTime(d), 28, 40);
  ctx.font = '700 12px Nunito, sans-serif';
  ctx.fillStyle = '#a3845c';
  ctx.fillText(`${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}  ·  ${dayPeriod()}`, 28, 58);

  // bells panel
  const bw = 130;
  panel(view.w - bw - 14, 14, bw, 40);
  drawIcon('bell', view.w - bw + 8, 34, 1.6);
  ctx.fillStyle = '#7a5230';
  ctx.font = '900 17px Nunito, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(String(player.bells), view.w - bw + 24, 40);

  // controls hint
  ctx.font = '700 11px Nunito, sans-serif'; ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,250,231,0.75)';
  ctx.fillText('WASD/arrows move · Shift run · E interact · I inventory · P plant · M sound', 16, view.h - 12);

  // toasts
  ctx.textAlign = 'center';
  toasts.forEach((tt, i) => {
    const a = tt.t < 0.2 ? tt.t / 0.2 : tt.t > 2.1 ? Math.max(0, 1 - (tt.t - 2.1) / 0.5) : 1;
    const y = 86 + i * 34 - (tt.t < 0.2 ? (0.2 - tt.t) * 30 : 0);
    ctx.font = '800 14px Nunito, sans-serif';
    const w = ctx.measureText(tt.text).width + 34;
    ctx.globalAlpha = a;
    panel(view.w / 2 - w / 2, y, w, 28, 0.92);
    ctx.fillStyle = '#7a5230';
    ctx.fillText(tt.text, view.w / 2, y + 19);
    ctx.globalAlpha = 1;
  });

  if (invOpen) renderInventory();
  if (shopUI.open) renderShop();
  if (dlg.open) renderDialog();
}

function renderInventory() {
  const w = Math.min(420, view.w - 40), rowH = 54;
  const h = 74 + Math.ceil(INV_ORDER.length / 3) * rowH;
  const x = (view.w - w) / 2, y = (view.h - h) / 2 - 20;
  panel(x, y, w, h);
  ctx.fillStyle = '#7a5230';
  ctx.font = '900 18px Nunito, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`${player.name}'s Pockets`, x + w / 2, y + 30);
  const cols = 3, cw = (w - 40) / cols;
  INV_ORDER.forEach((type, i) => {
    const cxp = x + 20 + (i % cols) * cw, cyp = y + 48 + Math.floor(i / cols) * rowH;
    ctx.fillStyle = 'rgba(122,82,48,0.07)';
    roundRect(ctx, cxp, cyp, cw - 8, rowH - 8, 10); ctx.fill();
    drawIcon(type, cxp + 20, cyp + 23, 1.9);
    const n = player.inv[type] || 0;
    ctx.fillStyle = n > 0 ? '#7a5230' : '#c9b48e';
    ctx.font = '800 13px Nunito, sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(ITEMS[type].name, cxp + 38, cyp + 21);
    ctx.font = '700 12px Nunito, sans-serif';
    ctx.fillText(`× ${n}`, cxp + 38, cyp + 38);
  });
  ctx.fillStyle = '#a3845c';
  ctx.font = '700 12px Nunito, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('I / Esc — close', x + w / 2, y + h - 14);
}

function renderShop() {
  const w = Math.min(440, view.w - 40), h = Math.min(380, view.h - 60);
  const x = (view.w - w) / 2, y = (view.h - h) / 2 - 10;
  panel(x, y, w, h);
  drawNook(ctx, x + 44, y + 52, 1.15, false);
  ctx.fillStyle = '#7a5230';
  ctx.font = '900 19px Nunito, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText("Nook's Cranny", x + 86, y + 38);
  ctx.font = '700 12px Nunito, sans-serif'; ctx.fillStyle = '#a3845c';
  ctx.fillText('"Buy low, sell... also low! Yes, yes."', x + 86, y + 56);

  // tabs
  const tabs = ['SELL', 'BUY'];
  tabs.forEach((tb, i) => {
    const tx = x + 24 + i * 96;
    ctx.fillStyle = shopUI.tab === i ? '#4d8f5c' : 'rgba(122,82,48,0.12)';
    roundRect(ctx, tx, y + 86, 88, 28, 999); ctx.fill();
    ctx.fillStyle = shopUI.tab === i ? '#fff' : '#7a5230';
    ctx.font = '800 13px Nunito, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(tb, tx + 44, y + 105);
  });

  const rows = shopRows();
  const ry0 = y + 128;
  if (rows.length === 0) {
    ctx.fillStyle = '#c9b48e'; ctx.font = '700 14px Nunito, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Nothing to sell — go explore, hm!', x + w / 2, ry0 + 30);
  }
  rows.forEach((type, i) => {
    const ry = ry0 + i * 38;
    if (i === shopUI.sel) {
      ctx.fillStyle = 'rgba(77,143,92,0.16)';
      roundRect(ctx, x + 16, ry - 6, w - 32, 34, 9); ctx.fill();
      ctx.fillStyle = '#4d8f5c'; ctx.font = '900 14px Nunito, sans-serif'; ctx.textAlign = 'left';
      ctx.fillText('▶', x + 24, ry + 16);
    }
    drawIcon(type, x + 56, ry + 11, 1.5);
    ctx.fillStyle = '#7a5230'; ctx.font = '800 14px Nunito, sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(ITEMS[type].name + (shopUI.tab === 0 ? `  × ${player.inv[type] || 0}` : ''), x + 74, ry + 16);
    ctx.textAlign = 'right';
    const price = shopUI.tab === 0 ? ITEMS[type].sell : ITEMS[type].buy;
    ctx.fillText(`${price} Bells`, x + w - 28, ry + 16);
  });

  ctx.fillStyle = '#a3845c'; ctx.font = '700 11.5px Nunito, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(shopUI.tab === 0
    ? '↑↓ select · Enter sell one · A sell all · ←→ tab · E close'
    : '↑↓ select · Enter buy · ←→ tab · E close', x + w / 2, y + h - 16);
}

function renderDialog() {
  const w = Math.min(620, view.w - 50), h = 118;
  const x = (view.w - w) / 2, y = view.h - h - 28;
  panel(x, y, w, h, 0.96);
  // name tag
  ctx.font = '900 15px Nunito, sans-serif';
  const tagW = ctx.measureText(dlg.speaker).width + 44;
  ctx.fillStyle = dlg.color;
  roundRect(ctx, x + 20, y - 16, Math.max(tagW, 86), 32, 999); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '900 15px Nunito, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(dlg.speaker, x + 38, y + 5);
  // text with wrap
  const line = dlg.lines[dlg.li].slice(0, Math.floor(dlg.shown));
  ctx.fillStyle = '#6b4a2a';
  ctx.font = '800 16px Nunito, sans-serif';
  wrapText(line, x + 28, y + 38, w - 56, 23);
  // continue arrow
  if (dlg.shown >= dlg.lines[dlg.li].length) {
    ctx.fillStyle = dlg.color;
    const bob = Math.sin(gameTime() * 5) * 2;
    ctx.beginPath();
    ctx.moveTo(x + w - 30, y + h - 20 + bob);
    ctx.lineTo(x + w - 18, y + h - 20 + bob);
    ctx.lineTo(x + w - 24, y + h - 12 + bob);
    ctx.closePath(); ctx.fill();
  }
}
function wrapText(text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line = '', yy = y;
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, yy); line = word; yy += lh;
    } else line = test;
  }
  ctx.fillText(line, x, yy);
}

// ----- title & intro scenes -----
function renderBeachScene() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  const [top, bottom] = skyColors();
  const g = ctx.createLinearGradient(0, 0, 0, view.h);
  g.addColorStop(0, top); g.addColorStop(0.62, bottom);
  g.addColorStop(0.62, '#3f9bd0'); g.addColorStop(1, '#2f7cb0');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, view.w, view.h);
  const t = gameTime();
  const period = dayPeriod();
  // sun / moon
  const h = nowHour();
  const isDay = h >= 6 && h < 19;
  const prog = isDay ? (h - 6) / 13 : ((h >= 19 ? h - 19 : h + 5) / 11);
  const ax = lerp(view.w * 0.12, view.w * 0.88, prog);
  const ay = view.h * 0.5 - Math.sin(prog * Math.PI) * view.h * 0.34;
  if (isDay) {
    ctx.fillStyle = '#fff3b8';
    ctx.beginPath(); ctx.arc(ax, ay, 34, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(255,243,184,0.25)';
    ctx.beginPath(); ctx.arc(ax, ay, 52, 0, TAU); ctx.fill();
  } else {
    ctx.fillStyle = '#f2f4e9';
    ctx.beginPath(); ctx.arc(ax, ay, 26, 0, TAU); ctx.fill();
    ctx.fillStyle = top;
    ctx.beginPath(); ctx.arc(ax - 10, ay - 6, 22, 0, TAU); ctx.fill();
    // stars
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for (let i = 0; i < 40; i++) {
      const sx = hash2(i, 7) * view.w, sy = hash2(i, 13) * view.h * 0.55;
      const tw = Math.sin(t * 2 + i) * 0.5 + 0.5;
      ctx.globalAlpha = 0.3 + tw * 0.5;
      ctx.fillRect(sx, sy, 2, 2);
    }
    ctx.globalAlpha = 1;
  }
  renderClouds();
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  // ocean waves
  for (let i = 0; i < 3; i++) {
    const wy = view.h * 0.62 + 18 + i * 26 + Math.sin(t * 1.1 + i * 2) * 4;
    ctx.strokeStyle = `rgba(255,255,255,${0.22 - i * 0.05})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let xx = -20; xx <= view.w + 20; xx += 30) {
      const yy = wy + Math.sin(xx * 0.02 + t * 1.6 + i) * 5;
      xx === -20 ? ctx.moveTo(xx, yy) : ctx.lineTo(xx, yy);
    }
    ctx.stroke();
  }
  // beach strip
  ctx.fillStyle = SEASON === 'winter' ? '#ded7c4' : '#ecd9a2';
  ctx.beginPath();
  ctx.moveTo(0, view.h);
  ctx.quadraticCurveTo(view.w * 0.5, view.h * 0.78, view.w, view.h);
  ctx.closePath(); ctx.fill();
}

function renderTitle() {
  renderBeachScene();
  const t = gameTime();
  // palm-ish silhouettes
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  // logo
  const lx = view.w / 2, ly = view.h * 0.3 + Math.sin(t * 1.3) * 5;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.font = `900 ${Math.min(76, view.w / 9)}px Nunito, sans-serif`;
  ctx.lineWidth = 10; ctx.lineJoin = 'round';
  ctx.strokeStyle = '#7a5230';
  ctx.strokeText('Animal Isle', lx, ly);
  ctx.fillStyle = '#fff6dd';
  ctx.fillText('Animal Isle', lx, ly);
  // leaf
  ctx.fillStyle = '#4d8f5c';
  ctx.save();
  ctx.translate(lx + Math.min(76, view.w / 9) * 2.6, ly - 44);
  ctx.rotate(Math.sin(t * 2) * 0.2 + 0.4);
  ctx.beginPath(); ctx.ellipse(0, 0, 16, 10, 0, 0, TAU); ctx.fill();
  ctx.restore();
  ctx.font = '800 17px Nunito, sans-serif';
  ctx.fillStyle = 'rgba(255,246,221,0.95)';
  ctx.fillText('a cozy little fan demo', lx, ly + 34);

  drawNook(ctx, lx, view.h * 0.62, 2.2, false);

  const save = loadGame();
  ctx.font = '800 18px Nunito, sans-serif';
  ctx.globalAlpha = 0.6 + 0.4 * Math.sin(t * 3.5);
  ctx.fillStyle = '#fff';
  ctx.fillText(save && save.name ? `Press Enter — continue as ${save.name}` : 'Press Enter to begin', lx, view.h * 0.82);
  ctx.globalAlpha = 1;
  if (save && save.name) {
    ctx.font = '700 13px Nunito, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('N — start a new life', lx, view.h * 0.82 + 26);
  }
  ctx.font = '700 12px Nunito, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText(`It's ${fmtTime()} — the island lives on your clock`, lx, view.h - 18);
}

function renderIntro() {
  renderBeachScene();
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  const item = intro.script[intro.idx];
  const talking = item && item.t === 'line' && intro.shown < item.s.length;
  drawNook(ctx, view.w / 2, view.h * 0.40, 3.1, talking);

  if (intro.waitingInput) {
    ctx.textAlign = 'center';
    ctx.font = '900 24px Nunito, sans-serif';
    ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(80,50,20,0.55)';
    ctx.strokeText('And what should I call you, hm?', view.w / 2, view.h * 0.68);
    ctx.fillStyle = '#fff6dd';
    ctx.fillText('And what should I call you, hm?', view.w / 2, view.h * 0.68);
    return;
  }
  if (item && item.t === 'line') {
    const w = Math.min(640, view.w - 50), h = 124;
    const x = (view.w - w) / 2, y = view.h - h - 30;
    panel(x, y, w, h, 0.96);
    ctx.fillStyle = '#3f7a4c';
    roundRect(ctx, x + 20, y - 16, 120, 32, 999); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '900 15px Nunito, sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('Tom Nook', x + 36, y + 5);
    const text = item.s.replace(/\{name\}/g, player.name).slice(0, Math.floor(intro.shown));
    ctx.fillStyle = '#6b4a2a'; ctx.font = '800 16px Nunito, sans-serif';
    wrapText(text, x + 28, y + 38, w - 56, 23);
    if (intro.shown >= item.s.length) {
      ctx.fillStyle = '#3f7a4c';
      const bob = Math.sin(gameTime() * 5) * 2;
      ctx.beginPath();
      ctx.moveTo(x + w - 30, y + h - 20 + bob); ctx.lineTo(x + w - 18, y + h - 20 + bob); ctx.lineTo(x + w - 24, y + h - 12 + bob);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#a3845c'; ctx.font = '700 12px Nunito, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('E / Enter', x + w / 2, y + h - 12);
    }
  }
}

// ---------- Main loop ----------
function frame(now) {
  const dt = clamp((now - lastT) / 1000, 0, 0.05);
  lastT = now;
  update(dt);

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, cv.width, cv.height);

  if (state === 'title') {
    renderTitle();
    renderParticles();
    renderLightAndVignette();
  } else if (state === 'intro') {
    renderIntro();
    renderParticles();
    if (vignetteCv) { ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0); ctx.drawImage(vignetteCv, 0, 0, view.w, view.h); }
  } else {
    renderWorld();
    renderClouds();
    renderParticles();
    renderLightAndVignette();
    renderHUD();
  }

  if (fade > 0) {
    ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
    ctx.fillStyle = `rgba(12,10,24,${fade})`;
    ctx.fillRect(0, 0, view.w, view.h);
  }
  requestAnimationFrame(frame);
}

// ---------- Boot ----------
resize();
fillSpawns(true);
{
  const save = loadGame();
  if (save && save.name) { player.name = save.name; player.bells = save.bells ?? 100; player.inv = save.inv || {}; }
}
const [icx, icy] = camTarget();
cam.x = icx; cam.y = icy;
if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => {});
requestAnimationFrame(frame);
</script>

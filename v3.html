function mulberry32(seed) {
  return function () {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function roundRect(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);

}

];
function hexToRgb(h) { return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }
function mixHex(a, b, t) {
  const A = hexToRgb(a), B = hexToRgb(b);
  return `rgb(${Math.round(lerp(A[0], B[0], t))},${Math.round(lerp(A[1], B[1], t))},${Math.round(lerp(A[2], B[2], t))})`;
}

const SLOT_KEY = i => 'ai-slot-' + i;
let currentSlot = -1;
let prog = null; // { seed, createdAt, built:{}, tools:{}, donated:{}, lastGift, star }
function freshProg(seed) {
  return { seed, createdAt: Date.now(), built: {}, tools: {}, donated: {}, lastGift: '', star: false };
}
function readSlot(i) {
  try { return JSON.parse(localStorage.getItem(SLOT_KEY(i))); } catch (e) { return null; }
}
function persist() {
  if (currentSlot < 0 || !prog) return;
  try {
    localStorage.setItem(SLOT_KEY(currentSlot), JSON.stringify({
      name: player.name, bells: player.bells, inv: player.inv,
      seed: prog.seed, createdAt: prog.createdAt, built: prog.built, tools: prog.tools,
      donated: prog.donated, lastGift: prog.lastGift, star: prog.star,
      plants: plants.map(p => ({ x: p.x, y: p.y, t0: p.t0 })),
    }));
  } catch (e) {}
}
// migrate v1 save into slot 0
(function migrate() {
  try {
    const old = JSON.parse(localStorage.getItem('animal-isle-save'));
    if (old && old.name && !readSlot(0)) {
      const p = freshProg(Math.floor(Math.random() * 1e9));
      localStorage.setItem(SLOT_KEY(0), JSON.stringify({
        name: old.name, bells: old.bells || 100, inv: old.inv || {},
        ...p, plants: [],
      }));
    }
    localStorage.removeItem('animal-isle-save');
  } catch (e) {}
})();

// ---------------- world (procedural per seed) ----------------
const TILE = 16, MW = 110, MH = 88;
const WORLD_W = MW * TILE, WORLD_H = MH * TILE;
const T_WATER = 0, T_SAND = 1, T_GRASS = 2;
let map = [], trees = [], rocks = [], wildflowers = [], foamEdges = [];
let plots = {}; // key -> {x, y} (base/door center, world px)
let terrainCv = null;
let spawnPt = { x: 0, y: 0 };

const tileAt = (px, py) => {
  const tx = Math.floor(px / TILE), ty = Math.floor(py / TILE);
  if (tx < 0 || ty < 0 || tx >= MW || ty >= MH) return T_WATER;
  return map[ty][tx];
};
const isLand = (px, py) => tileAt(px, py) !== T_WATER;

function genWorld(seed) {
  for (let attempt = 0; attempt < 12; attempt++) {
    if (tryGenWorld(seed + attempt * 7919)) return;
  }
  tryGenWorld(1337); // bulletproof fallback
}
function tryGenWorld(seed) {
  const rng = mulberry32(seed);
  const cx = MW / 2, cy = MH / 2;
  const p1 = rng() * TAU, p2 = rng() * TAU, p3 = rng() * TAU;
  const f1 = 0.20 + rng() * 0.16, f2 = 0.18 + rng() * 0.14, f3 = 0.12 + rng() * 0.10;
  const a1 = 0.06 + rng() * 0.06, a2 = 0.05 + rng() * 0.05, a3 = 0.04 + rng() * 0.04;
  const rx = MW * (0.38 + rng() * 0.06), ry = MH * (0.36 + rng() * 0.06);
  map = [];
  let grassCount = 0;
  for (let y = 0; y < MH; y++) {
    map[y] = [];
    for (let x = 0; x < MW; x++) {
      const nx = (x - cx) / rx, ny = (y - cy) / ry;
      let d = Math.sqrt(nx * nx + ny * ny);
      d += a1 * Math.sin(x * f1 + p1) + a2 * Math.cos(y * f2 + p2) + a3 * Math.sin((x + y) * f3 + p3);

      if (x < 2 || y < 2 || x >= MW - 2 || y >= MH - 2) t = T_WATER;

  }
  if (grassCount < 2000) return false;

  const nPonds = 1 + (rng() < 0.6 ? 1 : 0);
  for (let p = 0; p < nPonds; p++) {
    for (let tr = 0; tr < 100; tr++) {
      const px = Math.floor(cx + (rng() * 2 - 1) * rx * 0.55);
      const py = Math.floor(cy + (rng() * 2 - 1) * ry * 0.55);
      if (map[py] && map[py][px] === T_GRASS) {
        const r = 2.2 + rng() * 1.4;
        for (let y = 0; y < MH; y++) for (let x = 0; x < MW; x++) {
          const d = Math.hypot(x - px, y - py);
          if (d < r && map[y][x] === T_GRASS) map[y][x] = T_WATER;

  plots.house = findSpot(tcx, tcy, 13, 3, 4);
  plots.shop = findSpot(tcx, tcy, 16, 3, 4);
  plots.museum = findSpot(cx, cy, 20, 4, 5);
  plots.cafe = findSpot(cx, cy, 20, 3, 4);
  plots.home1 = findSpot(cx, cy, 24, 3, 3);
  plots.home2 = findSpot(cx, cy, 24, 3, 3);
  for (const k in plots) if (!plots[k]) return false;
  spawnPt = { x: plots.tent.x, y: plots.tent.y + 36 };
  if (tileAt(spawnPt.x, spawnPt.y) !== T_GRASS) {
    outer: for (let r = 1; r < 12; r++) for (let a = 0; a < TAU; a += 0.5) {
      const sx = plots.tent.x + Math.cos(a) * r * TILE, sy = plots.tent.y + 20 + Math.sin(a) * r * TILE;
      if (tileAt(sx, sy) === T_GRASS) { spawnPt = { x: sx, y: sy }; break outer; }
    }
  }

  trees = []; rocks = []; wildflowers = [];
  const farFromPlots = (x, y, d) => Object.values(plots).every(p => dist(x, y, p.x, p.y) > d);
  let tries = 0;
  while (trees.length < 48 && tries++ < 6000) {
    const x = rng() * WORLD_W, y = rng() * WORLD_H;
    if (tileAt(x, y) !== T_GRASS) continue;
    if (!farFromPlots(x, y, 64)) continue;
    if (dist(x, y, spawnPt.x, spawnPt.y) < 50) continue;
    if (!trees.every(t => dist(x, y, t.x, t.y) > 42)) continue;
    trees.push({ x, y, sway: rng() * TAU });
  }
  tries = 0;
  while (rocks.length < 10 && tries++ < 3000) {
    const x = rng() * WORLD_W, y = rng() * WORLD_H;
    if (tileAt(x, y) !== T_GRASS) continue;
    if (!farFromPlots(x, y, 60) || !trees.every(t => dist(x, y, t.x, t.y) > 26)) continue;
    if (!rocks.every(r => dist(x, y, r.x, r.y) > 70)) continue;
    rocks.push({ x, y, s: 0.8 + rng() * 0.6 });
  }
  for (let c = 0; c < 14; c++) {
    let fx, fy, ok = false, t2 = 0;
    while (!ok && t2++ < 250) {
      fx = rng() * WORLD_W; fy = rng() * WORLD_H;
      ok = tileAt(fx, fy) === T_GRASS && farFromPlots(fx, fy, 56);
    }
    if (!ok) continue;
    const n = 5 + Math.floor(rng() * 5);
    const hue = pick([['#ff6f87', '#ffd2da'], ['#ffd14f', '#fff0b8'], ['#ff9a4d', '#ffe0c2'], ['#c98bff', '#ecd9ff'], ['#ff5c5c', '#ffc9c9']]);
    for (let i = 0; i < n; i++) {

  for (let y = 1; y < MH - 1; y++) for (let x = 1; x < MW - 1; x++) {

}

function renderTerrain(seed) {

  const pal = {

    summer: { grass: ['#54ad47', '#4da540'], sand: ['#ecd9a2', '#e5d199'] },
    autumn: { grass: ['#a3a953', '#99a04c'], sand: ['#e6d3a0', '#dfcb96'] },
    winter: { grass: ['#e9eef3', '#e1e8ef'], sand: ['#ded7c4', '#d6cfba'] },
  }[SEASON];
  const r2 = mulberry32(seed ^ 0x5f3759df);
  for (let y = 0; y < MH; y++) for (let x = 0; x < MW; x++) {
    const t = map[y][x];
    if (t === T_WATER) continue;
    const set = t === T_GRASS ? pal.grass : pal.sand;
    g.fillStyle = set[(x + y) % 2];
    g.fillRect(x * TILE, y * TILE, TILE, TILE);
    for (let i = 0; i < 2; i++) {
      const sx = x * TILE + r2() * TILE, sy = y * TILE + r2() * TILE;
      if (t === T_GRASS) {

}

      const m = set.base + PENTA[audio.mel % 5] + 12 * Math.floor(audio.mel / 5);
      tone({ f: mtof(m), t, dur: eighthLen * rnd(1.1, 2.2), type: set.wave, vol: 0.085 });

    audio.birdT -= dt;
    if (audio.birdT <= 0) {
      audio.birdT = p === 'morning' ? rnd(0.8, 3.5) : rnd(4, 10);
      const n = 2 + Math.floor(rnd(3)), f0 = rnd(2300, 3300);
      for (let i = 0; i < n; i++) {
        tone({ f: f0 * rnd(0.92, 1.1), t: t + i * rnd(0.09, 0.15), dur: 0.09, type: 'sine', vol: 0.04, dest: audio.amb, slide: f0 * rnd(1.15, 1.4) });
      }
    }
  }
  if (p === 'night' || p === 'evening') {
    audio.cricketT -= dt;
    if (audio.cricketT <= 0) {
      audio.cricketT = rnd(0.5, 1.6);
      for (let i = 0; i < 3; i++) {
        tone({ f: 4200 + rnd(-200, 200), t: t + i * 0.07, dur: 0.045, type: 'sine', vol: 0.022, dest: audio.amb });

const SFX = {
  pickup() { if (!AC) return; const t = AC.currentTime;

    tone({ f: 1318, t: t + 0.08, dur: 0.14, type: 'square', vol: 0.05, dest: audio.sfx }); },
  sell() { if (!AC) return; const t = AC.currentTime;
    [987, 1318, 1975].forEach((f, i) => tone({ f, t: t + i * 0.07, dur: 0.18, type: 'triangle', vol: 0.08, dest: audio.sfx })); },
  error() { if (!AC) return; tone({ f: 196, t: AC.currentTime, dur: 0.2, type: 'square', vol: 0.06, dest: audio.sfx }); },
  blip() { if (!AC) return; tone({ f: rnd(480, 760), t: AC.currentTime, dur: 0.04, type: 'square', vol: 0.025, dest: audio.sfx }); },
  dig() { if (!AC) return; noiseBurst(AC.currentTime, 0.18, 600, 0.2); },
  splash() { if (!AC) return; noiseBurst(AC.currentTime, 0.3, 1400, 0.22);
    tone({ f: 520, t: AC.currentTime, dur: 0.2, type: 'sine', vol: 0.06, dest: audio.sfx, slide: 180 }); },
  plant() { if (!AC) return; noiseBurst(AC.currentTime, 0.12, 500, 0.14);
    tone({ f: 660, t: AC.currentTime + 0.1, dur: 0.12, type: 'sine', vol: 0.05, dest: audio.sfx }); },
  build() { if (!AC) return; const t = AC.currentTime;
    for (let i = 0; i < 5; i++) noiseBurst(t + i * 0.13, 0.06, 900, 0.16);
    [659, 784, 988, 1318].forEach((f, i) => tone({ f, t: t + 0.7 + i * 0.09, dur: 0.25, type: 'triangle', vol: 0.08, dest: audio.sfx })); },
  coffee() { if (!AC) return; const t = AC.currentTime;
    tone({ f: 740, t, dur: 0.1, type: 'sine', vol: 0.06, dest: audio.sfx });

// ---------------- input / state machine ----------------
const keys = {};
let state = 'title'; // title | slots | intro | play
let fade = 0, fadeDir = 0, fadeCb = null;
function startFade(cb) { fadeDir = 1; fadeCb = cb; }

const slotsUI = { sel: 0, delArm: -1, delT: 0 };
const ui = { mode: null, sel: 0, tab: 0, sub: null }; // inv | nook | shop | museum | cafe | pause
let minimapOn = true;
const toasts = [];
function toast(text) { toasts.push({ text, t: 0 }); }

window.addEventListener('keydown', e => {
  if (document.activeElement === nameInput) {
    if (e.key === 'Enter') confirmName();
    return;
  }
  initAudio();
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Tab'].includes(e.key)) e.preventDefault();
  keys[e.code] = true;
  handlePress(e.code);
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('blur', () => { for (const k in keys) keys[k] = false; });
let dragInfo = null;
hudCv.addEventListener('pointerdown', e => {
  initAudio();
  dragInfo = { x: e.clientX, y: e.clientY, moved: false };
});
window.addEventListener('pointermove', e => {
  if (!dragInfo) return;
  if (Math.abs(e.clientX - dragInfo.x) > 4 || Math.abs(e.clientY - dragInfo.y) > 4) dragInfo.moved = true;
  if (dragInfo.moved && state === 'play') {
    camYaw -= (e.movementX || 0) * 0.006;
    camDist = clamp(camDist + (e.movementY || 0) * 0.02, 5, 16);
  }
});
window.addEventListener('pointerup', () => {
  if (dragInfo && !dragInfo.moved) {
    if (state === 'title' || state === 'slots') handlePress('Enter');
    else if (dlg.open || state === 'intro') handlePress('KeyE');
  }
  dragInfo = null;
});
window.addEventListener('wheel', e => {
  if (state === 'play') camDist = clamp(camDist + e.deltaY * 0.01, 5, 16);
}, { passive: true });

// ---------------- dialogue (typewriter) ----------------
const dlg = { open: false, lines: [], li: 0, shown: 0, speaker: '', color: '#7a5230', cb: null };
function startDialog(speaker, color, lines, cb) {
  dlg.open = true; dlg.speaker = speaker; dlg.color = color;
  dlg.lines = lines.map(l => l.split('{name}').join(player.name || '...'));
  dlg.li = 0; dlg.shown = 0; dlg.cb = cb || null;
}
function advanceDialog() {
  const line = dlg.lines[dlg.li];
  if (dlg.shown < line.length) { dlg.shown = line.length; return; }
  dlg.li++; dlg.shown = 0;
  if (dlg.li >= dlg.lines.length) {
    dlg.open = false;
    if (dlg.cb) { const cb = dlg.cb; dlg.cb = null; cb(); }
  }
}

// ---------------- intro ----------------
const intro = { active: false, idx: 0, shown: 0, waitingInput: false, script: [] };
function buildIntroScript() {
  intro.script = T('intro_lines');
  intro.idx = 0; intro.shown = 0; intro.waitingInput = false; intro.active = true;
}
function confirmName() {
  const v = nameInput.value.trim();
  if (!v) return;
  player.name = v.slice(0, 12);
  nameInput.style.display = 'none';
  nameInput.blur();
  intro.waitingInput = false;
  intro.idx++; intro.shown = 0;
  persist();
  SFX.pickup();
}
function advanceIntro() {
  const item = intro.script[intro.idx];
  if (item === undefined) return;
  if (item === '@INPUT') return;
  const text = item.split('{name}').join(player.name);
  if (intro.shown < text.length) { intro.shown = text.length; return; }
  intro.idx++; intro.shown = 0;
  const next = intro.script[intro.idx];
  if (next === undefined) {
    intro.active = false;
    startFade(() => { state = 'play'; toast(T('welcome')); persist(); });
  } else if (next === '@INPUT') {
    intro.waitingInput = true;
    nameInput.style.display = 'block';
    nameInput.value = '';
    setTimeout(() => { try { nameInput.focus(); } catch (e) {} }, 50);
  }
}

// ---------------- slot management ----------------
function enterSlot(i) {
  const data = readSlot(i);
  currentSlot = i;
  if (data && data.name) {
    prog = { seed: data.seed, createdAt: data.createdAt, built: data.built || {}, tools: data.tools || {}, donated: data.donated || {}, lastGift: data.lastGift || '', star: !!data.star };
    player.name = data.name; player.bells = data.bells ?? 100; player.inv = data.inv || {};
    genWorld(prog.seed);
    plants = (data.plants || []).map(p => ({ x: p.x, y: p.y, t0: p.t0 }));
    bootIsland();
    startFade(() => { state = 'play'; toast(T('welcome_back', { n: player.name })); });
  } else {
    prog = freshProg(Math.floor(Math.random() * 1e9));
    player.name = ''; player.bells = 150; player.inv = {}; player.coffeeUntil = 0;
    genWorld(prog.seed);
    plants = [];
    bootIsland();
    startFade(() => { state = 'intro'; buildIntroScript(); });
  }
}
function bootIsland() {
  refreshRects();
  groundItems.length = 0;
  fillSpawns(true);
  spawnNpcs();
  player.x = spawnPt.x; player.y = spawnPt.y;
  player.coffeeUntil = 0;
  cam.x = player.x; cam.y = player.y;
  ui.mode = null; dlg.open = false;
}
function slotSummary(i) {
  const d = readSlot(i);
  if (!d || !d.name) return null;
  const days = Math.floor((Date.now() - (d.createdAt || Date.now())) / 86400e3) + 1;
  const builtCount = PROJECTS.filter(p => d.built && d.built[p.key]).length;
  return { name: d.name, bells: d.bells ?? 0, days, builtCount, star: !!d.star };
}

// ---------------- key handling ----------------
function handlePress(code) {
  if (fadeDir !== 0) return;

  if (code === 'KeyL' && state !== 'intro') {
    setLang(lang === 'en' ? 'es' : 'en');
    if (state === 'play') toast(lang === 'es' ? 'Idioma: Español' : 'Language: English');
    return;
  }

  if (state === 'title') {
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') { state = 'slots'; SFX.pickup(); }
    return;
  }

  if (state === 'slots') {
    if (code === 'Escape') { state = 'title'; return; }
    if (code === 'ArrowUp') { slotsUI.sel = (slotsUI.sel + 2) % 3; slotsUI.delArm = -1; SFX.blip(); return; }
    if (code === 'ArrowDown') { slotsUI.sel = (slotsUI.sel + 1) % 3; slotsUI.delArm = -1; SFX.blip(); return; }
    if (code === 'Digit1' || code === 'Digit2' || code === 'Digit3') {
      slotsUI.sel = Number(code.slice(-1)) - 1; slotsUI.delArm = -1; SFX.blip(); return;
    }
    if (code === 'KeyX') {
      if (!readSlot(slotsUI.sel)) return;
      if (slotsUI.delArm === slotsUI.sel) {
        try { localStorage.removeItem(SLOT_KEY(slotsUI.sel)); } catch (e) {}
        slotsUI.delArm = -1; SFX.dig();
      } else { slotsUI.delArm = slotsUI.sel; slotsUI.delT = 3; SFX.error(); }
      return;
    }
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') { SFX.pickup(); enterSlot(slotsUI.sel); }
    return;
  }

  if (state === 'intro') {
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') advanceIntro();
    return;
  }

  // ---- play ----
  if (code === 'KeyM') {
    audio.muted = !audio.muted;
    if (audio.master) audio.master.gain.value = audio.muted ? 0 : 0.6;
    toast(audio.muted ? T('sound_off') : T('sound_on'));
    return;
  }
  if (dlg.open) {
    if (code === 'KeyE' || code === 'Enter' || code === 'Space') advanceDialog();
    return;
  }
  if (ui.mode) { uiKey(code); return; }

  if (code === 'KeyI') { openUI('inv'); return; }
  if (code === 'Escape') { openUI('pause'); return; }
  if (code === 'Tab') { minimapOn = !minimapOn; SFX.blip(); return; }
  if (code === 'KeyE' || code === 'Enter') doInteract();
  if (code === 'KeyP') doPlant();
}
function openUI(mode) {
  ui.mode = mode; ui.sel = 0; ui.tab = 0; ui.sub = null;
  SFX.blip();
}
function closeUI() { ui.mode = null; SFX.blip(); persist(); }

// ---------------- interactions ----------------
function nearestInteract() {
  for (const n of npcs) if (dist(player.x, player.y, n.x, n.y) < 26) return { kind: 'npc', obj: n };
  // Nook stands by the tent
  if (dist(player.x, player.y, plots.tent.x + 28, plots.tent.y + 8) < 30) return { kind: 'nook' };
  for (const b of activeBuildings()) {
    if (b.key === 'tent') continue;
    if (dist(player.x, player.y, b.x, b.y + 10) < 32) {
      if (b.key === 'shop') return { kind: 'shop' };
      if (b.key === 'museum') return { kind: 'museum' };
      if (b.key === 'cafe') return { kind: 'cafe' };
      if (b.key === 'house') return { kind: 'house' };
    }
  }
  let best = null, bd = 1e9;
  for (const it of groundItems) {
    const d = dist(player.x, player.y, it.x, it.y);
    const reach = it.type === 'fish' ? 36 : 22;
    if ((it.type === 'fish' || it.type === 'fossil') && d < reach && d < bd) { best = { kind: it.type, obj: it }; bd = d; }
  }
  if (best) return best;
  for (const p of plants) {
    if (plantStage(p) === 3 && dist(player.x, player.y, p.x, p.y) < 20) return { kind: 'harvest', obj: p };
  }
  return null;
}
function doInteract() {
  const tgt = nearestInteract();
  if (!tgt) return;
  if (tgt.kind === 'npc') {
    const n = tgt.obj;
    n.state = 'idle'; n.t = rnd(3, 5);
    n.facing = player.x < n.x ? 'left' : 'right';
    const sets = n.def.lines[lang] || n.def.lines.en;
    startDialog(n.def.name, n.def.shirt, pick(sets[dayPeriod()]));
  } else if (tgt.kind === 'nook') {
    openUI('nook');
  } else if (tgt.kind === 'shop') {
    openUI('shop');
  } else if (tgt.kind === 'museum') {
    openUI('museum');
  } else if (tgt.kind === 'cafe') {
    openUI('cafe');
  } else if (tgt.kind === 'house') {
    const today = new Date().toISOString().slice(0, 10);
    if (prog.lastGift !== today) {
      prog.lastGift = today;
      player.bells += GIFT_BELLS;
      toast(T('gift', { b: GIFT_BELLS }));
      SFX.sell();
    } else {
      toast(T('rested'));
      SFX.blip();
    }
    persist();
  } else if (tgt.kind === 'fish') {
    if (!prog.tools.rod) { toast(T('need_rod')); SFX.error(); return; }
    groundItems.splice(groundItems.indexOf(tgt.obj), 1);
    addItem('fish'); SFX.splash(); toast(T('caught')); persist();
  } else if (tgt.kind === 'fossil') {
    if (!prog.tools.shovel) { toast(T('need_shovel')); SFX.error(); return; }
    groundItems.splice(groundItems.indexOf(tgt.obj), 1);
    addItem('fossil'); SFX.dig(); toast(T('dug')); persist();
  } else if (tgt.kind === 'harvest') {
    plants.splice(plants.indexOf(tgt.obj), 1);
    addItem('flower'); SFX.pickup(); toast(T('harvest')); persist();
  }
}
function doPlant() {
  if (!(player.inv.seeds > 0)) { toast(T('no_seeds')); SFX.error(); return; }
  const px = player.x, py = player.y + 6;
  if (tileAt(px, py) !== T_GRASS || insideBuilding(px, py)) { toast(T('need_grass')); SFX.error(); return; }
  if (plants.some(p => dist(p.x, p.y, px, py) < 18) || trees.some(t => dist(t.x, t.y, px, py) < 22)) {
    toast(T('crowded')); SFX.error(); return;
  }
  player.inv.seeds--;
  plants.push({ x: px, y: py, t0: Date.now() });
  SFX.plant(); toast(T('planted')); persist();
}

// ---------------- menus logic ----------------
function sellFactor() { return ui.mode === 'shop' ? 1 : 0.8; }
function sellRows() { return INV_ORDER.filter(t => (player.inv[t] || 0) > 0); }
function buyRows() {
  if (ui.mode === 'shop') return ['seeds'];
  const r = ['seeds'];
  if (!prog.tools.rod) r.unshift('rod');
  if (!prog.tools.shovel) r.splice(prog.tools.rod ? 0 : 1, 0, 'shovel');
  return r;
}
function doSell(type, all) {
  const n = all ? (player.inv[type] || 0) : 1;
  if (n <= 0) { SFX.error(); return; }
  const price = Math.round(ITEMS[type].sell * sellFactor());
  player.inv[type] -= n;
  player.bells += price * n;
  SFX.sell();
  toast(T('sold', { b: price * n, n, i: T('i_' + type) }));
  persist();
}
function doBuy(type) {
  const cost = ITEMS[type].buy;
  if ((type === 'rod' && prog.tools.rod) || (type === 'shovel' && prog.tools.shovel)) { toast(T('own')); SFX.error(); return; }
  if (player.bells < cost) { toast(T('no_bells')); SFX.error(); return; }
  player.bells -= cost;
  if (type === 'rod' || type === 'shovel') prog.tools[type] = true;
  else addItem(type);
  SFX.sell(); toast(T('bought', { i: T('i_' + type) })); persist();
}
function doBuild(idx) {
  const p = PROJECTS[idx];
  if (prog.built[p.key]) { toast(T('already_built')); SFX.error(); return; }
  if (idx > 0 && !prog.built[PROJECTS[idx - 1].key]) {
    toast(T('locked_prev', { b: T('b_' + PROJECTS[idx - 1].key) })); SFX.error(); return;
  }
  if (player.bells < p.cost) { toast(T('no_bells')); SFX.error(); return; }
  player.bells -= p.cost;
  prog.built[p.key] = true;
  refreshRects();
  const plot = plots[p.key];
  const dx = plot.x - player.x, dy = plot.y - player.y;
  const dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? T('east') : T('west')) : (dy > 0 ? T('south') : T('north'));
  toast(T('built_done', { b: T('b_' + p.key), d: dir }));
  SFX.build();
  const def = NPC_DEFS.find(d => d.homeKey === p.key);
  if (def) { addNpc(def); toast(T('new_neighbor', { n: def.name })); }
  persist();
}
function doDonate(type) {
  if (prog.donated[type]) { toast(T('donate_has')); SFX.error(); return; }
  if (!(player.inv[type] > 0)) { toast(T('donate_none')); SFX.error(); return; }
  player.inv[type]--;
  prog.donated[type] = true;
  player.bells += DONATE_GRANT;
  toast(T('donate_done', { b: DONATE_GRANT }));
  SFX.sell();
  if (DONATABLE.every(t => prog.donated[t]) && !prog.star) {
    prog.star = true;
    player.bells += COMPLETE_BONUS;
    toast(T('museum_complete', { b: COMPLETE_BONUS }));
    SFX.build();
  }
  persist();
}

function uiKey(code) {
  if (code === 'Escape') {
    if (ui.mode === 'nook' && ui.sub) { ui.sub = null; ui.sel = 0; SFX.blip(); return; }
    closeUI(); return;
  }
  if (ui.mode === 'inv') {
    if (code === 'KeyI' || code === 'KeyE') closeUI();
    return;
  }
  if (ui.mode === 'pause') {
    const n = 3;
    if (code === 'ArrowUp') { ui.sel = (ui.sel + n - 1) % n; SFX.blip(); return; }
    if (code === 'ArrowDown') { ui.sel = (ui.sel + 1) % n; SFX.blip(); return; }
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') {
      if (ui.sel === 0) closeUI();
      else if (ui.sel === 1) { setLang(lang === 'en' ? 'es' : 'en'); SFX.blip(); }
      else { persist(); ui.mode = null; startFade(() => { state = 'slots'; slotsUI.delArm = -1; }); }
    }
    return;
  }
  if (ui.mode === 'cafe') {
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') {
      if (player.bells < ITEMS.coffee.buy) { toast(T('no_bells')); SFX.error(); return; }
      player.bells -= ITEMS.coffee.buy;
      player.coffeeUntil = Date.now() + COFFEE_DUR * 1000;
      SFX.coffee(); toast(T('coffee_on')); persist();
      closeUI();
    }
    return;
  }
  if (ui.mode === 'museum') {
    const rows = DONATABLE;
    if (code === 'ArrowUp') { ui.sel = (ui.sel + rows.length - 1) % rows.length; SFX.blip(); return; }
    if (code === 'ArrowDown') { ui.sel = (ui.sel + 1) % rows.length; SFX.blip(); return; }
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') doDonate(rows[ui.sel]);
    return;
  }
  if (ui.mode === 'nook' && ui.sub === 'build') { uiKeyBuild(code); return; }
  if (ui.mode === 'shop' || (ui.mode === 'nook' && (ui.sub === 'sell' || ui.sub === 'buy'))) {
    const selling = ui.mode === 'shop' ? ui.tab === 0 : ui.sub === 'sell';
    const rows = selling ? sellRows() : buyRows();
    if (ui.mode === 'shop' && (code === 'ArrowLeft' || code === 'ArrowRight' || code === 'Tab')) {
      ui.tab = 1 - ui.tab; ui.sel = 0; SFX.blip(); return;
    }
    if (code === 'ArrowUp') { ui.sel = Math.max(0, ui.sel - 1); SFX.blip(); return; }
    if (code === 'ArrowDown') { ui.sel = Math.min(Math.max(0, rows.length - 1), ui.sel + 1); SFX.blip(); return; }
    if (code === 'Enter' || code === 'Space' || code === 'KeyA') {
      const type = rows[ui.sel];
      if (!type) { SFX.error(); return; }
      if (selling) {
        doSell(type, code === 'KeyA');
        ui.sel = Math.min(ui.sel, Math.max(0, sellRows().length - 1));
      } else doBuy(type);
    }
    return;
  }
  if (ui.mode === 'nook') { // root menu
    const rows = ['sell', 'buy', 'build', 'chat', 'leave'];
    if (code === 'ArrowUp') { ui.sel = (ui.sel + rows.length - 1) % rows.length; SFX.blip(); return; }
    if (code === 'ArrowDown') { ui.sel = (ui.sel + 1) % rows.length; SFX.blip(); return; }
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') {
      const r = rows[ui.sel];
      if (r === 'leave') { closeUI(); return; }
      if (r === 'chat') {
        ui.mode = null;
        startDialog('Tom Nook', '#3f7a4c', [pick(T('nook_chat'))], () => { openUI('nook'); });
        return;
      }
      if (r === 'build') { ui.sub = 'build'; ui.sel = 0; SFX.blip(); return; }
      ui.sub = r; ui.sel = 0; SFX.blip();
    }
    return;
  }
}
// nook build submenu handled here (separate because rows differ)
function uiKeyBuild(code) {
  const rows = PROJECTS;
  if (code === 'ArrowUp') { ui.sel = (ui.sel + rows.length - 1) % rows.length; SFX.blip(); return; }
  if (code === 'ArrowDown') { ui.sel = (ui.sel + 1) % rows.length; SFX.blip(); return; }
  if (code === 'Enter' || code === 'Space' || code === 'KeyE') doBuild(ui.sel);
}

// ---------------- objective ----------------
function currentObjective() {
  if (!prog) return null;
  if (!prog.tools.rod) return T('obj_rod', { c: ITEMS.rod.buy });
  if (!prog.built.house) return T('obj_house', { c: PROJECTS[0].cost });
  if (!prog.tools.shovel) return T('obj_shovel', { c: ITEMS.shovel.buy });
  if (!prog.built.shop) return T('obj_shop', { c: PROJECTS[1].cost });
  if (!prog.built.museum) return T('obj_museum', { c: PROJECTS[2].cost });
  if (!prog.built.cafe) return T('obj_cafe', { c: PROJECTS[3].cost });
  if (!prog.built.home1) return T('obj_home1', { c: PROJECTS[4].cost });
  if (!prog.built.home2) return T('obj_home2', { c: PROJECTS[5].cost });
  if (!prog.star) return T('obj_donate');
  return T('obj_done');
}

// ---------------- clouds & particles ----------------
const clouds = [];
for (let i = 0; i < 8; i++) clouds.push({ x: rnd(2400), y: rnd(0.12, 0.85), s: rnd(0.5, 1.2), v: rnd(3, 8) });
const particles = [];
function spawnParticle(w, h) {
  if (SEASON === 'winter') particles.push({ x: rnd(w), y: -10, vx: rnd(-8, 8), vy: rnd(18, 40), ph: rnd(TAU), kind: 'snow', life: 30 });
  else if (SEASON === 'autumn') particles.push({ x: rnd(w), y: -10, vx: rnd(-15, 5), vy: rnd(22, 42), ph: rnd(TAU), kind: 'leaf', life: 30, c: pick(['#d8842f', '#c4622d', '#e0a83a']) });
  else if (SEASON === 'spring') particles.push({ x: rnd(w), y: -10, vx: rnd(-12, 12), vy: rnd(14, 30), ph: rnd(TAU), kind: 'petal', life: 30 });
  else particles.push({ x: rnd(w), y: rnd(h), vx: rnd(-6, 6), vy: rnd(-4, 4), ph: rnd(TAU), kind: 'spark', life: rnd(3, 6) });
}

// ---------------- update ----------------
let lastT = performance.now();
let persistT = 0;

function update(dt) {
  musicTick();
  ambientTick(dt);

  if (fadeDir === 1) {
    fade = Math.min(1, fade + dt * 2.2);
    if (fade >= 1) { fadeDir = -1; if (fadeCb) { const cb = fadeCb; fadeCb = null; cb(); } }
  } else if (fadeDir === -1) {
    fade = Math.max(0, fade - dt * 1.5);
    if (fade <= 0) fadeDir = 0;
  }

  const targetN = SEASON === 'summer' ? 14 : 36;
  if (particles.length < targetN && Math.random() < 0.3) spawnParticle(view.w, view.h);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.ph += dt * 2;
    p.x += (p.vx + Math.sin(p.ph) * 12) * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.y > view.h + 12 || p.life <= 0) particles.splice(i, 1);
  }
  clouds.forEach(c => { c.x += c.v * dt; });
  if (slotsUI.delArm >= 0) { slotsUI.delT -= dt; if (slotsUI.delT <= 0) slotsUI.delArm = -1; }

  if (state === 'intro' && !intro.waitingInput) {
    const item = intro.script[intro.idx];
    if (item && item !== '@INPUT') {
      const len = item.length, prev = intro.shown;
      intro.shown = Math.min(len, intro.shown + dt * 32);
      if (Math.floor(intro.shown / 2) !== Math.floor(prev / 2) && intro.shown < len) SFX.blip();
    }
  }
  if (state !== 'play') return;

  // movement (relative to camera yaw)
  const locked = dlg.open || ui.mode;
  let fwd = 0, side = 0;
  if (!locked) {
    if (keys.KeyW || keys.ArrowUp) fwd += 1;
    if (keys.KeyS || keys.ArrowDown) fwd -= 1;
    if (keys.KeyD || keys.ArrowRight) side += 1;
    if (keys.KeyA || keys.ArrowLeft) side -= 1;
  }
  player.moving = fwd !== 0 || side !== 0;
  if (player.moving) {
    const fX = -Math.sin(camYaw), fY = -Math.cos(camYaw);
    let wx2 = fX * fwd - fY * side, wy2 = fY * fwd + fX * side;
    const len = Math.hypot(wx2, wy2) || 1;
    const coffee = Date.now() < player.coffeeUntil ? 1.35 : 1;
    const sp = (keys.ShiftLeft || keys.ShiftRight ? 150 : 105) * coffee * dt;
    tryMove(player, wx2 / len * sp, wy2 / len * sp);
    player.vyaw = Math.atan2(wx2, wy2);
    player.step += dt * 11;
  }

  // auto-pickup
  for (let i = groundItems.length - 1; i >= 0; i--) {
    const it = groundItems[i];
    if ((it.type === 'shell' || it.type === 'fruit') && dist(player.x, player.y, it.x, it.y) < 13) {
      groundItems.splice(i, 1);
      addItem(it.type); SFX.pickup();
      toast(T('got', { i: T('i_' + it.type) }));
    }
  }
  spawnTimer -= dt;
  if (spawnTimer <= 0) { spawnTimer = 5; fillSpawns(false); }

  for (const it of groundItems) {
    if (it.type !== 'fish') continue;
    it.ph += dt;
    const nx = it.x + Math.cos(it.ph * 0.6) * 6 * dt, ny = it.y + Math.sin(it.ph * 0.4) * 6 * dt;
    if (tileAt(nx, ny) === T_WATER) { it.x = nx; it.y = ny; }
  }

  for (const n of npcs) {
    n.t -= dt;
    if (n.state === 'idle') {
      if (n.t <= 0) {
        for (let k = 0; k < 12; k++) {
          const a = rnd(TAU), d = rnd(24, 70);
          const tx = n.x + Math.cos(a) * d, ty = n.y + Math.sin(a) * d;
          if (tileAt(tx, ty) === T_GRASS && !insideBuilding(tx, ty)) { n.tx = tx; n.ty = ty; n.state = 'walk'; break; }
        }
        n.t = rnd(2, 5);
      }
    } else {
      const dx = n.tx - n.x, dy = n.ty - n.y, d = Math.hypot(dx, dy);
      if (d < 3 || n.t < -6) { n.state = 'idle'; n.t = rnd(1.5, 4.5); }
      else {
        const sp = 26 * dt;
        tryMove(n, dx / d * sp, dy / d * sp);
        n.facing = Math.abs(dx) > Math.abs(dy) ? (dx < 0 ? 'left' : 'right') : (dy < 0 ? 'up' : 'down');
        n.step += dt * 8;
      }
    }
  }

  if (dlg.open) {
    const line = dlg.lines[dlg.li], prev = dlg.shown;
    dlg.shown = Math.min(line.length, dlg.shown + dt * 34);
    if (Math.floor(dlg.shown / 2) !== Math.floor(prev / 2) && dlg.shown < line.length) SFX.blip();
  }
  for (let i = toasts.length - 1; i >= 0; i--) {
    toasts[i].t += dt;
    if (toasts[i].t > 2.8) toasts.splice(i, 1);
  }

  // camera follow with lag
  const k = 1 - Math.pow(0.002, dt);
  cam.x = lerp(cam.x, player.x, k);
  cam.y = lerp(cam.y, player.y, k);

  persistT += dt;
  if (persistT > 12) { persistT = 0; persist(); }
}

function tryMove(ent, dx, dy) {
  const passable = (x, y) =>
    isLand(x, y) && !insideBuilding(x, y) &&
    trees.every(t => dist(x, y, t.x, t.y) > 9) &&
    rocks.every(r => dist(x, y, r.x, r.y) > 10);
  if (passable(ent.x + dx, ent.y)) ent.x += dx;
  if (passable(ent.x, ent.y + dy)) ent.y += dy;
  ent.x = clamp(ent.x, 8, WORLD_W - 8);
  ent.y = clamp(ent.y, 8, WORLD_H - 8);
}

let vignetteCv = null;
function makeVignette() {
  vignetteCv = document.createElement('canvas');
  vignetteCv.width = Math.max(2, Math.floor(view.w / 2));
  vignetteCv.height = Math.max(2, Math.floor(view.h / 2));
  const g = vignetteCv.getContext('2d');
  const grad = g.createRadialGradient(
    vignetteCv.width / 2, vignetteCv.height / 2, Math.min(vignetteCv.width, vignetteCv.height) * 0.42,
    vignetteCv.width / 2, vignetteCv.height / 2, Math.max(vignetteCv.width, vignetteCv.height) * 0.72);
  grad.addColorStop(0, 'rgba(20,15,40,0)');
  grad.addColorStop(1, 'rgba(20,15,40,0.38)');
  g.fillStyle = grad;
  g.fillRect(0, 0, vignetteCv.width, vignetteCv.height);
}

// ----- icons -----
function drawIcon(type, x, y, s) {
  ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
  if (type === 'shell') {
    ctx.fillStyle = '#f1b8c4';
    ctx.beginPath(); ctx.moveTo(0, 4); ctx.arc(0, 0, 5, Math.PI * 0.15, Math.PI * 0.85, true); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#d98da0'; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, 4); ctx.lineTo(-3, -3); ctx.moveTo(0, 4); ctx.lineTo(0, -4.6); ctx.moveTo(0, 4); ctx.lineTo(3, -3);
    ctx.stroke();
  } else if (type === 'fruit') {
    ctx.fillStyle = '#ffab66';
    ctx.beginPath(); ctx.arc(0, 0.5, 4.6, 0, TAU); ctx.fill();
    ctx.fillStyle = '#ff8a4d';
    ctx.beginPath(); ctx.arc(1.4, 1.4, 3, 0, TAU); ctx.fill();
    ctx.fillStyle = '#4d8f3c';
    ctx.beginPath(); ctx.ellipse(1.4, -4.4, 2.4, 1.2, 0.6, 0, TAU); ctx.fill();
  } else if (type === 'fish') {
    ctx.fillStyle = '#6db3d8';
    ctx.beginPath(); ctx.ellipse(-0.5, 0, 4.6, 2.8, 0, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3.4, 0); ctx.lineTo(6.4, -2.6); ctx.lineTo(6.4, 2.6); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#173b4f';
    ctx.beginPath(); ctx.arc(-2.6, -0.6, 0.8, 0, TAU); ctx.fill();
  } else if (type === 'fossil') {
    ctx.strokeStyle = '#9a7d5a'; ctx.lineWidth = 1.6;
    ctx.beginPath();
    for (let a = 0; a < TAU * 2.1; a += 0.3) {
      const r = 0.9 + a * 0.75;
      const px = Math.cos(a) * r, py = Math.sin(a) * r;
      a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
  } else if (type === 'flower') {
    ctx.fillStyle = '#ff6f87';
    for (let i = 0; i < 5; i++) {
      const a = i / 5 * TAU;
      ctx.beginPath(); ctx.arc(Math.cos(a) * 3, Math.sin(a) * 3, 2.4, 0, TAU); ctx.fill();
    }
    ctx.fillStyle = '#ffe27a';
    ctx.beginPath(); ctx.arc(0, 0, 2, 0, TAU); ctx.fill();
  } else if (type === 'seeds') {
    ctx.fillStyle = '#d8b27a';
    roundRect(ctx, -4, -3, 8, 8, 2); ctx.fill();
    ctx.fillStyle = '#b58e58';
    ctx.fillRect(-4, -3, 8, 2.4);
    ctx.fillStyle = '#6b4f2f';
    ctx.beginPath(); ctx.arc(-1.4, 1.6, 0.9, 0, TAU); ctx.arc(1.6, 2.6, 0.9, 0, TAU); ctx.arc(0.6, 0, 0.9, 0, TAU); ctx.fill();
  } else if (type === 'rod') {
    ctx.strokeStyle = '#8a6644'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(-4.5, 4.5); ctx.lineTo(4, -4); ctx.stroke();
    ctx.strokeStyle = '#9db4c0'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(4, -4); ctx.quadraticCurveTo(5.5, 0, 3.5, 2.5); ctx.stroke();
    ctx.fillStyle = '#e2574c';
    ctx.beginPath(); ctx.arc(3.5, 3, 1.4, 0, TAU); ctx.fill();
  } else if (type === 'shovel') {
    ctx.strokeStyle = '#8a6644'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(0, 1.5); ctx.stroke();
    ctx.strokeStyle = '#8a6644'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(-2, -5); ctx.lineTo(2, -5); ctx.stroke();
    ctx.fillStyle = '#9aa3ad';
    ctx.beginPath(); ctx.moveTo(-2.6, 1.5); ctx.lineTo(2.6, 1.5); ctx.lineTo(1.8, 5.5); ctx.lineTo(-1.8, 5.5); ctx.closePath(); ctx.fill();
  } else if (type === 'coffee') {
    ctx.fillStyle = '#fff';
    roundRect(ctx, -3.5, -2, 7, 6, 2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(4, 0.5, 1.8, -1, 1.6); ctx.stroke();
    ctx.fillStyle = '#6b4a2a';
    ctx.beginPath(); ctx.ellipse(0, -1.6, 3, 1, 0, 0, TAU); ctx.fill();
    ctx.strokeStyle = 'rgba(160,160,160,0.9)'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(-1, -3.5); ctx.quadraticCurveTo(-2, -5, -1, -6.5); ctx.moveTo(1.4, -3.5); ctx.quadraticCurveTo(0.4, -5, 1.4, -6.5); ctx.stroke();
  } else if (type === 'bell') {
    ctx.fillStyle = '#ffd95e';
    ctx.beginPath(); ctx.arc(0, 0, 4.6, 0, TAU); ctx.fill();
    ctx.strokeStyle = '#c79a2a'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, 4.6, 0, TAU); ctx.stroke();
    ctx.fillStyle = '#c79a2a';
    ctx.font = '800 6px Nunito, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('★', 0, 2.2);
  }
  ctx.restore();
}

function renderParticles() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  for (const p of particles) {
    if (p.kind === 'snow') {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.6 + Math.sin(p.ph) * 0.5, 0, TAU); ctx.fill();
    } else if (p.kind === 'leaf') {
      ctx.fillStyle = p.c;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.sin(p.ph) * 1.2);
      ctx.beginPath(); ctx.ellipse(0, 0, 3.4, 1.8, 0, 0, TAU); ctx.fill();
      ctx.restore();
    } else if (p.kind === 'petal') {
      ctx.fillStyle = 'rgba(255,190,210,0.9)';
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.sin(p.ph) * 0.9);
      ctx.beginPath(); ctx.ellipse(0, 0, 2.6, 1.5, 0, 0, TAU); ctx.fill();
      ctx.restore();
    } else {
      const a = 0.25 + 0.25 * Math.sin(p.ph * 2);
      ctx.fillStyle = dayPeriod() === 'night' ? `rgba(255,250,170,${a})` : `rgba(255,255,255,${a * 0.7})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.3, 0, TAU); ctx.fill();
    }
  }
}
function renderLightAndVignette() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  let [r, g, b, a] = lightTint();
  if (state === 'play') a *= 0.25;
  if (a > 0.004) {
    ctx.fillStyle = `rgba(${r | 0},${g | 0},${b | 0},${a})`;
    ctx.fillRect(0, 0, view.w, view.h);
  }
  if (vignetteCv) ctx.drawImage(vignetteCv, 0, 0, view.w, view.h);
}

// ----- UI helpers -----
function panel(x, y, w, h, alpha = 0.93) {
  ctx.save();
  ctx.shadowColor = 'rgba(60,40,10,0.25)';
  ctx.shadowBlur = 8; ctx.shadowOffsetY = 3;
  ctx.fillStyle = `rgba(255,250,231,${alpha})`;
  roundRect(ctx, x, y, w, h, 14); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = 'rgba(185,141,82,0.8)'; ctx.lineWidth = 2;
  roundRect(ctx, x, y, w, h, 14); ctx.stroke();
}
function fmtTime(d = new Date()) {
  let h = d.getHours();
  const ap = h < 12 ? 'AM' : 'PM';
  h = (h + 11) % 12 + 1;
  return `${h}:${String(d.getMinutes()).padStart(2, '0')} ${ap}`;
}
const DAYS_EN = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const DAYS_ES = ['dom', 'lun', 'mar', 'mié', 'jue', 'vie', 'sáb'];
const MON_EN = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const MON_ES = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
function fmtDate(d = new Date()) {
  return lang === 'es'
    ? `${DAYS_ES[d.getDay()]}, ${d.getDate()} ${MON_ES[d.getMonth()]}`
    : `${DAYS_EN[d.getDay()]}, ${MON_EN[d.getMonth()]} ${d.getDate()}`;
}
function wrapText(text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line = '', yy = y;
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, yy); line = word; yy += lh;
    } else line = test;
  }
  ctx.fillText(line, x, yy);
}

function renderHUD() {

  ctx.textAlign = 'center';
  toasts.forEach((tt, i) => {
    const a = tt.t < 0.2 ? tt.t / 0.2 : tt.t > 2.3 ? Math.max(0, 1 - (tt.t - 2.3) / 0.5) : 1;
    const y = 56 + i * 34 - (tt.t < 0.2 ? (0.2 - tt.t) * 30 : 0);
    ctx.font = '800 14px Nunito, sans-serif';
    const w = ctx.measureText(tt.text).width + 34;
    ctx.globalAlpha = a;
    panel(view.w / 2 - w / 2, y, w, 28, 0.92);

  if (ui.mode === 'inv') renderInventory();
  if (ui.mode === 'nook') renderNookMenu();
  if (ui.mode === 'shop') renderShopMenu();
  if (ui.mode === 'museum') renderMuseumMenu();
  if (ui.mode === 'cafe') renderCafeMenu();
  if (ui.mode === 'pause') renderPauseMenu();

function renderBeachScene() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  const [top, bottom] = skyColors();
  const g = ctx.createLinearGradient(0, 0, 0, view.h);
  g.addColorStop(0, top); g.addColorStop(0.62, bottom);
  g.addColorStop(0.62, '#3f9bd0'); g.addColorStop(1, '#2f7cb0');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, view.w, view.h);
  const t = gameTime();
  const h = nowHour();
  const isDay = h >= 6 && h < 19;
  const progT = isDay ? (h - 6) / 13 : ((h >= 19 ? h - 19 : h + 5) / 11);
  const ax = lerp(view.w * 0.12, view.w * 0.88, progT);
  const ay = view.h * 0.5 - Math.sin(progT * Math.PI) * view.h * 0.34;
  if (isDay) {
    ctx.fillStyle = '#fff3b8';
    ctx.beginPath(); ctx.arc(ax, ay, 34, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(255,243,184,0.25)';
    ctx.beginPath(); ctx.arc(ax, ay, 52, 0, TAU); ctx.fill();
  } else {
    ctx.fillStyle = '#f2f4e9';
    ctx.beginPath(); ctx.arc(ax, ay, 26, 0, TAU); ctx.fill();
    ctx.fillStyle = top;
    ctx.beginPath(); ctx.arc(ax - 10, ay - 6, 22, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for (let i = 0; i < 40; i++) {
      const sx = hash2(i, 7) * view.w, sy = hash2(i, 13) * view.h * 0.55;
      ctx.globalAlpha = 0.3 + (Math.sin(t * 2 + i) * 0.5 + 0.5) * 0.5;
      ctx.fillRect(sx, sy, 2, 2);
    }
    ctx.globalAlpha = 1;
  }
  for (const c of clouds) {
    const sx = ((c.x * 3) % (view.w + 480)) - 240;
    const sy = c.y * view.h * 0.5;
    ctx.fillStyle = dayPeriod() === 'night' ? 'rgba(190,200,235,0.10)' : 'rgba(255,255,255,0.34)';
    ctx.beginPath();
    ctx.ellipse(sx, sy, 56 * c.s, 16 * c.s, 0, 0, TAU);
    ctx.ellipse(sx + 34 * c.s, sy + 6 * c.s, 38 * c.s, 13 * c.s, 0, 0, TAU);
    ctx.ellipse(sx - 36 * c.s, sy + 7 * c.s, 34 * c.s, 12 * c.s, 0, 0, TAU);
    ctx.fill();
  }
  for (let i = 0; i < 3; i++) {
    const wy = view.h * 0.62 + 18 + i * 26 + Math.sin(t * 1.1 + i * 2) * 4;
    ctx.strokeStyle = `rgba(255,255,255,${0.22 - i * 0.05})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let xx = -20; xx <= view.w + 20; xx += 30) {
      const yy = wy + Math.sin(xx * 0.02 + t * 1.6 + i) * 5;
      xx === -20 ? ctx.moveTo(xx, yy) : ctx.lineTo(xx, yy);
    }
    ctx.stroke();
  }
  ctx.fillStyle = SEASON === 'winter' ? '#ded7c4' : '#ecd9a2';
  ctx.beginPath();
  ctx.moveTo(0, view.h);
  ctx.quadraticCurveTo(view.w * 0.5, view.h * 0.78, view.w, view.h);
  ctx.closePath(); ctx.fill();
}

const groundY = (wx, wy) => tileAt(wx, wy) === T_SAND ? -0.06 : 0;
const lam = c => new THREE.MeshLambertMaterial({ color: c });

function makeNoiseTexture(base, spots, n, sz) {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const g = c.getContext('2d');
  g.fillStyle = base; g.fillRect(0, 0, 64, 64);
  for (let i = 0; i < n; i++) {
    g.fillStyle = spots[i % spots.length];
    g.fillRect(Math.floor(Math.random() * 64), Math.floor(Math.random() * 64), sz, sz);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.magFilter = THREE.NearestFilter;
  return tex;
}

function initThree() {
  try {
    renderer = new THREE.WebGLRenderer({ canvas: glCv, antialias: true });
  } catch (e) { renderer = null; return; }
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(view.w, view.h, false);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.18;
  scene = new THREE.Scene();
  sceneBgColor = new THREE.Color('#69b7e8');
  scene.background = sceneBgColor;
  scene.fog = new THREE.Fog('#bfe6f7', 30, 95);
  cam3 = new THREE.PerspectiveCamera(50, view.w / Math.max(1, view.h), 0.1, 300);
  hemiLight = new THREE.HemisphereLight(0xbfd8ff, 0x7a9a62, 0.6);
  scene.add(hemiLight);
  scene.add(new THREE.AmbientLight(0xffffff, 0.16));
  sunLight = new THREE.DirectionalLight(0xffffff, 1.1);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.set(2048, 2048);
  Object.assign(sunLight.shadow.camera, { left: -20, right: 20, top: 20, bottom: -20, near: 1, far: 160 });
  scene.add(sunLight, sunLight.target);
  lampLight = new THREE.PointLight('#ffe9a3', 0, 13);
  scene.add(lampLight);
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), lam('#41769c'));
  floor.rotation.x = -Math.PI / 2;
  floor.position.set(MW / 2, -1.02, MH / 2);
  scene.add(floor);
  tileTex = makeNoiseTexture('#ffffff', ['#e6e6e6', '#dadada', '#f3f3f3'], 110, 2);
  waterTex = makeNoiseTexture('#ffffff', ['#e2f0f8', '#d2e6f2', '#f6fbff'], 70, 3);
  waterTex.repeat.set(80, 80);
  waterMat = new THREE.MeshPhongMaterial({ color: '#3f9bd0', map: waterTex, transparent: true, opacity: 0.82, shininess: 120, specular: 0x99ddff });
  const water = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), waterMat);
  water.rotation.x = -Math.PI / 2;
  water.position.set(MW / 2, -0.33, MH / 2);
  scene.add(water);
  const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
  for (let i = 0; i < 10; i++) {
    const g = new THREE.Group();
    for (let j = 0; j < 3; j++) {
      const b = new THREE.Mesh(new THREE.BoxGeometry(2.2 + rnd(2.6), 0.7, 1.5 + rnd(1.6)), cloudMat);
      b.position.set((j - 1) * 1.8 + rnd(-0.5, 0.5), rnd(-0.2, 0.2), rnd(-0.8, 0.8));
      g.add(b);
    }
    g.position.set(rnd(MW), 13 + rnd(7), rnd(MH));
    scene.add(g);
    clouds3.push({ g, v: rnd(0.25, 0.8) });
  }
  const starPos = [];
  for (let i = 0; i < 350; i++) {
    const a = Math.random() * TAU, r2 = 60 + Math.random() * 130;
    starPos.push(MW / 2 + Math.cos(a) * r2, 22 + Math.random() * 95, MH / 2 + Math.sin(a) * r2);
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
  starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0, fog: false });
  stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);
  moon = new THREE.Mesh(new THREE.SphereGeometry(1.5, 12, 12),
    new THREE.MeshBasicMaterial({ color: '#f4f6ec', fog: false }));
  moon.position.set(MW / 2 - 35, 38, MH / 2 - 30);
  moon.visible = false;
  scene.add(moon);
}

function makeTextTexture(text) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 64;
  const g = c.getContext('2d');
  g.clearRect(0, 0, 256, 64);
  g.fillStyle = '#fff6dd';
  roundRect(g, 6, 8, 244, 48, 18);
  g.fill();
  g.strokeStyle = '#b98d52'; g.lineWidth = 4;
  roundRect(g, 6, 8, 244, 48, 18);
  g.stroke();
  g.fillStyle = '#7a5230';
  g.font = "900 26px Nunito, sans-serif";
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText(text, 128, 33);
  const tex = new THREE.CanvasTexture(c);
  return tex;
}

function makeFaceTexture(kind, base) {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const g = c.getContext('2d');
  g.fillStyle = base; g.fillRect(0, 0, 64, 64);
  const eye = (x, y, w2 = 7, h2 = 11) => { g.fillStyle = '#2b2018'; g.fillRect(x, y, w2, h2); };
  if (kind === 'nook') {
    g.fillStyle = '#54402c';
    g.beginPath(); g.ellipse(20, 24, 11, 8, -0.2, 0, TAU); g.ellipse(44, 24, 11, 8, 0.2, 0, TAU); g.fill();
    g.fillStyle = '#fff';
    g.beginPath(); g.arc(20, 24, 4, 0, TAU); g.arc(44, 24, 4, 0, TAU); g.fill();
    g.fillStyle = '#1d160f';
    g.beginPath(); g.arc(21, 24, 2, 0, TAU); g.arc(45, 24, 2, 0, TAU); g.fill();
    g.fillStyle = '#e8d6b8';
    g.beginPath(); g.ellipse(32, 46, 13, 11, 0, 0, TAU); g.fill();
    g.fillStyle = '#3a2c1d';
    g.beginPath(); g.ellipse(32, 41, 4.5, 3.2, 0, 0, TAU); g.fill();
    g.strokeStyle = '#3a2c1d'; g.lineWidth = 2;
    g.beginPath(); g.arc(32, 48, 6, 0.3, Math.PI - 0.3); g.stroke();
  } else if (kind === 'frog') {
    g.strokeStyle = '#3a6b2a'; g.lineWidth = 2.5;
    g.beginPath(); g.arc(32, 36, 9, 0.25, Math.PI - 0.25); g.stroke();
    g.fillStyle = 'rgba(255,170,190,0.7)';
    g.beginPath(); g.arc(14, 42, 4.5, 0, TAU); g.arc(50, 42, 4.5, 0, TAU); g.fill();
  } else if (kind === 'penguin') {
    g.fillStyle = '#f3f6fa';
    g.beginPath(); g.ellipse(32, 40, 17, 18, 0, 0, TAU); g.fill();
    eye(16, 20); eye(41, 20);
    g.fillStyle = '#ffb347';
    g.beginPath(); g.moveTo(24, 38); g.lineTo(40, 38); g.lineTo(32, 50); g.closePath(); g.fill();
  } else if (kind === 'wolf') {
    g.fillStyle = '#e9edf4';
    g.beginPath(); g.ellipse(32, 46, 12, 11, 0, 0, TAU); g.fill();
    eye(16, 20); eye(41, 20);
    g.fillStyle = '#2b2018';
    g.beginPath(); g.arc(32, 42, 3.5, 0, TAU); g.fill();
  } else if (kind === 'cat') {
    eye(16, 22); eye(41, 22);
    g.fillStyle = '#f2a7c3';
    g.beginPath(); g.moveTo(28, 38); g.lineTo(36, 38); g.lineTo(32, 44); g.closePath(); g.fill();
    g.strokeStyle = 'rgba(80,80,90,0.8)'; g.lineWidth = 1.5;
    g.beginPath();
    g.moveTo(4, 38); g.lineTo(20, 41); g.moveTo(4, 47); g.lineTo(20, 45);
    g.moveTo(60, 38); g.lineTo(44, 41); g.moveTo(60, 47); g.lineTo(44, 45);
    g.stroke();
  } else { // player villager
    eye(16, 22); eye(41, 22);
    g.strokeStyle = '#b06a4a'; g.lineWidth = 2.5;
    g.beginPath(); g.arc(32, 42, 6, 0.3, Math.PI - 0.3); g.stroke();
    g.fillStyle = 'rgba(255,150,140,0.5)';
    g.beginPath(); g.arc(10, 38, 4, 0, TAU); g.arc(54, 38, 4, 0, TAU); g.fill();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.magFilter = THREE.NearestFilter;
  return tex;
}

  const faceMat = new THREE.MeshLambertMaterial({ map: makeFaceTexture(kind, opts.skin) });

    p1.position.set(-0.17, 1.47, 0.2);
    const p2 = new THREE.Mesh(pupGeo, lam('#2b2018'));

    beak.rotation.x = Math.PI / 2;

function makeTreeMesh(tr) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.24, 1.2, 0.24), lam('#7c5a36'));
  trunk.position.y = 0.6; trunk.castShadow = true;
  g.add(trunk);
  if (SEASON === 'winter') {
    const snow = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.3, 1.1), lam('#f4f8fc'));
    snow.position.y = 1.5; snow.castShadow = true;
    const br = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.12, 0.12), lam('#7c5a36'));
    br.position.y = 1.25; br.rotation.y = tr.sway;
    g.add(snow, br);
  } else {
    const cols = SEASON === 'autumn' ? ['#c87c30', '#b96a26'] : SEASON === 'spring' ? ['#54b04a', '#479e3e'] : ['#3f9440', '#358536'];
    const lv1 = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.9, 1.6), lam(cols[0]));
    lv1.position.y = 1.55;
    const lv2 = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.7, 1.1), lam(cols[1]));
    lv2.position.y = 2.25;
    const lv3 = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.55, 0.9), lam(mixHex(cols[0], '#ffffff', 0.14)));
    lv3.position.set(0.55, 1.92, 0.3);
    const lv4 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.8), lam(mixHex(cols[1], '#ffffff', 0.1)));
    lv4.position.set(-0.5, 1.86, -0.28);
    [lv1, lv2, lv3, lv4].forEach(m => { m.castShadow = true; g.add(m); });
    const dotCol = SEASON === 'spring' ? '#ffc2d4' : '#ff9c4a';
    for (let i = 0; i < 3; i++) {
      const fr = new THREE.Mesh(new THREE.BoxGeometry(0.17, 0.17, 0.17), lam(dotCol));
      fr.position.set(Math.cos(i * 2.2 + tr.sway) * 0.72, 1.4 + (i % 2) * 0.35, Math.sin(i * 2.2 + tr.sway) * 0.72);
      g.add(fr);

  g.position.set(tr.x * U, 0, tr.y * U);

}

function makeRockMesh(r) {
  const m = new THREE.Mesh(new THREE.DodecahedronGeometry(0.5 * r.s, 0), lam('#8d8d96'));
  m.position.set(r.x * U, 0.22 * r.s, r.y * U);
  m.scale.y = 0.7;
  m.rotation.y = r.s * 5;
  m.castShadow = true;
  return m;
}

function makeBuildingMesh(key) {
  const plot = plots[key];
  const g = new THREE.Group();
  const w = BD[key].w * U, d = (BD[key].h - 2) * U, h = B3[key].h;
  if (key === 'tent') {
    const tent = new THREE.Mesh(new THREE.ConeGeometry(w * 0.62 * 1.414, h, 4), lam('#4d8f5c'));
    tent.position.y = h / 2; tent.rotation.y = Math.PI / 4; tent.castShadow = true;
    const opening = new THREE.Mesh(new THREE.ConeGeometry(0.45, h * 0.5, 4), lam('#2e5638'));
    opening.position.set(0, h * 0.25, w * 0.45);
    opening.rotation.y = Math.PI / 4;
    const pole = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.6, 0.05), lam('#8a6644'));
    pole.position.y = h + 0.25;
    const flag = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.22, 0.03), lam('#ffd95e'));
    flag.position.set(0.22, h + 0.4, 0);
    g.add(tent, opening, pole, flag);
    const signMat = new THREE.MeshBasicMaterial({ map: makeTextTexture(T('b_tent')), transparent: true });
    signRefs.push({ key, mat: signMat });
    const sign = new THREE.Mesh(new THREE.PlaneGeometry(1.9, 0.48), signMat);
    sign.position.set(0, h + 0.85, 0.2);
    g.add(sign);
  } else {
    const wallCol = { house: '#f0d8a8', shop: '#e8c98c', museum: '#e3d6bd', cafe: '#dcb88f', home1: '#cfe3f0', home2: '#e7d6ef' }[key];
    const roofCol = { house: '#d96f4e', shop: '#4d8f5c', museum: '#7a6a52', cafe: '#a0563c', home1: '#5f8fc0', home2: '#9a6fc0' }[key];
    const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), lam(wallCol));
    body.position.y = h / 2; body.castShadow = true; body.receiveShadow = true;
    const rr = (w / 2 + 0.25) * 1.414;
    const roof = new THREE.Mesh(new THREE.ConeGeometry(rr, 0.9 + w * 0.16, 4), lam(roofCol));
    roof.position.y = h + (0.9 + w * 0.16) / 2 - 0.05;
    roof.rotation.y = Math.PI / 4;
    roof.scale.z = (d / 2 + 0.25) / (w / 2 + 0.25);
    roof.castShadow = true;
    const door = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.0, 0.08), lam('#7c5a36'));
    door.position.set(0, 0.5, d / 2 + 0.03);
    g.add(body, roof, door);
    const winMat = new THREE.MeshLambertMaterial({ color: '#bfe2ef', emissive: new THREE.Color('#ffe9a3'), emissiveIntensity: 0 });
    windowMats.push(winMat);
    for (const sx of [-w * 0.28, w * 0.28]) {
      const win = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.45, 0.06), winMat);
      win.position.set(sx, h * 0.62, d / 2 + 0.02);
      g.add(win);
    }
    if (key === 'museum') {
      for (const sx of [-w * 0.38, -w * 0.14, w * 0.14, w * 0.38]) {
        const col = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, h, 8), lam('#f2ead8'));
        col.position.set(sx, h / 2, d / 2 + 0.16);
        g.add(col);
      }
    }
    if (key === 'cafe') {
      for (let i = 0; i < 5; i++) {
        const aw = new THREE.Mesh(new THREE.BoxGeometry(w * 0.16, 0.06, 0.5), lam(i % 2 ? '#ffffff' : '#d96f4e'));
        aw.position.set(-w * 0.32 + i * w * 0.16, h * 0.8, d / 2 + 0.22);
        aw.rotation.x = 0.35;
        g.add(aw);
      }
    }
    const signMat = new THREE.MeshBasicMaterial({ map: makeTextTexture(T('b_' + key)), transparent: true });
    signRefs.push({ key, mat: signMat });
    const sign = new THREE.Mesh(new THREE.PlaneGeometry(1.9, 0.48), signMat);
    sign.position.set(0, h - 0.32, d / 2 + 0.05);
    g.add(sign);
  }
  g.position.set(plot.x * U, 0, (plot.y + 7 - BD[key].h / 2) * U);
  return g;
}

    const leaf = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.04, 0.08), lam('#4d8f3c'));
    leaf.position.y = 0.17;

    const mound = new THREE.Mesh(new THREE.CircleGeometry(0.3, 12), lam('#8a6644'));

    const le1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.04, 0.1), lam('#5dbb4e'));

function rebuildWorld() {
  if (!renderer) return;
  sceneDirty = false;
  if (worldGroup) scene.remove(worldGroup);
  trackItem.clear(); trackPlant.clear(); trackNpc.clear();
  windowMats.length = 0; signRefs.length = 0; treeRefs.length = 0;
  worldGroup = new THREE.Group();
  // voxel terrain (one instanced mesh, per-tile color)
  const pal = {
    spring: { grass: ['#62b84e', '#5bb046'], sand: ['#ecd9a2', '#e5d199'] },
    summer: { grass: ['#54ad47', '#4da540'], sand: ['#ecd9a2', '#e5d199'] },
    autumn: { grass: ['#a3a953', '#99a04c'], sand: ['#e6d3a0', '#dfcb96'] },
    winter: { grass: ['#e9eef3', '#e1e8ef'], sand: ['#ded7c4', '#d6cfba'] },
  }[SEASON];
  const tiles = [];
  for (let y = 0; y < MH; y++) for (let x = 0; x < MW; x++) {
    if (map[y][x] !== T_WATER) tiles.push({ x, y, t: map[y][x] });
  }
  const inst = new THREE.InstancedMesh(
    new THREE.BoxGeometry(1, 1.3, 1),
    new THREE.MeshLambertMaterial({ color: 0xffffff, map: tileTex }),
    tiles.length);
  const m4 = new THREE.Matrix4(), col = new THREE.Color();
  tiles.forEach((tl, i) => {
    const top = tl.t === T_SAND ? -0.06 : 0;
    m4.makeTranslation(tl.x + 0.5, top - 0.65, tl.y + 0.5);
    inst.setMatrixAt(i, m4);
    col.set(pal[tl.t === T_GRASS ? 'grass' : 'sand'][(tl.x + tl.y) % 2]);
    inst.setColorAt(i, col);
  });
  inst.receiveShadow = true;
  worldGroup.add(inst);
  // trees & rocks
  for (const tr of trees) {
    const tg = makeTreeMesh(tr);
    worldGroup.add(tg);
    treeRefs.push({ g: tg, ph: tr.sway });
  }
  for (const r of rocks) worldGroup.add(makeRockMesh(r));
  // wildflowers (instanced)
  if (wildflowers.length) {
    const heads = new THREE.InstancedMesh(
      new THREE.BoxGeometry(0.15, 0.15, 0.15),
      new THREE.MeshLambertMaterial({ color: 0xffffff }),
      wildflowers.length);
    const stems = new THREE.InstancedMesh(
      new THREE.BoxGeometry(0.05, 0.3, 0.05), lam('#3f7a3f'), wildflowers.length);
    wildflowers.forEach((f, i) => {
      m4.makeTranslation(f.x * U, 0.36, f.y * U);
      heads.setMatrixAt(i, m4);
      col.set(f.c1);
      heads.setColorAt(i, col);
      m4.makeTranslation(f.x * U, 0.15, f.y * U);
      stems.setMatrixAt(i, m4);
    });
    worldGroup.add(heads, stems);
  }
  // grass tufts
  const grassTiles = tiles.filter(tl => tl.t === T_GRASS);
  if (grassTiles.length) {
    const rngT = mulberry32(((prog ? prog.seed : 7) ^ 0x9e3779) >>> 0);
    const nT = Math.min(900, grassTiles.length);
    const tufts = new THREE.InstancedMesh(new THREE.ConeGeometry(0.07, 0.22, 4), lam('#3e8a37'), nT);
    for (let i = 0; i < nT; i++) {
      const tl = grassTiles[Math.floor(rngT() * grassTiles.length)];
      m4.makeTranslation(tl.x + rngT(), 0.1, tl.y + rngT());
      tufts.setMatrixAt(i, m4);
    }
    worldGroup.add(tufts);
  }
  // shoreline foam
  if (foamEdges.length) {
    foamMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.35 });
    const foam = new THREE.InstancedMesh(new THREE.BoxGeometry(0.8, 0.03, 0.14), foamMat, foamEdges.length);
    const q = new THREE.Quaternion(), eu = new THREE.Euler(), pv = new THREE.Vector3(), sv = new THREE.Vector3(1, 1, 1);
    foamEdges.forEach((e, i) => {
      let px = e.x + 0.5, pz = e.y + 0.5, rot = 0;
      if (e.side === 0) pz = e.y - 0.12;
      else if (e.side === 2) pz = e.y + 1.12;
      else if (e.side === 1) { px = e.x + 1.12; rot = Math.PI / 2; }
      else { px = e.x - 0.12; rot = Math.PI / 2; }
      eu.set(0, rot, 0); q.setFromEuler(eu);
      pv.set(px, -0.29, pz);
      m4.compose(pv, q, sv);
      foam.setMatrixAt(i, m4);
    });
    worldGroup.add(foam);
  }
  // buildings + Nook by the tent
  for (const b of activeBuildings()) worldGroup.add(makeBuildingMesh(b.key));
  const nm = makeCharMesh('nook', { skin: '#8a6644', shirt: '#4d8f5c' });
  nm.position.set((plots.tent.x + 28) * U, 0, (plots.tent.y + 8) * U);
  worldGroup.add(nm);
  // lamp by the shop
  if (prog && prog.built.shop) {
    const lx = (plots.shop.x - 52) * U, lz = (plots.shop.y + 28) * U;
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.6, 8), lam('#46535e'));
    pole.position.set(lx, 0.8, lz);
    const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.14, 8, 8),
      new THREE.MeshBasicMaterial({ color: '#ffe9a3' }));
    bulb.position.set(lx, 1.65, lz);
    worldGroup.add(pole, bulb);
    lampLight.position.set(lx, 1.7, lz);
  }
  scene.add(worldGroup);
}

function lerpAngle(a, b, t) {
  let d = (b - a) % TAU;
  if (d > Math.PI) d -= TAU;
  if (d < -Math.PI) d += TAU;
  return a + d * t;
}
function syncChar(m, wx, wy, yaw, moving, step, dt) {
  m.position.set(wx * U, groundY(wx, wy), wy * U);
  m.userData.yaw = lerpAngle(m.userData.yaw || 0, yaw, 1 - Math.pow(0.0001, dt));
  m.rotation.y = m.userData.yaw;
  const sw = moving ? Math.sin(step) * 0.7 : 0;
  if (m.userData.l1) { m.userData.l1.rotation.x = sw; m.userData.l2.rotation.x = -sw; }
  if (m.userData.a1) { m.userData.a1.rotation.x = -sw * 0.8; m.userData.a2.rotation.x = sw * 0.8; }
  const bob = moving ? Math.abs(Math.sin(step)) * 0.05 : 0;
  if (m.userData.body) m.userData.body.position.y = 0.58 + bob;
  if (m.userData.head) m.userData.head.position.y = 1.12 + bob;
}

function updateEnvironment() {
  const h = nowHour();
  const [top, bottom] = skyColors();
  sceneBgColor.set(top);
  scene.fog.color.set(bottom);
  const period = dayPeriod();
  waterMat.color.set({ morning: '#3f9bd0', afternoon: '#3a96cc', evening: '#3f7fb8', night: '#16294d' }[period]);
  const isDay = h >= 5.5 && h < 19.2;
  const dayT = clamp((h - 5.5) / 13.7, 0, 1);
  const elev = Math.sin(dayT * Math.PI);
  if (isDay) {
    sunLight.intensity = 0.45 + elev * 1.0;
    sunLight.color.set(mixHex('#ffb766', '#ffffff', clamp(elev * 1.6, 0, 1)));
    sunLight.position.set(
      sunLight.target.position.x - Math.cos(dayT * Math.PI) * 38,
      6 + elev * 42,
      sunLight.target.position.z + 16);
  } else {
    sunLight.intensity = 0.5;
    sunLight.color.set('#aebfe8');
    sunLight.position.set(sunLight.target.position.x + 10, 40, sunLight.target.position.z + 14);
  }
  hemiLight.intensity = isDay ? 0.55 + elev * 0.3 : 0.35;
  if (starMat) starMat.opacity = period === 'night' ? 0.9 : period === 'evening' ? 0.4 : 0;
  if (moon) moon.visible = !isDay;
  const glow = period === 'night' || period === 'evening';
  for (const wm of windowMats) wm.emissiveIntensity = glow ? 1.3 : 0;
  lampLight.intensity = glow && prog && prog.built.shop ? 1.8 : 0;
}

function sync3D(dt, t) {
  if (!renderer) return;
  if (sceneDirty) rebuildWorld();
  if (signsDirty) {
    signsDirty = false;
    for (const sr of signRefs) { sr.mat.map = makeTextTexture(T('b_' + sr.key)); sr.mat.needsUpdate = true; }
  }
  updateEnvironment();
  // player
  if (!playerMesh) {
    playerMesh = makeCharMesh('player', { skin: '#f5cf9e', shirt: '#e2574c' });
    scene.add(playerMesh);
  }
  syncChar(playerMesh, player.x, player.y, player.vyaw || 0, player.moving, player.step, dt);
  // NPCs
  for (const n of npcs) {
    let m = trackNpc.get(n);
    if (!m) {
      m = makeCharMesh(n.def.kind, { skin: n.def.body, shirt: n.def.shirt });
      worldGroup.add(m);
      trackNpc.set(n, m);
    }
    const moving = n.state === 'walk';
    if (moving) n.vyaw = Math.atan2(n.tx - n.x, n.ty - n.y);
    syncChar(m, n.x, n.y, n.vyaw || 0, moving, n.step, dt);
  }
  // ground items
  const live = new Set(groundItems);
  for (const [it, m] of trackItem) {
    if (!live.has(it)) { worldGroup.remove(m); trackItem.delete(it); }
  }
  for (const it of groundItems) {
    let m = trackItem.get(it);
    if (!m) { m = makeItemMesh(it); worldGroup.add(m); trackItem.set(it, m); }
    if (it.type === 'fish') {
      m.position.set(it.x * U, -0.30, it.y * U);
      const ring = m.userData.ring;
      if (ring) {
        const rp = (t * 0.7 + it.ph) % 1;
        ring.scale.setScalar(0.6 + rp * 2.2);
        ring.material.opacity = 0.4 * (1 - rp);
      }
    } else if (it.type === 'fossil') {
      m.position.set(it.x * U, groundY(it.x, it.y) + 0.01, it.y * U);
    } else {
      m.position.set(it.x * U, groundY(it.x, it.y) + 0.14 + Math.sin(t * 2.4 + it.ph) * 0.05, it.y * U);
    }
  }
  // plants
  const liveP = new Set(plants);
  for (const [p, m] of trackPlant) {
    if (!liveP.has(p) || m.userData.stage !== plantStage(p)) { worldGroup.remove(m); trackPlant.delete(p); }
  }
  for (const p of plants) {
    if (!trackPlant.get(p)) {
      const m = makePlantMesh(plantStage(p));
      m.position.set(p.x * U, groundY(p.x, p.y), p.y * U);
      worldGroup.add(m);
      trackPlant.set(p, m);
    }
  }
  // water, foam, tree sway & clouds
  if (waterTex) { waterTex.offset.x = t * 0.008; waterTex.offset.y = t * 0.005; }
  if (foamMat) foamMat.opacity = 0.3 + 0.18 * Math.sin(t * 1.8);
  for (const tr3 of treeRefs) tr3.g.rotation.z = Math.sin(t * 1.2 + tr3.ph) * 0.02;
  for (const c of clouds3) {
    c.g.position.x += c.v * dt;
    if (c.g.position.x > MW + 30) c.g.position.x = -30;
  }
  // orbit camera
  const fx = cam.x * U, fz = cam.y * U;
  cam3.position.set(
    fx + Math.sin(camYaw) * camDist * 0.85,
    1.2 + camDist * 0.68,
    fz + Math.cos(camYaw) * camDist * 0.85);
  cam3.lookAt(fx, 0.7, fz);
  // sun shadows follow the player
  sunLight.target.position.set(player.x * U, 0, player.y * U);
}

function renderInteractBubble() {
  if (!renderer || dlg.open || ui.mode || state !== 'play') return;
  const tgt = nearestInteract();
  if (!tgt) return;
  let bx = player.x, by = player.y, bh = 2.0;
  if (tgt.obj) { bx = tgt.obj.x; by = tgt.obj.y; bh = tgt.kind === 'npc' ? 1.95 : 0.8; }
  else if (tgt.kind === 'nook') { bx = plots.tent.x + 28; by = plots.tent.y + 8; bh = 1.95; }
  else if (plots[tgt.kind]) { bx = plots[tgt.kind].x; by = plots[tgt.kind].y; bh = (B3[tgt.kind] ? B3[tgt.kind].h : 2) + 1.3; }
  const v = new THREE.Vector3(bx * U, bh, by * U).project(cam3);
  if (v.z > 1) return;
  const sx = (v.x * 0.5 + 0.5) * view.w, sy = (-v.y * 0.5 + 0.5) * view.h;
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  const bob = Math.sin(gameTime() * 4) * 2;
  ctx.fillStyle = 'rgba(255,251,233,0.95)';
  roundRect(ctx, sx - 11, sy - 11 + bob, 22, 22, 7);
  ctx.fill();
  ctx.fillStyle = '#7a5230';
  ctx.font = '900 14px Nunito, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('E', sx, sy + 5 + bob);
}

// ---------------- main loop ----------------
function frame(now) {
  const dt = clamp((now - lastT) / 1000, 0, 0.05);
  lastT = now;
  update(dt);

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, hudCv.width, hudCv.height);

  if (state === 'title') {
    renderTitle();
    renderParticles();
    renderLightAndVignette();
  } else if (state === 'slots') {
    renderSlots();
    renderParticles();
    renderLightAndVignette();
  } else if (state === 'intro') {
    renderIntro();
    renderParticles();
    if (vignetteCv) { ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0); ctx.drawImage(vignetteCv, 0, 0, view.w, view.h); }
  } else {
    sync3D(dt, gameTime());
    if (renderer) renderer.render(scene, cam3);
    renderInteractBubble();
    renderParticles();
    renderLightAndVignette();
    renderHUD();
  }

  if (fade > 0) {
    ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
    ctx.fillStyle = `rgba(12,10,24,${fade})`;
    ctx.fillRect(0, 0, view.w, view.h);
  }
  requestAnimationFrame(frame);
}

// ---------------- boot ----------------
resize();
initThree();
resize();
genWorld(20260612); // placeholder island (real one loads with the slot)
prog = freshProg(20260612);
refreshRects();
spawnNpcs();
requestAnimationFrame(frame);
</script>

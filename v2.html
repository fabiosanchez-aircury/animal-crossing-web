function mulberry32(seed) {
  return function () {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function roundRect(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function hexToRgb(h) { return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }
function mixHex(a, b, t) {
  const A = hexToRgb(a), B = hexToRgb(b);
  return `rgb(${Math.round(lerp(A[0], B[0], t))},${Math.round(lerp(A[1], B[1], t))},${Math.round(lerp(A[2], B[2], t))})`;

  try { return JSON.parse(localStorage.getItem(SLOT_KEY(i))); } catch (e) { return null; }

function persist() {
  if (currentSlot < 0 || !prog) return;
  try {
    localStorage.setItem(SLOT_KEY(currentSlot), JSON.stringify({
      name: player.name, bells: player.bells, inv: player.inv,
      seed: prog.seed, createdAt: prog.createdAt, built: prog.built, tools: prog.tools,
      donated: prog.donated, lastGift: prog.lastGift, star: prog.star,
      plants: plants.map(p => ({ x: p.x, y: p.y, t0: p.t0 })),
    }));
  } catch (e) {}
}

(function migrate() {
  try {
    const old = JSON.parse(localStorage.getItem('animal-isle-save'));
    if (old && old.name && !readSlot(0)) {
      const p = freshProg(Math.floor(Math.random() * 1e9));
      localStorage.setItem(SLOT_KEY(0), JSON.stringify({
        name: old.name, bells: old.bells || 100, inv: old.inv || {},
        ...p, plants: [],

    }
    localStorage.removeItem('animal-isle-save');
  } catch (e) {}
})();

// ---------------- world (procedural per seed) ----------------
const TILE = 16, MW = 110, MH = 88;
const WORLD_W = MW * TILE, WORLD_H = MH * TILE;
const T_WATER = 0, T_SAND = 1, T_GRASS = 2;
let map = [], trees = [], rocks = [], wildflowers = [], foamEdges = [];
let plots = {}; // key -> {x, y} (base/door center, world px)
let terrainCv = null;
let spawnPt = { x: 0, y: 0 };

const tileAt = (px, py) => {
  const tx = Math.floor(px / TILE), ty = Math.floor(py / TILE);
  if (tx < 0 || ty < 0 || tx >= MW || ty >= MH) return T_WATER;
  return map[ty][tx];
};
const isLand = (px, py) => tileAt(px, py) !== T_WATER;

function genWorld(seed) {
  for (let attempt = 0; attempt < 12; attempt++) {
    if (tryGenWorld(seed + attempt * 7919)) return;
  }
  tryGenWorld(1337); // bulletproof fallback
}
function tryGenWorld(seed) {
  const rng = mulberry32(seed);
  const cx = MW / 2, cy = MH / 2;
  const p1 = rng() * TAU, p2 = rng() * TAU, p3 = rng() * TAU;
  const f1 = 0.20 + rng() * 0.16, f2 = 0.18 + rng() * 0.14, f3 = 0.12 + rng() * 0.10;
  const a1 = 0.06 + rng() * 0.06, a2 = 0.05 + rng() * 0.05, a3 = 0.04 + rng() * 0.04;
  const rx = MW * (0.38 + rng() * 0.06), ry = MH * (0.36 + rng() * 0.06);
  map = [];
  let grassCount = 0;
  for (let y = 0; y < MH; y++) {
    map[y] = [];
    for (let x = 0; x < MW; x++) {
      const nx = (x - cx) / rx, ny = (y - cy) / ry;
      let d = Math.sqrt(nx * nx + ny * ny);
      d += a1 * Math.sin(x * f1 + p1) + a2 * Math.cos(y * f2 + p2) + a3 * Math.sin((x + y) * f3 + p3);
      let t = d < 0.72 ? T_GRASS : d < 0.93 ? T_SAND : T_WATER;
      if (x < 2 || y < 2 || x >= MW - 2 || y >= MH - 2) t = T_WATER;
      map[y][x] = t;

  }

      const px = Math.floor(cx + (rng() * 2 - 1) * rx * 0.55);
      const py = Math.floor(cy + (rng() * 2 - 1) * ry * 0.55);
      if (map[py] && map[py][px] === T_GRASS) {

  plots.cafe = findSpot(cx, cy, 20, 3, 4);
  plots.home1 = findSpot(cx, cy, 24, 3, 3);
  plots.home2 = findSpot(cx, cy, 24, 3, 3);

      const sx = plots.tent.x + Math.cos(a) * r * TILE, sy = plots.tent.y + 20 + Math.sin(a) * r * TILE;
      if (tileAt(sx, sy) === T_GRASS) { spawnPt = { x: sx, y: sy }; break outer; }
    }

  const farFromPlots = (x, y, d) => Object.values(plots).every(p => dist(x, y, p.x, p.y) > d);
  let tries = 0;

    while (!ok && t2++ < 250) {

}

function renderTerrain(seed) {

    summer: { grass: ['#54ad47', '#4da540'], sand: ['#ecd9a2', '#e5d199'] },
    autumn: { grass: ['#a3a953', '#99a04c'], sand: ['#e6d3a0', '#dfcb96'] },
    winter: { grass: ['#e9eef3', '#e1e8ef'], sand: ['#ded7c4', '#d6cfba'] },
  }[SEASON];
  const r2 = mulberry32(seed ^ 0x5f3759df);
  for (let y = 0; y < MH; y++) for (let x = 0; x < MW; x++) {
    const t = map[y][x];
    if (t === T_WATER) continue;
    const set = t === T_GRASS ? pal.grass : pal.sand;
    g.fillStyle = set[(x + y) % 2];
    g.fillRect(x * TILE, y * TILE, TILE, TILE);
    for (let i = 0; i < 2; i++) {

      if (t === T_GRASS) {

        g.fillRect(sx, sy, 2, r2() < 0.5 ? 3 : 2);

    }
  }
}

    if (pos === 4) tone({ f: mtof(chord[0] - 12), t, dur: eighthLen * 3, type: 'triangle', vol: 0.07 });
    if (Math.random() < set.density && pos !== 0) {
      audio.mel = clamp(audio.mel + Math.floor(rnd(-2, 3)), 0, 9);
      const m = set.base + PENTA[audio.mel % 5] + 12 * Math.floor(audio.mel / 5);
      tone({ f: mtof(m), t, dur: eighthLen * rnd(1.1, 2.2), type: set.wave, vol: 0.085 });

  const p = dayPeriod(), t = AC.currentTime;
  if (p === 'morning' || p === 'afternoon') {
    audio.birdT -= dt;
    if (audio.birdT <= 0) {
      audio.birdT = p === 'morning' ? rnd(0.8, 3.5) : rnd(4, 10);
      const n = 2 + Math.floor(rnd(3)), f0 = rnd(2300, 3300);
      for (let i = 0; i < n; i++) {
        tone({ f: f0 * rnd(0.92, 1.1), t: t + i * rnd(0.09, 0.15), dur: 0.09, type: 'sine', vol: 0.04, dest: audio.amb, slide: f0 * rnd(1.15, 1.4) });
      }
    }
  }
  if (p === 'night' || p === 'evening') {
    audio.cricketT -= dt;
    if (audio.cricketT <= 0) {
      audio.cricketT = rnd(0.5, 1.6);
      for (let i = 0; i < 3; i++) {
        tone({ f: 4200 + rnd(-200, 200), t: t + i * 0.07, dur: 0.045, type: 'sine', vol: 0.022, dest: audio.amb });
      }

}
const SFX = {
  pickup() { if (!AC) return; const t = AC.currentTime;

    tone({ f: 1318, t: t + 0.08, dur: 0.14, type: 'square', vol: 0.05, dest: audio.sfx }); },
  sell() { if (!AC) return; const t = AC.currentTime;
    [987, 1318, 1975].forEach((f, i) => tone({ f, t: t + i * 0.07, dur: 0.18, type: 'triangle', vol: 0.08, dest: audio.sfx })); },
  error() { if (!AC) return; tone({ f: 196, t: AC.currentTime, dur: 0.2, type: 'square', vol: 0.06, dest: audio.sfx }); },
  blip() { if (!AC) return; tone({ f: rnd(480, 760), t: AC.currentTime, dur: 0.04, type: 'square', vol: 0.025, dest: audio.sfx }); },
  dig() { if (!AC) return; noiseBurst(AC.currentTime, 0.18, 600, 0.2); },
  splash() { if (!AC) return; noiseBurst(AC.currentTime, 0.3, 1400, 0.22);
    tone({ f: 520, t: AC.currentTime, dur: 0.2, type: 'sine', vol: 0.06, dest: audio.sfx, slide: 180 }); },
  plant() { if (!AC) return; noiseBurst(AC.currentTime, 0.12, 500, 0.14);

  build() { if (!AC) return; const t = AC.currentTime;

  coffee() { if (!AC) return; const t = AC.currentTime;

// ---------------- input / state machine ----------------
const keys = {};
let state = 'title'; // title | slots | intro | play
let fade = 0, fadeDir = 0, fadeCb = null;
function startFade(cb) { fadeDir = 1; fadeCb = cb; }

const slotsUI = { sel: 0, delArm: -1, delT: 0 };
const ui = { mode: null, sel: 0, tab: 0, sub: null }; // inv | nook | shop | museum | cafe | pause
let minimapOn = true;
const toasts = [];
function toast(text) { toasts.push({ text, t: 0 }); }

window.addEventListener('keydown', e => {
  if (document.activeElement === nameInput) {
    if (e.key === 'Enter') confirmName();
    return;
  }
  initAudio();
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Tab'].includes(e.key)) e.preventDefault();
  keys[e.code] = true;
  handlePress(e.code);
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('blur', () => { for (const k in keys) keys[k] = false; });
cv.addEventListener('pointerdown', () => {
  initAudio();
  if (state === 'title' || state === 'slots') handlePress('Enter');
  else if (dlg.open || (state === 'intro')) handlePress('KeyE');
});

// ---------------- dialogue (typewriter) ----------------
const dlg = { open: false, lines: [], li: 0, shown: 0, speaker: '', color: '#7a5230', cb: null };
function startDialog(speaker, color, lines, cb) {
  dlg.open = true; dlg.speaker = speaker; dlg.color = color;
  dlg.lines = lines.map(l => l.split('{name}').join(player.name || '...'));
  dlg.li = 0; dlg.shown = 0; dlg.cb = cb || null;
}
function advanceDialog() {
  const line = dlg.lines[dlg.li];
  if (dlg.shown < line.length) { dlg.shown = line.length; return; }
  dlg.li++; dlg.shown = 0;
  if (dlg.li >= dlg.lines.length) {
    dlg.open = false;
    if (dlg.cb) { const cb = dlg.cb; dlg.cb = null; cb(); }
  }
}

// ---------------- intro ----------------
const intro = { active: false, idx: 0, shown: 0, waitingInput: false, script: [] };
function buildIntroScript() {
  intro.script = T('intro_lines');
  intro.idx = 0; intro.shown = 0; intro.waitingInput = false; intro.active = true;
}
function confirmName() {
  const v = nameInput.value.trim();
  if (!v) return;
  player.name = v.slice(0, 12);
  nameInput.style.display = 'none';
  nameInput.blur();
  intro.waitingInput = false;
  intro.idx++; intro.shown = 0;
  persist();
  SFX.pickup();
}
function advanceIntro() {
  const item = intro.script[intro.idx];
  if (item === undefined) return;
  if (item === '@INPUT') return;
  const text = item.split('{name}').join(player.name);
  if (intro.shown < text.length) { intro.shown = text.length; return; }
  intro.idx++; intro.shown = 0;
  const next = intro.script[intro.idx];
  if (next === undefined) {
    intro.active = false;
    startFade(() => { state = 'play'; toast(T('welcome')); persist(); });
  } else if (next === '@INPUT') {
    intro.waitingInput = true;
    nameInput.style.display = 'block';
    nameInput.value = '';
    setTimeout(() => { try { nameInput.focus(); } catch (e) {} }, 50);
  }
}

// ---------------- slot management ----------------
function enterSlot(i) {
  const data = readSlot(i);
  currentSlot = i;
  if (data && data.name) {
    prog = { seed: data.seed, createdAt: data.createdAt, built: data.built || {}, tools: data.tools || {}, donated: data.donated || {}, lastGift: data.lastGift || '', star: !!data.star };
    player.name = data.name; player.bells = data.bells ?? 100; player.inv = data.inv || {};
    genWorld(prog.seed);
    plants = (data.plants || []).map(p => ({ x: p.x, y: p.y, t0: p.t0 }));
    bootIsland();
    startFade(() => { state = 'play'; toast(T('welcome_back', { n: player.name })); });
  } else {
    prog = freshProg(Math.floor(Math.random() * 1e9));
    player.name = ''; player.bells = 150; player.inv = {}; player.coffeeUntil = 0;
    genWorld(prog.seed);
    plants = [];
    bootIsland();
    startFade(() => { state = 'intro'; buildIntroScript(); });
  }
}
function bootIsland() {
  refreshRects();
  groundItems.length = 0;
  fillSpawns(true);
  spawnNpcs();
  player.x = spawnPt.x; player.y = spawnPt.y;
  player.coffeeUntil = 0;
  cam.x = player.x; cam.by = player.y + proj.SH * 0.30;
  ui.mode = null; dlg.open = false;
}
function slotSummary(i) {
  const d = readSlot(i);
  if (!d || !d.name) return null;
  const days = Math.floor((Date.now() - (d.createdAt || Date.now())) / 86400e3) + 1;
  const builtCount = PROJECTS.filter(p => d.built && d.built[p.key]).length;
  return { name: d.name, bells: d.bells ?? 0, days, builtCount, star: !!d.star };
}

// ---------------- key handling ----------------
function handlePress(code) {
  if (fadeDir !== 0) return;

  if (code === 'KeyL' && state !== 'intro') {
    setLang(lang === 'en' ? 'es' : 'en');
    if (state === 'play') toast(lang === 'es' ? 'Idioma: Español' : 'Language: English');
    return;
  }

  if (state === 'title') {
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') { state = 'slots'; SFX.pickup(); }
    return;
  }

  if (state === 'slots') {
    if (code === 'Escape') { state = 'title'; return; }
    if (code === 'ArrowUp') { slotsUI.sel = (slotsUI.sel + 2) % 3; slotsUI.delArm = -1; SFX.blip(); return; }
    if (code === 'ArrowDown') { slotsUI.sel = (slotsUI.sel + 1) % 3; slotsUI.delArm = -1; SFX.blip(); return; }
    if (code === 'Digit1' || code === 'Digit2' || code === 'Digit3') {
      slotsUI.sel = Number(code.slice(-1)) - 1; slotsUI.delArm = -1; SFX.blip(); return;
    }
    if (code === 'KeyX') {
      if (!readSlot(slotsUI.sel)) return;
      if (slotsUI.delArm === slotsUI.sel) {
        try { localStorage.removeItem(SLOT_KEY(slotsUI.sel)); } catch (e) {}
        slotsUI.delArm = -1; SFX.dig();
      } else { slotsUI.delArm = slotsUI.sel; slotsUI.delT = 3; SFX.error(); }
      return;
    }
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') { SFX.pickup(); enterSlot(slotsUI.sel); }
    return;
  }

  if (state === 'intro') {
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') advanceIntro();
    return;
  }

  // ---- play ----
  if (code === 'KeyM') {
    audio.muted = !audio.muted;
    if (audio.master) audio.master.gain.value = audio.muted ? 0 : 0.6;
    toast(audio.muted ? T('sound_off') : T('sound_on'));
    return;
  }
  if (dlg.open) {
    if (code === 'KeyE' || code === 'Enter' || code === 'Space') advanceDialog();
    return;
  }
  if (ui.mode) { uiKey(code); return; }

  if (code === 'KeyI') { openUI('inv'); return; }
  if (code === 'Escape') { openUI('pause'); return; }
  if (code === 'Tab') { minimapOn = !minimapOn; SFX.blip(); return; }
  if (code === 'KeyE' || code === 'Enter') doInteract();
  if (code === 'KeyP') doPlant();
}
function openUI(mode) {
  ui.mode = mode; ui.sel = 0; ui.tab = 0; ui.sub = null;
  SFX.blip();
}
function closeUI() { ui.mode = null; SFX.blip(); persist(); }

// ---------------- interactions ----------------
function nearestInteract() {
  for (const n of npcs) if (dist(player.x, player.y, n.x, n.y) < 26) return { kind: 'npc', obj: n };
  // Nook stands by the tent
  if (dist(player.x, player.y, plots.tent.x + 28, plots.tent.y + 8) < 30) return { kind: 'nook' };
  for (const b of activeBuildings()) {
    if (b.key === 'tent') continue;
    if (dist(player.x, player.y, b.x, b.y + 10) < 32) {
      if (b.key === 'shop') return { kind: 'shop' };
      if (b.key === 'museum') return { kind: 'museum' };
      if (b.key === 'cafe') return { kind: 'cafe' };
      if (b.key === 'house') return { kind: 'house' };
    }
  }
  let best = null, bd = 1e9;
  for (const it of groundItems) {
    const d = dist(player.x, player.y, it.x, it.y);
    const reach = it.type === 'fish' ? 36 : 22;
    if ((it.type === 'fish' || it.type === 'fossil') && d < reach && d < bd) { best = { kind: it.type, obj: it }; bd = d; }
  }
  if (best) return best;
  for (const p of plants) {
    if (plantStage(p) === 3 && dist(player.x, player.y, p.x, p.y) < 20) return { kind: 'harvest', obj: p };
  }
  return null;
}
function doInteract() {
  const tgt = nearestInteract();
  if (!tgt) return;
  if (tgt.kind === 'npc') {
    const n = tgt.obj;
    n.state = 'idle'; n.t = rnd(3, 5);
    n.facing = player.x < n.x ? 'left' : 'right';
    const sets = n.def.lines[lang] || n.def.lines.en;
    startDialog(n.def.name, n.def.shirt, pick(sets[dayPeriod()]));
  } else if (tgt.kind === 'nook') {
    openUI('nook');
  } else if (tgt.kind === 'shop') {
    openUI('shop');
  } else if (tgt.kind === 'museum') {
    openUI('museum');
  } else if (tgt.kind === 'cafe') {
    openUI('cafe');
  } else if (tgt.kind === 'house') {
    const today = new Date().toISOString().slice(0, 10);
    if (prog.lastGift !== today) {
      prog.lastGift = today;
      player.bells += GIFT_BELLS;
      toast(T('gift', { b: GIFT_BELLS }));
      SFX.sell();
    } else {
      toast(T('rested'));
      SFX.blip();
    }
    persist();
  } else if (tgt.kind === 'fish') {
    if (!prog.tools.rod) { toast(T('need_rod')); SFX.error(); return; }
    groundItems.splice(groundItems.indexOf(tgt.obj), 1);
    addItem('fish'); SFX.splash(); toast(T('caught')); persist();
  } else if (tgt.kind === 'fossil') {
    if (!prog.tools.shovel) { toast(T('need_shovel')); SFX.error(); return; }
    groundItems.splice(groundItems.indexOf(tgt.obj), 1);
    addItem('fossil'); SFX.dig(); toast(T('dug')); persist();
  } else if (tgt.kind === 'harvest') {
    plants.splice(plants.indexOf(tgt.obj), 1);
    addItem('flower'); SFX.pickup(); toast(T('harvest')); persist();
  }
}
function doPlant() {
  if (!(player.inv.seeds > 0)) { toast(T('no_seeds')); SFX.error(); return; }
  const px = player.x, py = player.y + 6;
  if (tileAt(px, py) !== T_GRASS || insideBuilding(px, py)) { toast(T('need_grass')); SFX.error(); return; }
  if (plants.some(p => dist(p.x, p.y, px, py) < 18) || trees.some(t => dist(t.x, t.y, px, py) < 22)) {
    toast(T('crowded')); SFX.error(); return;
  }
  player.inv.seeds--;
  plants.push({ x: px, y: py, t0: Date.now() });
  SFX.plant(); toast(T('planted')); persist();
}

// ---------------- menus logic ----------------
function sellFactor() { return ui.mode === 'shop' ? 1 : 0.8; }
function sellRows() { return INV_ORDER.filter(t => (player.inv[t] || 0) > 0); }
function buyRows() {
  if (ui.mode === 'shop') return ['seeds'];
  const r = ['seeds'];
  if (!prog.tools.rod) r.unshift('rod');
  if (!prog.tools.shovel) r.splice(prog.tools.rod ? 0 : 1, 0, 'shovel');
  return r;
}
function doSell(type, all) {
  const n = all ? (player.inv[type] || 0) : 1;
  if (n <= 0) { SFX.error(); return; }
  const price = Math.round(ITEMS[type].sell * sellFactor());
  player.inv[type] -= n;
  player.bells += price * n;
  SFX.sell();
  toast(T('sold', { b: price * n, n, i: T('i_' + type) }));
  persist();
}
function doBuy(type) {
  const cost = ITEMS[type].buy;
  if ((type === 'rod' && prog.tools.rod) || (type === 'shovel' && prog.tools.shovel)) { toast(T('own')); SFX.error(); return; }
  if (player.bells < cost) { toast(T('no_bells')); SFX.error(); return; }
  player.bells -= cost;
  if (type === 'rod' || type === 'shovel') prog.tools[type] = true;
  else addItem(type);
  SFX.sell(); toast(T('bought', { i: T('i_' + type) })); persist();
}
function doBuild(idx) {
  const p = PROJECTS[idx];
  if (prog.built[p.key]) { toast(T('already_built')); SFX.error(); return; }
  if (idx > 0 && !prog.built[PROJECTS[idx - 1].key]) {
    toast(T('locked_prev', { b: T('b_' + PROJECTS[idx - 1].key) })); SFX.error(); return;
  }
  if (player.bells < p.cost) { toast(T('no_bells')); SFX.error(); return; }
  player.bells -= p.cost;
  prog.built[p.key] = true;
  refreshRects();
  const plot = plots[p.key];
  const dx = plot.x - player.x, dy = plot.y - player.y;
  const dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? T('east') : T('west')) : (dy > 0 ? T('south') : T('north'));
  toast(T('built_done', { b: T('b_' + p.key), d: dir }));
  SFX.build();
  const def = NPC_DEFS.find(d => d.homeKey === p.key);
  if (def) { addNpc(def); toast(T('new_neighbor', { n: def.name })); }
  persist();
}
function doDonate(type) {
  if (prog.donated[type]) { toast(T('donate_has')); SFX.error(); return; }
  if (!(player.inv[type] > 0)) { toast(T('donate_none')); SFX.error(); return; }
  player.inv[type]--;
  prog.donated[type] = true;
  player.bells += DONATE_GRANT;
  toast(T('donate_done', { b: DONATE_GRANT }));
  SFX.sell();
  if (DONATABLE.every(t => prog.donated[t]) && !prog.star) {
    prog.star = true;
    player.bells += COMPLETE_BONUS;
    toast(T('museum_complete', { b: COMPLETE_BONUS }));
    SFX.build();
  }
  persist();
}

function uiKey(code) {
  if (code === 'Escape') {
    if (ui.mode === 'nook' && ui.sub) { ui.sub = null; ui.sel = 0; SFX.blip(); return; }
    closeUI(); return;
  }
  if (ui.mode === 'inv') {
    if (code === 'KeyI' || code === 'KeyE') closeUI();
    return;
  }
  if (ui.mode === 'pause') {
    const n = 3;
    if (code === 'ArrowUp') { ui.sel = (ui.sel + n - 1) % n; SFX.blip(); return; }
    if (code === 'ArrowDown') { ui.sel = (ui.sel + 1) % n; SFX.blip(); return; }
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') {
      if (ui.sel === 0) closeUI();
      else if (ui.sel === 1) { setLang(lang === 'en' ? 'es' : 'en'); SFX.blip(); }
      else { persist(); ui.mode = null; startFade(() => { state = 'slots'; slotsUI.delArm = -1; }); }
    }
    return;
  }
  if (ui.mode === 'cafe') {
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') {
      if (player.bells < ITEMS.coffee.buy) { toast(T('no_bells')); SFX.error(); return; }
      player.bells -= ITEMS.coffee.buy;
      player.coffeeUntil = Date.now() + COFFEE_DUR * 1000;
      SFX.coffee(); toast(T('coffee_on')); persist();
      closeUI();
    }
    return;
  }
  if (ui.mode === 'museum') {
    const rows = DONATABLE;
    if (code === 'ArrowUp') { ui.sel = (ui.sel + rows.length - 1) % rows.length; SFX.blip(); return; }
    if (code === 'ArrowDown') { ui.sel = (ui.sel + 1) % rows.length; SFX.blip(); return; }
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') doDonate(rows[ui.sel]);
    return;
  }
  if (ui.mode === 'nook' && ui.sub === 'build') { uiKeyBuild(code); return; }
  if (ui.mode === 'shop' || (ui.mode === 'nook' && (ui.sub === 'sell' || ui.sub === 'buy'))) {
    const selling = ui.mode === 'shop' ? ui.tab === 0 : ui.sub === 'sell';
    const rows = selling ? sellRows() : buyRows();
    if (ui.mode === 'shop' && (code === 'ArrowLeft' || code === 'ArrowRight' || code === 'Tab')) {
      ui.tab = 1 - ui.tab; ui.sel = 0; SFX.blip(); return;
    }
    if (code === 'ArrowUp') { ui.sel = Math.max(0, ui.sel - 1); SFX.blip(); return; }
    if (code === 'ArrowDown') { ui.sel = Math.min(Math.max(0, rows.length - 1), ui.sel + 1); SFX.blip(); return; }
    if (code === 'Enter' || code === 'Space' || code === 'KeyA') {
      const type = rows[ui.sel];
      if (!type) { SFX.error(); return; }
      if (selling) {
        doSell(type, code === 'KeyA');
        ui.sel = Math.min(ui.sel, Math.max(0, sellRows().length - 1));
      } else doBuy(type);
    }
    return;
  }
  if (ui.mode === 'nook') { // root menu
    const rows = ['sell', 'buy', 'build', 'chat', 'leave'];
    if (code === 'ArrowUp') { ui.sel = (ui.sel + rows.length - 1) % rows.length; SFX.blip(); return; }
    if (code === 'ArrowDown') { ui.sel = (ui.sel + 1) % rows.length; SFX.blip(); return; }
    if (code === 'Enter' || code === 'Space' || code === 'KeyE') {
      const r = rows[ui.sel];
      if (r === 'leave') { closeUI(); return; }
      if (r === 'chat') {
        ui.mode = null;
        startDialog('Tom Nook', '#3f7a4c', [pick(T('nook_chat'))], () => { openUI('nook'); });
        return;
      }
      if (r === 'build') { ui.sub = 'build'; ui.sel = 0; SFX.blip(); return; }
      ui.sub = r; ui.sel = 0; SFX.blip();
    }
    return;
  }
}
// nook build submenu handled here (separate because rows differ)
function uiKeyBuild(code) {
  const rows = PROJECTS;
  if (code === 'ArrowUp') { ui.sel = (ui.sel + rows.length - 1) % rows.length; SFX.blip(); return; }
  if (code === 'ArrowDown') { ui.sel = (ui.sel + 1) % rows.length; SFX.blip(); return; }
  if (code === 'Enter' || code === 'Space' || code === 'KeyE') doBuild(ui.sel);
}

// ---------------- objective ----------------
function currentObjective() {
  if (!prog) return null;
  if (!prog.tools.rod) return T('obj_rod', { c: ITEMS.rod.buy });
  if (!prog.built.house) return T('obj_house', { c: PROJECTS[0].cost });
  if (!prog.tools.shovel) return T('obj_shovel', { c: ITEMS.shovel.buy });
  if (!prog.built.shop) return T('obj_shop', { c: PROJECTS[1].cost });
  if (!prog.built.museum) return T('obj_museum', { c: PROJECTS[2].cost });
  if (!prog.built.cafe) return T('obj_cafe', { c: PROJECTS[3].cost });
  if (!prog.built.home1) return T('obj_home1', { c: PROJECTS[4].cost });
  if (!prog.built.home2) return T('obj_home2', { c: PROJECTS[5].cost });
  if (!prog.star) return T('obj_donate');
  return T('obj_done');
}

// ---------------- clouds & particles ----------------
const clouds = [];
for (let i = 0; i < 8; i++) clouds.push({ x: rnd(2400), y: rnd(0.12, 0.85), s: rnd(0.5, 1.2), v: rnd(3, 8) });
const particles = [];
function spawnParticle(w, h) {
  if (SEASON === 'winter') particles.push({ x: rnd(w), y: -10, vx: rnd(-8, 8), vy: rnd(18, 40), ph: rnd(TAU), kind: 'snow', life: 30 });
  else if (SEASON === 'autumn') particles.push({ x: rnd(w), y: -10, vx: rnd(-15, 5), vy: rnd(22, 42), ph: rnd(TAU), kind: 'leaf', life: 30, c: pick(['#d8842f', '#c4622d', '#e0a83a']) });
  else if (SEASON === 'spring') particles.push({ x: rnd(w), y: -10, vx: rnd(-12, 12), vy: rnd(14, 30), ph: rnd(TAU), kind: 'petal', life: 30 });
  else particles.push({ x: rnd(w), y: rnd(h), vx: rnd(-6, 6), vy: rnd(-4, 4), ph: rnd(TAU), kind: 'spark', life: rnd(3, 6) });
}

// ---------------- update ----------------
let lastT = performance.now();
let persistT = 0;

function update(dt) {
  musicTick();
  ambientTick(dt);

  if (fadeDir === 1) {
    fade = Math.min(1, fade + dt * 2.2);
    if (fade >= 1) { fadeDir = -1; if (fadeCb) { const cb = fadeCb; fadeCb = null; cb(); } }
  } else if (fadeDir === -1) {
    fade = Math.max(0, fade - dt * 1.5);
    if (fade <= 0) fadeDir = 0;
  }

  const targetN = SEASON === 'summer' ? 14 : 36;
  if (particles.length < targetN && Math.random() < 0.3) spawnParticle(view.w, view.h);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.ph += dt * 2;
    p.x += (p.vx + Math.sin(p.ph) * 12) * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.y > view.h + 12 || p.life <= 0) particles.splice(i, 1);
  }
  clouds.forEach(c => { c.x += c.v * dt; });
  if (slotsUI.delArm >= 0) { slotsUI.delT -= dt; if (slotsUI.delT <= 0) slotsUI.delArm = -1; }

  if (state === 'intro' && !intro.waitingInput) {
    const item = intro.script[intro.idx];
    if (item && item !== '@INPUT') {
      const len = item.length, prev = intro.shown;
      intro.shown = Math.min(len, intro.shown + dt * 32);
      if (Math.floor(intro.shown / 2) !== Math.floor(prev / 2) && intro.shown < len) SFX.blip();
    }
  }
  if (state !== 'play') return;

  // movement
  const locked = dlg.open || ui.mode;
  let mx = 0, my = 0;
  if (!locked) {
    if (keys.KeyA || keys.ArrowLeft) mx -= 1;
    if (keys.KeyD || keys.ArrowRight) mx += 1;
    if (keys.KeyW || keys.ArrowUp) my -= 1;
    if (keys.KeyS || keys.ArrowDown) my += 1;
  }
  player.moving = mx !== 0 || my !== 0;
  if (player.moving) {
    const coffee = Date.now() < player.coffeeUntil ? 1.35 : 1;
    const sp = (keys.ShiftLeft || keys.ShiftRight ? 150 : 105) * coffee * dt;
    const dia = mx !== 0 && my !== 0 ? 0.7071 : 1;
    tryMove(player, mx * sp * dia, my * sp * dia);
    player.facing = Math.abs(mx) > Math.abs(my) ? (mx < 0 ? 'left' : 'right') : (my < 0 ? 'up' : 'down');
    player.step += dt * 11;
  }

  // auto-pickup
  for (let i = groundItems.length - 1; i >= 0; i--) {
    const it = groundItems[i];
    if ((it.type === 'shell' || it.type === 'fruit') && dist(player.x, player.y, it.x, it.y) < 13) {
      groundItems.splice(i, 1);
      addItem(it.type); SFX.pickup();
      toast(T('got', { i: T('i_' + it.type) }));
    }
  }
  spawnTimer -= dt;
  if (spawnTimer <= 0) { spawnTimer = 5; fillSpawns(false); }

  for (const it of groundItems) {
    if (it.type !== 'fish') continue;
    it.ph += dt;
    const nx = it.x + Math.cos(it.ph * 0.6) * 6 * dt, ny = it.y + Math.sin(it.ph * 0.4) * 6 * dt;
    if (tileAt(nx, ny) === T_WATER) { it.x = nx; it.y = ny; }
  }

  for (const n of npcs) {
    n.t -= dt;
    if (n.state === 'idle') {
      if (n.t <= 0) {
        for (let k = 0; k < 12; k++) {
          const a = rnd(TAU), d = rnd(24, 70);
          const tx = n.x + Math.cos(a) * d, ty = n.y + Math.sin(a) * d;
          if (tileAt(tx, ty) === T_GRASS && !insideBuilding(tx, ty)) { n.tx = tx; n.ty = ty; n.state = 'walk'; break; }
        }
        n.t = rnd(2, 5);
      }
    } else {
      const dx = n.tx - n.x, dy = n.ty - n.y, d = Math.hypot(dx, dy);
      if (d < 3 || n.t < -6) { n.state = 'idle'; n.t = rnd(1.5, 4.5); }
      else {
        const sp = 26 * dt;
        tryMove(n, dx / d * sp, dy / d * sp);
        n.facing = Math.abs(dx) > Math.abs(dy) ? (dx < 0 ? 'left' : 'right') : (dy < 0 ? 'up' : 'down');
        n.step += dt * 8;
      }
    }
  }

  if (dlg.open) {
    const line = dlg.lines[dlg.li], prev = dlg.shown;
    dlg.shown = Math.min(line.length, dlg.shown + dt * 34);
    if (Math.floor(dlg.shown / 2) !== Math.floor(prev / 2) && dlg.shown < line.length) SFX.blip();
  }
  for (let i = toasts.length - 1; i >= 0; i--) {
    toasts[i].t += dt;
    if (toasts[i].t > 2.8) toasts.splice(i, 1);
  }

  // camera
  refreshProj();
  const k = 1 - Math.pow(0.002, dt);
  cam.x = lerp(cam.x, clamp(player.x, 60, WORLD_W - 60), k);
  cam.by = lerp(cam.by, player.y + proj.SH * 0.30, k);

  persistT += dt;
  if (persistT > 12) { persistT = 0; persist(); }
}

function tryMove(ent, dx, dy) {
  const passable = (x, y) =>
    isLand(x, y) && !insideBuilding(x, y) &&
    trees.every(t => dist(x, y, t.x, t.y) > 9) &&
    rocks.every(r => dist(x, y, r.x, r.y) > 10);
  if (passable(ent.x + dx, ent.y)) ent.x += dx;
  if (passable(ent.x, ent.y + dy)) ent.y += dy;
  ent.x = clamp(ent.x, 8, WORLD_W - 8);
  ent.y = clamp(ent.y, 8, WORLD_H - 8);
}

let vignetteCv = null;
function makeVignette() {
  vignetteCv = document.createElement('canvas');
  vignetteCv.width = Math.max(2, Math.floor(view.w / 2));
  vignetteCv.height = Math.max(2, Math.floor(view.h / 2));
  const g = vignetteCv.getContext('2d');
  const grad = g.createRadialGradient(
    vignetteCv.width / 2, vignetteCv.height / 2, Math.min(vignetteCv.width, vignetteCv.height) * 0.42,
    vignetteCv.width / 2, vignetteCv.height / 2, Math.max(vignetteCv.width, vignetteCv.height) * 0.72);
  grad.addColorStop(0, 'rgba(20,15,40,0)');
  grad.addColorStop(1, 'rgba(20,15,40,0.38)');
  g.fillStyle = grad;
  g.fillRect(0, 0, vignetteCv.width, vignetteCv.height);
}

  // walls

  ctx.fillRect(-d.w / 2, -d.h + 18, d.w, d.h - 14);
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(-d.w / 2, -d.h + 18, d.w, 4);
  // roof
  ctx.fillStyle = roofCol;
  ctx.beginPath();
  ctx.moveTo(-d.w / 2 - 7, -d.h + 20);
  ctx.lineTo(0, -d.h - 8);
  ctx.lineTo(d.w / 2 + 7, -d.h + 20);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(-d.w / 2 - 7, -d.h + 18, d.w + 14, 4);
  if (key === 'museum') { // columns + wide steps
    ctx.fillStyle = '#f2ead8';
    for (const cxp of [-d.w / 2 + 10, -d.w / 2 + 26, d.w / 2 - 26, d.w / 2 - 10]) {
      ctx.fillRect(cxp - 3, -d.h + 22, 6, d.h - 20);
    }
    ctx.fillStyle = '#cdbfa4';
    ctx.fillRect(-d.w / 2, 0, d.w, 4);
  }
  if (key === 'cafe') { // awning
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 6; i++) {
      ctx.fillStyle = i % 2 ? '#fff' : '#d96f4e';
      ctx.fillRect(-d.w / 2 + 6 + i * (d.w - 12) / 6, -d.h + 24, (d.w - 12) / 6, 8);
    }
    // steaming cup sign
    ctx.fillStyle = '#fff6dd';
    ctx.beginPath(); ctx.arc(d.w / 2 - 10, -d.h + 6, 6, 0, TAU); ctx.fill();
    ctx.fillStyle = '#6b4a2a';
    ctx.font = '800 8px Nunito, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('☕', d.w / 2 - 10, -d.h + 9);
  }
  drawDoor(key === 'museum' ? 20 : 18);
  if (key !== 'house') {
    drawWindows(-d.w / 2 + 8, -d.h + 30, glow);
    drawWindows(d.w / 2 - 21, -d.h + 30, glow);
  } else {
    drawWindows(-d.w / 2 + 9, -d.h + 30, glow);
    ctx.fillStyle = '#b98d52'; // mailbox
    ctx.fillRect(d.w / 2 - 12, -10, 2.4, 10);
    ctx.fillStyle = '#e2574c';
    roundRect(ctx, d.w / 2 - 16, -16, 11, 7, 3); ctx.fill();
  }
  drawSign(T('b_' + key), -d.h + 4);
}
function drawLampS() {
  drawShadowS(4);
  ctx.fillStyle = '#46535e';
  ctx.fillRect(-1.2, -22, 2.4, 22);
  ctx.beginPath(); ctx.arc(0, -24, 4, 0, TAU); ctx.fill();
  const night = dayPeriod() === 'night' || dayPeriod() === 'evening';
  ctx.fillStyle = night ? '#ffe9a3' : '#cfd8dd';
  ctx.beginPath(); ctx.arc(0, -24, 2.6, 0, TAU); ctx.fill();
  if (night) {
    const g = ctx.createRadialGradient(0, -24, 2, 0, -24, 34);
    g.addColorStop(0, 'rgba(255,225,150,0.30)');
    g.addColorStop(1, 'rgba(255,225,150,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, -24, 34, 0, TAU); ctx.fill();
  }
}

// ----- icons -----
function drawIcon(type, x, y, s) {
  ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
  if (type === 'shell') {
    ctx.fillStyle = '#f1b8c4';
    ctx.beginPath(); ctx.moveTo(0, 4); ctx.arc(0, 0, 5, Math.PI * 0.15, Math.PI * 0.85, true); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#d98da0'; ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, 4); ctx.lineTo(-3, -3); ctx.moveTo(0, 4); ctx.lineTo(0, -4.6); ctx.moveTo(0, 4); ctx.lineTo(3, -3);
    ctx.stroke();
  } else if (type === 'fruit') {
    ctx.fillStyle = '#ffab66';
    ctx.beginPath(); ctx.arc(0, 0.5, 4.6, 0, TAU); ctx.fill();
    ctx.fillStyle = '#ff8a4d';
    ctx.beginPath(); ctx.arc(1.4, 1.4, 3, 0, TAU); ctx.fill();
    ctx.fillStyle = '#4d8f3c';
    ctx.beginPath(); ctx.ellipse(1.4, -4.4, 2.4, 1.2, 0.6, 0, TAU); ctx.fill();
  } else if (type === 'fish') {
    ctx.fillStyle = '#6db3d8';
    ctx.beginPath(); ctx.ellipse(-0.5, 0, 4.6, 2.8, 0, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3.4, 0); ctx.lineTo(6.4, -2.6); ctx.lineTo(6.4, 2.6); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#173b4f';
    ctx.beginPath(); ctx.arc(-2.6, -0.6, 0.8, 0, TAU); ctx.fill();
  } else if (type === 'fossil') {
    ctx.strokeStyle = '#9a7d5a'; ctx.lineWidth = 1.6;
    ctx.beginPath();
    for (let a = 0; a < TAU * 2.1; a += 0.3) {
      const r = 0.9 + a * 0.75;
      const px = Math.cos(a) * r, py = Math.sin(a) * r;
      a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
  } else if (type === 'flower') {
    ctx.fillStyle = '#ff6f87';
    for (let i = 0; i < 5; i++) {
      const a = i / 5 * TAU;
      ctx.beginPath(); ctx.arc(Math.cos(a) * 3, Math.sin(a) * 3, 2.4, 0, TAU); ctx.fill();
    }
    ctx.fillStyle = '#ffe27a';
    ctx.beginPath(); ctx.arc(0, 0, 2, 0, TAU); ctx.fill();
  } else if (type === 'seeds') {
    ctx.fillStyle = '#d8b27a';
    roundRect(ctx, -4, -3, 8, 8, 2); ctx.fill();
    ctx.fillStyle = '#b58e58';
    ctx.fillRect(-4, -3, 8, 2.4);
    ctx.fillStyle = '#6b4f2f';
    ctx.beginPath(); ctx.arc(-1.4, 1.6, 0.9, 0, TAU); ctx.arc(1.6, 2.6, 0.9, 0, TAU); ctx.arc(0.6, 0, 0.9, 0, TAU); ctx.fill();
  } else if (type === 'rod') {
    ctx.strokeStyle = '#8a6644'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(-4.5, 4.5); ctx.lineTo(4, -4); ctx.stroke();
    ctx.strokeStyle = '#9db4c0'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(4, -4); ctx.quadraticCurveTo(5.5, 0, 3.5, 2.5); ctx.stroke();
    ctx.fillStyle = '#e2574c';
    ctx.beginPath(); ctx.arc(3.5, 3, 1.4, 0, TAU); ctx.fill();
  } else if (type === 'shovel') {
    ctx.strokeStyle = '#8a6644'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(0, 1.5); ctx.stroke();
    ctx.strokeStyle = '#8a6644'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(-2, -5); ctx.lineTo(2, -5); ctx.stroke();
    ctx.fillStyle = '#9aa3ad';
    ctx.beginPath(); ctx.moveTo(-2.6, 1.5); ctx.lineTo(2.6, 1.5); ctx.lineTo(1.8, 5.5); ctx.lineTo(-1.8, 5.5); ctx.closePath(); ctx.fill();
  } else if (type === 'coffee') {
    ctx.fillStyle = '#fff';
    roundRect(ctx, -3.5, -2, 7, 6, 2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(4, 0.5, 1.8, -1, 1.6); ctx.stroke();
    ctx.fillStyle = '#6b4a2a';
    ctx.beginPath(); ctx.ellipse(0, -1.6, 3, 1, 0, 0, TAU); ctx.fill();
    ctx.strokeStyle = 'rgba(160,160,160,0.9)'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(-1, -3.5); ctx.quadraticCurveTo(-2, -5, -1, -6.5); ctx.moveTo(1.4, -3.5); ctx.quadraticCurveTo(0.4, -5, 1.4, -6.5); ctx.stroke();
  } else if (type === 'bell') {
    ctx.fillStyle = '#ffd95e';
    ctx.beginPath(); ctx.arc(0, 0, 4.6, 0, TAU); ctx.fill();
    ctx.strokeStyle = '#c79a2a'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, 4.6, 0, TAU); ctx.stroke();
    ctx.fillStyle = '#c79a2a';
    ctx.font = '800 6px Nunito, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('★', 0, 2.2);
  }
  ctx.restore();
}

/* ----- world render (rolling-log pseudo-3D) ----- */
function renderWorld() {
  refreshProj();
  const z = view.zoom * view.dpr;
  ctx.setTransform(z, 0, 0, z, 0, 0);
  const t = gameTime();
  const SW = proj.SW, SH = proj.SH, R = proj.R;
  const horizonY = proj.horizonY;
  const period = dayPeriod();

  // --- sky band ---
  const [top, bottom] = skyColors();
  let g = ctx.createLinearGradient(0, 0, 0, horizonY + 8);
  g.addColorStop(0, top); g.addColorStop(1, bottom);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, SW, horizonY + 2);
  // sun / moon / stars
  const h = nowHour();
  const isDay = h >= 6 && h < 19;
  const progT = isDay ? (h - 6) / 13 : ((h >= 19 ? h - 19 : h + 5) / 11);
  const ax = lerp(SW * 0.12, SW * 0.88, progT);
  const ay = horizonY - 6 - Math.sin(progT * Math.PI) * horizonY * 0.65;
  if (isDay) {
    ctx.fillStyle = 'rgba(255,243,184,0.35)';
    ctx.beginPath(); ctx.arc(ax, ay, 14, 0, TAU); ctx.fill();
    ctx.fillStyle = '#fff3b8';
    ctx.beginPath(); ctx.arc(ax, ay, 9, 0, TAU); ctx.fill();
  } else {
    ctx.fillStyle = '#f2f4e9';
    ctx.beginPath(); ctx.arc(ax, ay, 8, 0, TAU); ctx.fill();
    ctx.fillStyle = top;
    ctx.beginPath(); ctx.arc(ax - 3, ay - 2, 6.6, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for (let i = 0; i < 26; i++) {
      const sx = hash2(i, 7) * SW, sy = hash2(i, 13) * horizonY * 0.9;
      ctx.globalAlpha = 0.3 + (Math.sin(t * 2 + i) * 0.5 + 0.5) * 0.5;
      ctx.fillRect(sx, sy, 1.4, 1.4);
    }
    ctx.globalAlpha = 1;
  }
  // clouds in the sky band
  const night = period === 'night';
  for (const c of clouds) {
    const sx = ((c.x - cam.x * 0.25) % (SW + 200)) - 100;
    const sy = 4 + c.y * (horizonY - 14);
    ctx.fillStyle = night ? 'rgba(190,200,235,0.13)' : 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(sx, sy, 24 * c.s, 7 * c.s, 0, 0, TAU);
    ctx.ellipse(sx + 15 * c.s, sy + 3 * c.s, 16 * c.s, 5.5 * c.s, 0, 0, TAU);
    ctx.ellipse(sx - 16 * c.s, sy + 3 * c.s, 14 * c.s, 5 * c.s, 0, 0, TAU);
    ctx.fill();
  }

  // --- ocean (below horizon) ---
  const waterNear = { morning: '#4aa6d8', afternoon: '#3f9bd0', evening: '#3f7fb8', night: '#1d3a66' }[period];
  const waterFar = { morning: '#7cc4e8', afternoon: '#6fbce2', evening: '#d99a6e', night: '#11254a' }[period];
  g = ctx.createLinearGradient(0, horizonY, 0, SH);
  g.addColorStop(0, waterFar); g.addColorStop(0.5, waterNear); g.addColorStop(1, waterNear);
  ctx.fillStyle = g;
  ctx.fillRect(0, horizonY, SW, SH - horizonY + 1);

  // --- terrain strips (perspective rows) ---
  const y0 = Math.max(0, Math.ceil(horizonY));
  for (let sy = y0; sy < SH; sy++) {
    const s = SH - sy - 0.5;
    const ratio = clamp(s / R, 0, 0.999);
    const b = R * Math.asin(ratio);
    const c = Math.sqrt(1 - ratio * ratio);
    const wy = cam.by - b;
    if (wy < 0 || wy >= WORLD_H) continue;
    const halfW = SW / (2 * c);
    const dx = (halfW - cam.x) * c;
    ctx.drawImage(terrainCv, 0, Math.floor(wy), WORLD_W, 1, dx, sy, WORLD_W * c, 1.1);
  }

  // --- water sparkles (projected) ---
  ctx.fillStyle = period === 'night' ? 'rgba(190,210,255,0.25)' : 'rgba(255,255,255,0.4)';
  const ty0 = Math.max(0, Math.floor((cam.by - R * 1.4) / TILE));
  const ty1 = Math.min(MH - 1, Math.ceil(cam.by / TILE));
  const tx0 = Math.max(0, Math.floor((cam.x - SW) / TILE));
  const tx1 = Math.min(MW - 1, Math.ceil((cam.x + SW) / TILE));
  for (let y = ty0; y <= ty1; y++) for (let x = tx0; x <= tx1; x++) {
    if (map[y][x] !== T_WATER) continue;
    const hh = hash2(x, y);
    if (hh < 0.10) {
      const ph = Math.sin(t * 1.5 + hh * 60);
      if (ph > 0.2) {
        const p = project(x * TILE + hh * 700 % 12, y * TILE + hh * 300 % 12);
        if (p.vis && p.x > -8 && p.x < SW + 8) ctx.fillRect(p.x, p.y, 3.5 * ph * p.c, Math.max(0.6, p.c));
      }
    }
  }

  // --- shoreline foam (projected lines) ---
  ctx.lineCap = 'round';
  for (const e of foamEdges) {
    const ex = e.x * TILE, ey = e.y * TILE;
    if (ey > cam.by + 24 || ey < cam.by - R * 1.4) continue;
    if (Math.abs(ex - cam.x) > SW) continue;
    const pulse = Math.sin(t * 1.7 + e.ph);
    const off = 2 + pulse * 1.6;
    let x1, y1, x2, y2;
    if (e.side === 0) { x1 = ex + 2; y1 = ey - off; x2 = ex + TILE - 2; y2 = y1; }
    else if (e.side === 1) { x1 = ex + TILE + off; y1 = ey + 2; x2 = x1; y2 = ey + TILE - 2; }
    else if (e.side === 2) { x1 = ex + 2; y1 = ey + TILE + off; x2 = ex + TILE - 2; y2 = y1; }
    else { x1 = ex - off; y1 = ey + 2; x2 = x1; y2 = ey + TILE - 2; }
    const p1 = project(x1, y1), p2 = project(x2, y2);
    if (!p1.vis || !p2.vis) continue;
    ctx.strokeStyle = `rgba(255,255,255,${(0.3 + pulse * 0.2) * p1.c})`;
    ctx.lineWidth = 1.4 * p1.c;
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
  }

  // --- flat ground layer (flowers, items, plants) ---
  const drawAt = (wx, wy, fn, arg) => {
    const p = project(wx, wy);
    if (!p.vis || p.x < -60 || p.x > SW + 60) return false;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(p.c, p.c);
    fn(arg);
    ctx.restore();
    return true;
  };
  for (const f of wildflowers) drawAt(f.x, f.y, () => drawFlowerS(f.c1, f.c2, f.ph));
  for (const it of groundItems) {
    if (it.type === 'fish') {
      const p = project(it.x, it.y);
      if (!p.vis) continue;
      ctx.fillStyle = 'rgba(10,40,60,0.35)';
      const wob = Math.sin(t * 3 + it.ph) * 1.4;
      ctx.beginPath(); ctx.ellipse(p.x, p.y, (6 + wob * 0.4) * p.c, 3.4 * p.c, Math.sin(it.ph + t * 0.5) * 0.4, 0, TAU); ctx.fill();
      const rip = (t * 0.7 + it.ph) % 1;
      ctx.strokeStyle = `rgba(255,255,255,${0.35 * (1 - rip) * p.c})`;
      ctx.lineWidth = 0.8 * p.c;
      ctx.beginPath(); ctx.arc(p.x, p.y, (5 + rip * 9) * p.c, 0, TAU); ctx.stroke();
    } else if (it.type === 'fossil') {
      drawAt(it.x, it.y, () => {
        ctx.strokeStyle = 'rgba(110,80,40,0.8)'; ctx.lineWidth = 1.4;
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
          const a = i / 4 * TAU + 0.6;
          ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a) * 5, Math.sin(a) * 5);
        }
        ctx.stroke();
        ctx.fillStyle = 'rgba(110,80,40,0.45)';
        ctx.beginPath(); ctx.arc(0, 0, 2.2, 0, TAU); ctx.fill();
      });
    } else {
      drawAt(it.x, it.y, () => {
        const bob = Math.sin(t * 2.4 + it.ph) * 1.2;
        ctx.fillStyle = 'rgba(0,0,0,0.13)';
        ctx.beginPath(); ctx.ellipse(0, 3, 4, 1.6, 0, 0, TAU); ctx.fill();
        drawIcon(it.type, 0, -2 - bob, 0.9);
      });
    }
  }
  for (const p of plants) drawAt(p.x, p.y, () => drawPlantS(p));

  // --- depth-sorted standing sprites ---
  const drawables = [];
  for (const b of activeBuildings()) drawables.push({ y: b.y, fn: () => drawBuildingS(b.key), x: b.x });
  drawables.push({ y: plots.tent.y + 8, x: plots.tent.x + 28, fn: drawNookStandingS });
  if (prog && prog.built.shop) drawables.push({ y: plots.shop.y + 28, x: plots.shop.x - 52, fn: drawLampS });
  for (const tr of trees) drawables.push({ y: tr.y, x: tr.x, fn: () => drawTreeS(tr) });
  for (const r of rocks) drawables.push({ y: r.y, x: r.x, fn: () => drawRockS(r) });
  for (const n of npcs) drawables.push({ y: n.y, x: n.x, fn: () => drawNPCS(n) });
  drawables.push({ y: player.y, x: player.x, fn: drawPlayerS });
  drawables.sort((a, b) => a.y - b.y);
  for (const d of drawables) drawAt(d.x, d.y, d.fn);

  // --- interact bubble ---
  const tgt = !dlg.open && !ui.mode ? nearestInteract() : null;
  if (tgt) {
    let bx = player.x, by = player.y - 36;
    if (tgt.obj) { bx = tgt.obj.x; by = tgt.obj.y - (tgt.kind === 'npc' ? 34 : 18); }
    else if (tgt.kind === 'nook') { bx = plots.tent.x + 28; by = plots.tent.y - 34; }
    else if (plots[tgt.kind]) { bx = plots[tgt.kind].x; by = plots[tgt.kind].y - BD[tgt.kind].h - 14; }
    const p = project(bx, by);
    if (p.vis) {
      const bob = Math.sin(t * 4) * 1.5;
      ctx.fillStyle = 'rgba(255,251,233,0.95)';
      roundRect(ctx, p.x - 6, p.y - 6 + bob, 12, 12, 4); ctx.fill();
      ctx.fillStyle = '#7a5230';
      ctx.font = '900 8px Nunito, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('E', p.x, p.y + 3 + bob);
    }
  }
}

function renderParticles() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  for (const p of particles) {
    if (p.kind === 'snow') {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.6 + Math.sin(p.ph) * 0.5, 0, TAU); ctx.fill();
    } else if (p.kind === 'leaf') {
      ctx.fillStyle = p.c;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.sin(p.ph) * 1.2);
      ctx.beginPath(); ctx.ellipse(0, 0, 3.4, 1.8, 0, 0, TAU); ctx.fill();
      ctx.restore();
    } else if (p.kind === 'petal') {
      ctx.fillStyle = 'rgba(255,190,210,0.9)';
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.sin(p.ph) * 0.9);
      ctx.beginPath(); ctx.ellipse(0, 0, 2.6, 1.5, 0, 0, TAU); ctx.fill();
      ctx.restore();
    } else {
      const a = 0.25 + 0.25 * Math.sin(p.ph * 2);
      ctx.fillStyle = dayPeriod() === 'night' ? `rgba(255,250,170,${a})` : `rgba(255,255,255,${a * 0.7})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.3, 0, TAU); ctx.fill();
    }
  }
}
function renderLightAndVignette() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  const [r, g, b, a] = lightTint();
  if (a > 0.004) {
    ctx.fillStyle = `rgba(${r | 0},${g | 0},${b | 0},${a})`;
    ctx.fillRect(0, 0, view.w, view.h);
  }
  if (vignetteCv) ctx.drawImage(vignetteCv, 0, 0, view.w, view.h);
}

// ----- UI helpers -----
function panel(x, y, w, h, alpha = 0.93) {
  ctx.save();
  ctx.shadowColor = 'rgba(60,40,10,0.25)';
  ctx.shadowBlur = 8; ctx.shadowOffsetY = 3;
  ctx.fillStyle = `rgba(255,250,231,${alpha})`;
  roundRect(ctx, x, y, w, h, 14); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = 'rgba(185,141,82,0.8)'; ctx.lineWidth = 2;
  roundRect(ctx, x, y, w, h, 14); ctx.stroke();
}
function fmtTime(d = new Date()) {
  let h = d.getHours();
  const ap = h < 12 ? 'AM' : 'PM';
  h = (h + 11) % 12 + 1;
  return `${h}:${String(d.getMinutes()).padStart(2, '0')} ${ap}`;
}
const DAYS_EN = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const DAYS_ES = ['dom', 'lun', 'mar', 'mié', 'jue', 'vie', 'sáb'];
const MON_EN = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const MON_ES = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
function fmtDate(d = new Date()) {
  return lang === 'es'
    ? `${DAYS_ES[d.getDay()]}, ${d.getDate()} ${MON_ES[d.getMonth()]}`
    : `${DAYS_EN[d.getDay()]}, ${MON_EN[d.getMonth()]} ${d.getDate()}`;
}
function wrapText(text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line = '', yy = y;
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, yy); line = word; yy += lh;
    } else line = test;
  }
  ctx.fillText(line, x, yy);
}

function renderHUD() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  ctx.textBaseline = 'alphabetic';
  const d = new Date();

  panel(14, 14, 168, 54);
  ctx.fillStyle = '#7a5230';
  ctx.font = '900 22px Nunito, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(fmtTime(d), 28, 40);
  ctx.font = '700 12px Nunito, sans-serif';
  ctx.fillStyle = '#a3845c';
  const days = prog ? Math.floor((Date.now() - prog.createdAt) / 86400e3) + 1 : 1;
  ctx.fillText(`${fmtDate(d)}  ·  ${T('slot_day', { n: days })}`, 28, 58);

  const bw = 132;
  panel(view.w - bw - 14, 14, bw, 40);
  drawIcon('bell', view.w - bw + 8, 34, 1.6);
  ctx.fillStyle = '#7a5230';
  ctx.font = '900 17px Nunito, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(String(player.bells), view.w - bw + 24, 40);
  // coffee buff
  if (Date.now() < player.coffeeUntil) {
    const left = Math.ceil((player.coffeeUntil - Date.now()) / 1000);
    panel(view.w - bw - 14, 60, bw, 30, 0.85);
    drawIcon('coffee', view.w - bw + 4, 75, 1.2);
    ctx.fillStyle = '#7a5230';
    ctx.font = '800 13px Nunito, sans-serif';
    ctx.fillText(`${Math.floor(left / 60)}:${String(left % 60).padStart(2, '0')}`, view.w - bw + 22, 80);
  }

  // objective
  const obj = currentObjective();
  if (obj) {
    ctx.font = '800 13px Nunito, sans-serif';
    const w = ctx.measureText(obj).width + 36;
    panel(view.w / 2 - w / 2, 14, w, 30, 0.85);
    ctx.fillStyle = '#4d8f5c';
    ctx.textAlign = 'center';
    ctx.fillText(obj, view.w / 2, 34);
  }

  ctx.font = '700 11px Nunito, sans-serif'; ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,250,231,0.75)';
  ctx.fillText(T('controls'), 16, view.h - 12);

  if (minimapOn) renderMinimap();

  ctx.textAlign = 'center';
  toasts.forEach((tt, i) => {
    const a = tt.t < 0.2 ? tt.t / 0.2 : tt.t > 2.3 ? Math.max(0, 1 - (tt.t - 2.3) / 0.5) : 1;
    const y = 56 + i * 34 - (tt.t < 0.2 ? (0.2 - tt.t) * 30 : 0);
    ctx.font = '800 14px Nunito, sans-serif';
    const w = ctx.measureText(tt.text).width + 34;
    ctx.globalAlpha = a;
    panel(view.w / 2 - w / 2, y, w, 28, 0.92);
    ctx.fillStyle = '#7a5230';
    ctx.fillText(tt.text, view.w / 2, y + 19);
    ctx.globalAlpha = 1;
  });

  if (ui.mode === 'inv') renderInventory();
  if (ui.mode === 'nook') renderNookMenu();
  if (ui.mode === 'shop') renderShopMenu();
  if (ui.mode === 'museum') renderMuseumMenu();
  if (ui.mode === 'cafe') renderCafeMenu();
  if (ui.mode === 'pause') renderPauseMenu();
  if (dlg.open) renderDialog();
}

function renderMinimap() {
  const mw = 150, mh = Math.round(mw * MH / MW);
  const x = view.w - mw - 16, y = view.h - mh - 16;
  ctx.save();
  ctx.globalAlpha = 0.88;
  ctx.fillStyle = '#2f7cb0';
  roundRect(ctx, x - 4, y - 4, mw + 8, mh + 8, 10); ctx.fill();
  ctx.strokeStyle = 'rgba(255,250,231,0.9)'; ctx.lineWidth = 2;
  roundRect(ctx, x - 4, y - 4, mw + 8, mh + 8, 10); ctx.stroke();
  ctx.drawImage(terrainCv, x, y, mw, mh);
  const px = x + player.x / WORLD_W * mw, py = y + player.y / WORLD_H * mh;
  for (const b of activeBuildings()) {
    ctx.fillStyle = b.key === 'tent' ? '#3f7a4c' : '#7a5230';
    ctx.fillRect(x + b.x / WORLD_W * mw - 2, y + b.y / WORLD_H * mh - 2, 4, 4);
  }
  for (const n of npcs) {
    ctx.fillStyle = n.def.shirt;
    ctx.beginPath(); ctx.arc(x + n.x / WORLD_W * mw, y + n.y / WORLD_H * mh, 1.6, 0, TAU); ctx.fill();
  }
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(px, py, 2.6, 0, TAU); ctx.fill();
  ctx.strokeStyle = '#e2574c'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(px, py, 4, 0, TAU); ctx.stroke();
  ctx.restore();
}

// ----- title / slots / intro scenes -----
function renderBeachScene() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  const [top, bottom] = skyColors();
  const g = ctx.createLinearGradient(0, 0, 0, view.h);
  g.addColorStop(0, top); g.addColorStop(0.62, bottom);
  g.addColorStop(0.62, '#3f9bd0'); g.addColorStop(1, '#2f7cb0');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, view.w, view.h);
  const t = gameTime();
  const h = nowHour();
  const isDay = h >= 6 && h < 19;
  const progT = isDay ? (h - 6) / 13 : ((h >= 19 ? h - 19 : h + 5) / 11);
  const ax = lerp(view.w * 0.12, view.w * 0.88, progT);
  const ay = view.h * 0.5 - Math.sin(progT * Math.PI) * view.h * 0.34;
  if (isDay) {
    ctx.fillStyle = '#fff3b8';
    ctx.beginPath(); ctx.arc(ax, ay, 34, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(255,243,184,0.25)';
    ctx.beginPath(); ctx.arc(ax, ay, 52, 0, TAU); ctx.fill();
  } else {
    ctx.fillStyle = '#f2f4e9';
    ctx.beginPath(); ctx.arc(ax, ay, 26, 0, TAU); ctx.fill();
    ctx.fillStyle = top;
    ctx.beginPath(); ctx.arc(ax - 10, ay - 6, 22, 0, TAU); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for (let i = 0; i < 40; i++) {
      const sx = hash2(i, 7) * view.w, sy = hash2(i, 13) * view.h * 0.55;
      ctx.globalAlpha = 0.3 + (Math.sin(t * 2 + i) * 0.5 + 0.5) * 0.5;
      ctx.fillRect(sx, sy, 2, 2);
    }
    ctx.globalAlpha = 1;
  }
  for (const c of clouds) {
    const sx = ((c.x * 3) % (view.w + 480)) - 240;
    const sy = c.y * view.h * 0.5;
    ctx.fillStyle = dayPeriod() === 'night' ? 'rgba(190,200,235,0.10)' : 'rgba(255,255,255,0.34)';
    ctx.beginPath();
    ctx.ellipse(sx, sy, 56 * c.s, 16 * c.s, 0, 0, TAU);
    ctx.ellipse(sx + 34 * c.s, sy + 6 * c.s, 38 * c.s, 13 * c.s, 0, 0, TAU);
    ctx.ellipse(sx - 36 * c.s, sy + 7 * c.s, 34 * c.s, 12 * c.s, 0, 0, TAU);
    ctx.fill();
  }
  for (let i = 0; i < 3; i++) {
    const wy = view.h * 0.62 + 18 + i * 26 + Math.sin(t * 1.1 + i * 2) * 4;
    ctx.strokeStyle = `rgba(255,255,255,${0.22 - i * 0.05})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let xx = -20; xx <= view.w + 20; xx += 30) {
      const yy = wy + Math.sin(xx * 0.02 + t * 1.6 + i) * 5;
      xx === -20 ? ctx.moveTo(xx, yy) : ctx.lineTo(xx, yy);
    }
    ctx.stroke();
  }
  ctx.fillStyle = SEASON === 'winter' ? '#ded7c4' : '#ecd9a2';
  ctx.beginPath();
  ctx.moveTo(0, view.h);
  ctx.quadraticCurveTo(view.w * 0.5, view.h * 0.78, view.w, view.h);
  ctx.closePath(); ctx.fill();
}

    }
  }
}

// ---------------- main loop ----------------
function frame(now) {
  const dt = clamp((now - lastT) / 1000, 0, 0.05);
  lastT = now;
  update(dt);

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, cv.width, cv.height);

  if (state === 'title') {
    renderTitle();
    renderParticles();
    renderLightAndVignette();
  } else if (state === 'slots') {
    renderSlots();
    renderParticles();
    renderLightAndVignette();
  } else if (state === 'intro') {
    renderIntro();
    renderParticles();
    if (vignetteCv) { ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0); ctx.drawImage(vignetteCv, 0, 0, view.w, view.h); }
  } else {
    renderWorld();
    renderParticles();
    renderLightAndVignette();
    renderHUD();
  }

  if (fade > 0) {
    ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
    ctx.fillStyle = `rgba(12,10,24,${fade})`;
    ctx.fillRect(0, 0, view.w, view.h);
  }
  requestAnimationFrame(frame);
}

// ---------------- boot ----------------
resize();
refreshProj();
genWorld(20260612); // placeholder island behind title (real one loads with the slot)
prog = freshProg(20260612);
refreshRects();
spawnNpcs();
requestAnimationFrame(frame);
</script>
